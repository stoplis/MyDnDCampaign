<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wish — Campaign Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&display=swap">
    <link rel="stylesheet" href="css/campaign-journal.css">
</head>
<body data-theme="light">
    <main class="shell">
        <div class="header">
            <a href="index.html" class="back-link">Back</a>
            <div class="brand" aria-label="Wish Campaign Journal">
                <span class="brand-mark">Wish</span>
                <span class="brand-context">Campaign Journal</span>
            </div>
            <span class="sep" aria-hidden="true"></span>
            <span class="header-title">Player Archive</span>
            <span class="spacer"></span>
            <button id="reset-btn" class="reset-btn" title="Reset all unlocks">Reset</button>
        </div>

        <section class="journal-intro" aria-labelledby="journal-title">
            <div class="chapter-label">Progressive Reveal</div>
            <h1 id="journal-title">Campaign Journal</h1>
            <p class="intro-copy">Enter the words discovered during play to reveal chapters, places, faces, and clues from the story.</p>
        </section>

        <div id="app"></div>
    </main>

    <div class="pw-bar">
        <input type="text" id="pw-input" placeholder="Enter a password..." autocomplete="off" spellcheck="false" autocapitalize="off">
        <button id="pw-btn">Unlock</button>
    </div>

    <!-- Fullscreen image viewer -->
    <div class="viewer-overlay" id="viewer">
        <button class="viewer-close" id="viewer-close">&times;</button>
        <div class="viewer-title" id="viewer-title"></div>
        <img class="viewer-img" id="viewer-img" src="" alt="">
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
    <script src="js/journal-data.js"></script>
    <script src="js/campaign-journal.js"></script>
</body>
</html>
