<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wish — Campaign Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&display=swap">
    <style>
        :root {
            --bg: #faf8f4;
            --surface: #ffffff;
            --surface-2: #f3f0ea;
            --ink: #141414;
            --ink-2: #404040;
            --ink-3: #6b6b6b;
            --ink-4: #9a9a9a;
            --rule: #e6e1d6;
            --rule-strong: #1a1a1a;
            --accent: oklch(0.45 0.14 25);
            --accent-2: oklch(0.55 0.14 25);
            --accent-weak: oklch(0.95 0.04 25);
            --fac-ally: oklch(0.52 0.12 155);
            --fac-ally-weak: color-mix(in oklch, oklch(0.52 0.12 155) 14%, var(--surface));
            --danger: oklch(0.55 0.18 25);
            --ok: oklch(0.55 0.11 150);
            --serif: "Source Serif 4", "Source Serif Pro", Georgia, "Times New Roman", serif;
            --sans: "Source Serif 4", "Source Serif Pro", Georgia, serif;
            --mono: "Source Serif 4", "Source Serif Pro", Georgia, serif;
            --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px;
            --s6: 24px; --s7: 32px; --s8: 48px; --s9: 64px;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: var(--sans);
            background:
                linear-gradient(180deg, color-mix(in oklch, var(--surface) 46%, transparent), transparent 360px),
                var(--bg);
            color: var(--ink);
            font-size: 14px;
            line-height: 1.5;
            padding-bottom: 92px;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; padding: 0; }
        input { font: inherit; color: inherit; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: color-mix(in oklch, var(--ink-4) 40%, transparent); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

        .shell {
            min-height: calc(100vh - 92px);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: var(--s5);
            min-height: 56px;
            padding: 0 var(--s6);
            border-bottom: 1px solid var(--rule);
            background: color-mix(in oklch, var(--surface) 94%, transparent);
            backdrop-filter: blur(14px);
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: var(--s2);
            min-width: 0;
        }
        .brand-mark {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--ink);
            white-space: nowrap;
        }
        .brand-context {
            font-family: var(--serif);
            font-size: 18px;
            font-style: italic;
            font-weight: 400;
            color: var(--ink-3);
            white-space: nowrap;
        }
        .sep {
            width: 1px;
            height: 20px;
            background: var(--rule);
        }
        .header-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-3);
            white-space: nowrap;
        }
        .spacer { flex: 1; }

        .back-link,
        .reset-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            padding: 6px 10px;
            border: 1px solid var(--rule);
            border-radius: 6px;
            background: var(--surface);
            color: var(--ink);
            font-size: 12.5px;
            font-weight: 500;
            letter-spacing: 0.01em;
            text-decoration: none;
            transition: background 120ms, border-color 120ms, color 120ms;
        }
        .back-link:hover,
        .reset-btn:hover {
            border-color: var(--ink-3);
            background: var(--surface-2);
        }
        .reset-btn {
            color: var(--danger);
            border-color: color-mix(in oklch, var(--danger) 38%, var(--rule));
        }

        .journal-intro {
            max-width: 980px;
            margin: 0 auto;
            padding: var(--s8) var(--s7) var(--s6);
        }
        .chapter-label {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: var(--s2);
        }
        h1 {
            margin: 0;
            font-family: var(--serif);
            font-size: clamp(34px, 5vw, 56px);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.05;
        }
        .intro-copy {
            max-width: 620px;
            margin: var(--s4) 0 0;
            color: var(--ink-2);
            font-size: 16px;
            line-height: 1.65;
        }

        #app {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 var(--s7) var(--s8);
        }

        .chapter {
            border-top: 1px solid var(--rule);
        }
        .chapter:last-child {
            border-bottom: 1px solid var(--rule);
        }
        .chapter-header {
            display: flex;
            align-items: center;
            gap: var(--s4);
            width: 100%;
            min-height: 72px;
            padding: var(--s4) 0;
            color: var(--ink);
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }
        .chapter-header.unlocked {
            cursor: pointer;
        }
        .chapter-header.unlocked:hover .chapter-title {
            color: var(--accent);
        }
        .chapter-title {
            flex: 1;
            font-family: var(--serif);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.15;
            transition: color 120ms;
        }
        .lock-icon,
        .unlock-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 86px;
            min-width: 86px;
            height: 28px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-3);
            background: var(--surface);
        }
        .unlock-icon {
            color: var(--fac-ally);
            border-color: color-mix(in oklch, var(--fac-ally) 42%, var(--rule));
            background: var(--fac-ally-weak);
        }
        .chevron {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            color: var(--ink-3);
            font-size: 12px;
            line-height: 1;
            transition: transform 160ms, border-color 120ms, color 120ms;
        }
        .chapter-header:hover .chevron {
            border-color: var(--ink-3);
            color: var(--ink);
        }
        .chevron.open { transform: rotate(90deg); }

        .entries {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
            gap: 1px;
            margin: 0 0 var(--s6) 102px;
            background: var(--rule);
            border: 1px solid var(--rule);
        }

        .entry {
            position: relative;
            min-width: 0;
            background: var(--surface);
            overflow: hidden;
            transition: background 120ms, box-shadow 120ms;
        }
        .entry.unlocked {
            cursor: pointer;
        }
        .entry.unlocked:hover {
            background: var(--surface-2);
            box-shadow: inset 0 0 0 2px var(--accent);
            z-index: 1;
        }
        .entry-thumb,
        .entry-placeholder {
            width: 100%;
            aspect-ratio: 4 / 3;
            display: block;
            background:
                linear-gradient(135deg, color-mix(in oklch, var(--ink) 5%, transparent), transparent),
                var(--surface-2);
        }
        .entry-thumb {
            object-fit: cover;
            filter: saturate(0.92) contrast(1.02);
        }
        .entry-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-4);
            font-family: var(--serif);
            font-size: 34px;
            font-weight: 600;
            letter-spacing: 0.08em;
        }
        .entry-name {
            min-height: 46px;
            padding: 10px 12px 11px;
            border-top: 1px solid var(--rule);
            color: var(--ink);
            font-family: var(--serif);
            font-size: 14px;
            font-weight: 600;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }
        .entry-name.locked {
            color: var(--ink-3);
            font-style: italic;
            font-weight: 500;
        }

        .pw-bar {
            position: fixed;
            left: 50%;
            right: auto;
            bottom: var(--s5);
            z-index: 50;
            transform: translateX(-50%);
            display: flex;
            gap: var(--s2);
            width: min(720px, calc(100vw - 32px));
            padding: var(--s2);
            border: 1px solid var(--rule);
            border-radius: 8px;
            background: color-mix(in oklch, var(--surface) 94%, transparent);
            box-shadow: 0 12px 32px rgba(0,0,0,0.14), 0 2px 4px rgba(0,0,0,0.08);
            backdrop-filter: blur(14px);
        }
        .pw-bar input {
            flex: 1;
            min-width: 0;
            height: 40px;
            padding: 0 var(--s3);
            border: 1px solid var(--rule);
            border-radius: 6px;
            background: var(--bg);
            color: var(--ink);
            font-size: 15px;
            outline: none;
            transition: border-color 120ms, background 120ms;
        }
        .pw-bar input::placeholder { color: var(--ink-4); font-style: italic; }
        .pw-bar input:focus { border-color: var(--accent); background: var(--surface); }
        .pw-bar input.error {
            border-color: var(--danger);
            animation: shake 0.35s ease;
        }
        .pw-bar button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0 var(--s5);
            border: 1px solid var(--ink);
            border-radius: 6px;
            background: var(--ink);
            color: var(--bg);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            white-space: nowrap;
            transition: background 120ms, border-color 120ms;
        }
        .pw-bar button:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .viewer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: color-mix(in oklch, var(--ink) 84%, transparent);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: var(--s6);
            backdrop-filter: blur(2px);
        }
        .viewer-overlay.active { display: flex; }

        .viewer-close {
            position: absolute;
            top: var(--s5);
            right: var(--s5);
            width: 40px;
            height: 40px;
            border: 1px solid color-mix(in oklch, white 24%, transparent);
            border-radius: 6px;
            background: color-mix(in oklch, black 22%, transparent);
            color: var(--bg);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            z-index: 101;
        }
        .viewer-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

        .viewer-title {
            max-width: min(900px, 90vw);
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 600;
            margin-bottom: var(--s4);
            color: var(--bg);
            text-align: center;
            letter-spacing: -0.01em;
        }
        .viewer-img {
            max-width: 100%;
            max-height: calc(100vh - 116px);
            border: 1px solid color-mix(in oklch, white 18%, transparent);
            box-shadow: 0 24px 64px rgba(0,0,0,0.38);
            object-fit: contain;
        }

        .toast {
            position: fixed;
            top: var(--s6);
            left: 50%;
            transform: translateX(-50%) translateY(-200%);
            background: var(--ink);
            color: var(--bg);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            z-index: 200;
            transition: transform 0.3s ease;
            white-space: nowrap;
            visibility: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
        }
        .toast.show { transform: translateX(-50%) translateY(0); visibility: visible; }

        @media (max-width: 760px) {
            body { padding-bottom: 104px; }
            .header {
                gap: var(--s3);
                padding: 0 var(--s4);
            }
            .brand {
                flex-direction: column;
                gap: 0;
                line-height: 1.05;
            }
            .brand-mark,
            .brand-context {
                font-size: 16px;
            }
            .sep,
            .header-title {
                display: none;
            }
            .back-link,
            .reset-btn {
                padding-inline: 8px;
            }
            .journal-intro {
                padding: var(--s7) var(--s5) var(--s5);
            }
            h1 {
                font-size: 38px;
            }
            .intro-copy {
                font-size: 15px;
            }
            #app {
                padding: 0 var(--s5) var(--s8);
            }
            .chapter-header {
                min-height: 64px;
                gap: var(--s3);
            }
            .chapter-title {
                font-size: 20px;
            }
            .lock-icon,
            .unlock-icon {
                width: 72px;
                min-width: 72px;
                font-size: 9px;
                letter-spacing: 0.08em;
            }
            .entries {
                margin-left: 0;
                grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
            }
            .pw-bar {
                bottom: var(--s3);
                width: calc(100vw - 24px);
            }
            .pw-bar button {
                padding: 0 var(--s4);
            }
            .viewer-overlay {
                padding: var(--s4);
            }
            .viewer-close {
                top: var(--s3);
                right: var(--s3);
            }
            .viewer-img {
                max-height: calc(100vh - 104px);
            }
        }
    </style>
</head>
<body data-theme="light">
    <main class="shell">
        <div class="header">
            <a href="index.html" class="back-link">Back</a>
            <div class="brand" aria-label="Wish Campaign Journal">
                <span class="brand-mark">Wish</span>
                <span class="brand-context">Campaign Journal</span>
            </div>
            <span class="sep" aria-hidden="true"></span>
            <span class="header-title">Player Archive</span>
            <span class="spacer"></span>
            <button id="reset-btn" class="reset-btn" title="Reset all unlocks">Reset</button>
        </div>

        <section class="journal-intro" aria-labelledby="journal-title">
            <div class="chapter-label">Progressive Reveal</div>
            <h1 id="journal-title">Campaign Journal</h1>
            <p class="intro-copy">Enter the words discovered during play to reveal chapters, places, faces, and clues from the story.</p>
        </section>

        <div id="app"></div>
    </main>

    <div class="pw-bar">
        <input type="text" id="pw-input" placeholder="Enter a password..." autocomplete="off" spellcheck="false" autocapitalize="off">
        <button id="pw-btn">Unlock</button>
    </div>

    <!-- Fullscreen image viewer -->
    <div class="viewer-overlay" id="viewer">
        <button class="viewer-close" id="viewer-close">&times;</button>
        <div class="viewer-title" id="viewer-title"></div>
        <img class="viewer-img" id="viewer-img" src="" alt="">
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

                      { name: "Stage",        password: "curtains",       image: "images/chapter-3/Theatre - Stage.png" },
                      { name: "Magnifico",        password: "swan",       image: "images/chapter-3/Magnifico.PNG", hidden: true },
                { name: "Office",       password: "board",      image: "images/chapter-3/Theatre - Mangiafuoco's Office.png" },
                { name: "Conspiracy Wall",        password: "board",  image: "images/chapter-3/Consipircy Wall.png", hidden: true },
                { name: "Poster: The Wandering Circus of Marvels",          password: "board",      image: "images/chapter-3/Circus Poster circled.png", hidden: true },
                { name: "Poster: Missing Girl",         password: "board",     image: "images/chapter-3/Missing Poster circled.png", hidden: true },
                { name: "Poster: Freight",         password: "board",     image: "images/chapter-3/Freight Poster.png", hidden: true },
                { name: "Business Card",          password: "board",        image: "images/chapter-3/Business Card circled.png", hidden: true },
            ]
        }
    ];

    // ── State ──────────────────────────────────────────────
    const STORAGE_KEY = 'dnd-journal-unlocks';
    let unlocks = {};  // { "chapter-1": true, "chapter-1:crawfish": true, ... }
    let openChapters = {};

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) unlocks = JSON.parse(raw);
        } catch(e) { unlocks = {}; }
    }
    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(unlocks));
    }

    function isChapterUnlocked(ch) { return unlocks[ch.id] === true; }
    function isEntryUnlocked(ch, entry) {
        if (entry.autoUnlock && isChapterUnlocked(ch)) return true;
        return unlocks[ch.id + ':' + entry.password] === true;
    }

    // ── Rendering ──────────────────────────────────────────
    const app = document.getElementById('app');

    function render() {
        app.innerHTML = '';
        JOURNAL.forEach(ch => {
            const section = document.createElement('div');
            section.className = 'chapter';

            const unlocked = isChapterUnlocked(ch);
            const isOpen = openChapters[ch.id];

            // Chapter header
            const header = document.createElement('div');
            header.className = 'chapter-header' + (unlocked ? ' unlocked' : '');
            header.innerHTML = `
                <span class="${unlocked ? 'unlock-icon' : 'lock-icon'}">${unlocked ? 'Open' : 'Locked'}</span>
                <span class="chapter-title">${ch.title}</span>
                ${unlocked ? `<span class="chevron ${isOpen ? 'open' : ''}">&#9654;</span>` : ''}
            `;
            if (unlocked) {
                header.addEventListener('click', () => {
                    openChapters[ch.id] = !openChapters[ch.id];
                    render();
                });
            }
            section.appendChild(header);

            // Entries grid
            if (unlocked && isOpen) {
                const grid = document.createElement('div');
                grid.className = 'entries';

                ch.entries.forEach(entry => {
                    const eu = isEntryUnlocked(ch, entry);
                    const card = document.createElement('div');
                    card.className = 'entry' + (eu ? ' unlocked' : '');

                    if (eu) {
                        card.innerHTML = `
                            <img class="entry-thumb" src="${entry.image}" alt="${entry.name}" loading="lazy">
                            <div class="entry-name">${entry.name}</div>
                        `;
                        card.addEventListener('click', () => openViewer(entry.name, entry.image));
                    } else {
                        const displayName = entry.hidden ? '???' : entry.name;
                        card.innerHTML = `
                            <div class="entry-placeholder">???</div>
                            <div class="entry-name locked">${displayName}</div>
                        `;
                    }
                    grid.appendChild(card);
                });

                section.appendChild(grid);
            }

            app.appendChild(section);
        });
    }

    // ── Viewer ─────────────────────────────────────────────
    const viewer = document.getElementById('viewer');
    const viewerImg = document.getElementById('viewer-img');
    const viewerTitle = document.getElementById('viewer-title');

    function openViewer(name, src) {
        viewerTitle.textContent = name;
        viewerImg.src = src;
        viewer.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeViewer() {
        viewer.classList.remove('active');
        viewerImg.src = '';
        document.body.style.overflow = '';
    }

    document.getElementById('viewer-close').addEventListener('click', closeViewer);
    viewer.addEventListener('click', e => { if (e.target === viewer) closeViewer(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

    // ── Toast ──────────────────────────────────────────────
    const toast = document.getElementById('toast');
    let toastTimer;
    function showToast(msg) {
        clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── Password handling ──────────────────────────────────
    const pwInput = document.getElementById('pw-input');
    const pwBtn = document.getElementById('pw-btn');

    function tryUnlock() {
        const val = pwInput.value.trim().toLowerCase();
        if (!val) return;

        let found = false;

        // Check chapter passwords
        JOURNAL.forEach(ch => {
            if (String(ch.password).toLowerCase() === val && !unlocks[ch.id]) {
                unlocks[ch.id] = true;
                openChapters[ch.id] = true;
                found = true;
                showToast(ch.title + ' unlocked!');
            }
        });

        // Check entry passwords (only in unlocked chapters)
        JOURNAL.forEach(ch => {
            if (!isChapterUnlocked(ch)) return;
            ch.entries.forEach(entry => {
                const key = ch.id + ':' + entry.password;
                if (String(entry.password).toLowerCase() === val && !unlocks[key]) {
                    unlocks[key] = true;
                    found = true;
                    showToast(entry.name + ' unlocked!');
                }
            });
        });

        if (found) {
            saveState();
            render();
            pwInput.value = '';
        } else {
            pwInput.classList.add('error');
            setTimeout(() => pwInput.classList.remove('error'), 400);
        }
    }

    pwBtn.addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

    // ── Reset ──────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
        if (confirm('Reset all unlocked entries? This cannot be undone.')) {
            unlocks = {};
            openChapters = {};
            localStorage.removeItem(STORAGE_KEY);
            render();
            showToast('Journal reset');
        }
    });

    // ── Init ───────────────────────────────────────────────
    loadState();
    // Auto-open any unlocked chapters
    JOURNAL.forEach(ch => { if (isChapterUnlocked(ch)) openChapters[ch.id] = true; });
    render();
    </script>
</body>
</html>
