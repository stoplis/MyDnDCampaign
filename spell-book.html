<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wish — Spell Book</title>
    <style>
        :root {
            --bg: #faf8f4;
            --surface: #ffffff;
            --surface-2: #f3f0ea;
            --ink: #141414;
            --ink-2: #404040;
            --ink-3: #6b6b6b;
            --ink-4: #9a9a9a;
            --rule: #e6e1d6;
            --rule-strong: #1a1a1a;
            --accent: oklch(0.45 0.14 25);
            --accent-weak: oklch(0.95 0.04 25);
            --selected-bg: color-mix(in oklch, var(--ink) 7%, var(--surface));
            --fac-pc: oklch(0.55 0.13 245);
            --fac-pc-weak: color-mix(in oklch, oklch(0.55 0.13 245) 14%, var(--surface));
            --fac-ally: oklch(0.52 0.12 155);
            --fac-ally-weak: color-mix(in oklch, oklch(0.52 0.12 155) 14%, var(--surface));
            --warn: oklch(0.65 0.14 75);
            --warn-weak: color-mix(in oklch, oklch(0.65 0.14 75) 14%, var(--surface));
            --serif: "Source Serif 4", "Source Serif Pro", Georgia, "Times New Roman", serif;
            --sans: "Source Serif 4", "Source Serif Pro", Georgia, serif;
            --mono: "Source Serif 4", "Source Serif Pro", Georgia, serif;
            --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px;
            --s6: 24px; --s7: 32px; --s8: 48px; --s9: 64px;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: var(--sans);
            background:
                linear-gradient(180deg, color-mix(in oklch, var(--surface) 46%, transparent), transparent 360px),
                var(--bg);
            color: var(--ink);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; padding: 0; }
        input { font: inherit; color: inherit; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: color-mix(in oklch, var(--ink-4) 40%, transparent); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: var(--s5);
            min-height: 56px;
            padding: 0 var(--s6);
            border-bottom: 1px solid var(--rule);
            background: color-mix(in oklch, var(--surface) 94%, transparent);
            backdrop-filter: blur(14px);
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: var(--s2);
            min-width: 0;
        }
        .brand-mark {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--ink);
            white-space: nowrap;
        }
        .brand-context {
            font-family: var(--serif);
            font-size: 18px;
            font-style: italic;
            font-weight: 400;
            color: var(--ink-3);
            white-space: nowrap;
        }
        .sep {
            width: 1px;
            height: 20px;
            background: var(--rule);
        }
        .header-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-3);
            white-space: nowrap;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            padding: 6px 10px;
            border: 1px solid var(--rule);
            border-radius: 6px;
            background: var(--surface);
            color: var(--ink);
            font-size: 12.5px;
            font-weight: 500;
            letter-spacing: 0.01em;
            text-decoration: none;
            transition: background 120ms, border-color 120ms;
        }
        .back-link:hover {
            border-color: var(--ink-3);
            background: var(--surface-2);
        }

        .spell-intro {
            max-width: 980px;
            margin: 0 auto;
            padding: var(--s8) var(--s7) var(--s6);
        }
        .chapter-label {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: var(--s2);
        }
        h1 {
            margin: 0;
            font-family: var(--serif);
            font-size: clamp(34px, 5vw, 56px);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.05;
        }
        .intro-copy {
            max-width: 680px;
            margin: var(--s4) 0 0;
            color: var(--ink-2);
            font-size: 16px;
            line-height: 1.65;
        }

        .controls {
            position: sticky;
            top: 56px;
            z-index: 15;
            display: grid;
            grid-template-columns: minmax(220px, 320px) 1fr;
            gap: var(--s4);
            max-width: 1180px;
            margin: 0 auto;
            padding: var(--s4) var(--s7);
            border-top: 1px solid var(--rule);
            border-bottom: 1px solid var(--rule);
            background: color-mix(in oklch, var(--bg) 94%, transparent);
            backdrop-filter: blur(14px);
        }
        .search-bar {
            width: 100%;
            height: 40px;
            padding: 0 var(--s3);
            background: var(--surface);
            border: 1px solid var(--rule);
            border-radius: 6px;
            color: var(--ink);
            font-size: 15px;
            outline: none;
            transition: border-color 120ms, background 120ms;
        }
        .search-bar:focus { border-color: var(--accent); background: var(--surface); }
        .search-bar::placeholder { color: var(--ink-4); font-style: italic; }

        .filter-stack {
            display: flex;
            flex-direction: column;
            gap: var(--s2);
            min-width: 0;
        }

        .filter-row {
            display: flex;
            gap: var(--s2);
            flex-wrap: wrap;
        }
        .filter-btn {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--rule);
            background: var(--surface);
            color: var(--ink-3);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.01em;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            transition: background 120ms, border-color 120ms, color 120ms;
        }
        .filter-btn:hover {
            border-color: var(--ink-3);
            color: var(--ink);
            background: var(--surface-2);
        }
        .filter-btn.active {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--bg);
        }

        .school-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 5px;
            flex-shrink: 0;
        }

        .spell-list {
            max-width: 1180px;
            margin: 0 auto;
            padding: var(--s5) var(--s7) var(--s8);
            display: flex;
            flex-direction: column;
        }

        .spell-card {
            background: var(--surface);
            border-top: 1px solid var(--rule);
            cursor: pointer;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background 120ms, box-shadow 120ms;
        }
        .spell-card:last-child { border-bottom: 1px solid var(--rule); }
        .spell-card:hover {
            background: var(--surface-2);
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .spell-summary {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            padding: var(--s4) var(--s5);
            gap: var(--s4);
        }
        .spell-level-badge {
            width: 42px;
            height: 32px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            color: var(--ink-3);
            letter-spacing: 0.06em;
        }
        .spell-level-badge.cantrip {
            color: var(--fac-pc);
            border-color: color-mix(in oklch, var(--fac-pc) 38%, var(--rule));
            background: var(--fac-pc-weak);
        }
        .spell-level-badge.lv1 {
            color: var(--fac-ally);
            border-color: color-mix(in oklch, var(--fac-ally) 42%, var(--rule));
            background: var(--fac-ally-weak);
        }

        .spell-info { flex: 1; min-width: 0; }
        .spell-name {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -0.01em;
            line-height: 1.15;
        }
        .spell-sub {
            font-size: 12px;
            color: var(--ink-3);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .class-tag {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            padding: 2px 7px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .class-tag.sorcerer,
        .class-tag.both-s {
            background: var(--fac-pc-weak);
            border-color: color-mix(in oklch, var(--fac-pc) 38%, var(--rule));
            color: var(--fac-pc);
        }
        .class-tag.bard,
        .class-tag.both-b {
            background: var(--fac-ally-weak);
            border-color: color-mix(in oklch, var(--fac-ally) 42%, var(--rule));
            color: var(--fac-ally);
        }
        .spell-pill {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            padding: 2px 7px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            color: var(--ink-3);
            background: var(--bg);
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .spell-pill.conc {
            color: var(--accent);
            border-color: color-mix(in oklch, var(--accent) 38%, var(--rule));
            background: var(--accent-weak);
        }
        .spell-pill.ritual {
            color: var(--warn);
            border-color: color-mix(in oklch, var(--warn) 42%, var(--rule));
            background: var(--warn-weak);
        }

        .spell-chevron {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            color: var(--ink-3);
            font-size: 12px;
            line-height: 1;
            transition: transform 160ms, border-color 120ms, color 120ms;
            flex-shrink: 0;
        }
        .spell-card:hover .spell-chevron {
            border-color: var(--ink-3);
            color: var(--ink);
        }
        .spell-chevron.open { transform: rotate(90deg); }

        .spell-detail {
            display: none;
            padding: 0 var(--s5) var(--s5) 82px;
            border-top: 1px solid var(--rule);
            background: var(--surface);
        }
        .spell-detail.open { display: block; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            margin-top: var(--s4);
            margin-bottom: var(--s5);
            border: 1px solid var(--rule);
            background: var(--rule);
        }
        @media (min-width: 720px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }

        .stat-cell {
            background: var(--bg);
            padding: 10px 12px;
            min-width: 0;
        }
        .stat-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--ink-4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .stat-value {
            font-size: 14px;
            color: var(--ink);
            font-weight: 600;
            margin-top: 2px;
            overflow-wrap: anywhere;
        }

        .spell-desc {
            max-width: 840px;
            font-size: 15px;
            line-height: 1.68;
            color: var(--ink-2);
        }
        .higher-level {
            max-width: 840px;
            margin-top: var(--s5);
            padding: var(--s3) var(--s5);
            background: var(--surface-2);
            border-left: 2px solid var(--accent);
            font-size: 14px;
            color: var(--ink-2);
            line-height: 1.55;
        }
        .higher-label {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 10px;
            margin-bottom: 4px;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .text-token {
            display: inline;
            color: color-mix(in oklch, var(--warn) 72%, var(--ink));
            font-weight: 700;
        }

        .no-results {
            color: var(--ink-3);
            text-align: center;
            padding: var(--s8);
            font-size: 15px;
            border-top: 1px solid var(--rule);
            border-bottom: 1px solid var(--rule);
            background: var(--surface);
        }

        .sc-Abjuration    { background: #3b82f6; }
        .sc-Conjuration   { background: #f59e0b; }
        .sc-Divination    { background: #8b5cf6; }
        .sc-Enchantment   { background: #ec4899; }
        .sc-Evocation     { background: #ef4444; }
        .sc-Illusion      { background: #06b6d4; }
        .sc-Necromancy    { background: #22c55e; }
        .sc-Transmutation { background: #f97316; }

        @media (max-width: 760px) {
            .header {
                gap: var(--s3);
                padding: 0 var(--s4);
            }
            .brand {
                flex-direction: column;
                gap: 0;
                line-height: 1.05;
            }
            .brand-mark,
            .brand-context {
                font-size: 16px;
            }
            .sep,
            .header-title {
                display: none;
            }
            .spell-intro {
                padding: var(--s7) var(--s5) var(--s5);
            }
            h1 { font-size: 38px; }
            .intro-copy { font-size: 15px; }
            .controls {
                position: static;
                grid-template-columns: 1fr;
                gap: var(--s3);
                padding: var(--s4) var(--s5);
            }
            .filter-row {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 2px;
            }
            .spell-list {
                padding: var(--s5) var(--s5) var(--s8);
            }
            .spell-summary {
                grid-template-columns: auto minmax(0, 1fr) auto;
                gap: var(--s3);
                padding: var(--s4) 0;
            }
            .spell-name {
                font-size: 18px;
            }
            .spell-detail {
                padding: 0 0 var(--s5);
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-link">Back</a>
        <div class="brand" aria-label="Wish Spell Book">
            <span class="brand-mark">Wish</span>
            <span class="brand-context">Spell Book</span>
        </div>
        <span class="sep" aria-hidden="true"></span>
        <span class="header-title">Player Reference</span>
    </div>

    <section class="spell-intro" aria-labelledby="spell-title">
        <div class="chapter-label">Cantrips and Level 1</div>
        <h1 id="spell-title">Spell Book</h1>
        <p class="intro-copy">Search Hannah and Mum's current spell lists by class, level, and school.</p>
    </section>

    <div class="controls">
        <input type="text" class="search-bar" id="search" placeholder="Search spells...">
        <div class="filter-stack">
            <div class="filter-row" id="class-filters"></div>
            <div class="filter-row" id="level-filters"></div>
            <div class="filter-row" id="school-filters"></div>
        </div>
    </div>

    <div class="spell-list" id="list"></div>

    <script>
    const SPELLS = [{"name":"Acid Splash","level":0,"school":"Evocation","castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You create an acidic bubble at a point within range, where it explodes in a 5-foot-radius Sphere. Each creature in that Sphere must succeed on a Dexterity saving throw or take 1d6 Acid damage.","higherLevel":"The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).","classes":"sorcerer"},{"name":"Blade Ward","level":0,"school":"Abjuration","castingTime":"1 action","range":"self","components":"V, S","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"Whenever a creature makes an attack roll against you before the spell ends, the attacker subtracts 1d4 from the attack roll.","higherLevel":"","classes":"both"},{"name":"Chill Touch","level":0,"school":"Necromancy","castingTime":"1 action","range":"touch","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"Channeling the chill of the grave, make a melee spell attack against a target within reach. On a hit, the target takes 1d10 Necrotic damage, and it can't regain Hit Points until the end of your next turn.","higherLevel":"The damage increases by 1d10 when you reach levels 5 (2d10), 11 (3d10), and 17 (4d10).","classes":"sorcerer"},{"name":"Dancing Lights","level":0,"school":"Illusion","castingTime":"1 action","range":"120 feet","components":"V, S, M (a bit of phosphorus)","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"You create up to four torch-size lights within range, making them appear as torches, lanterns, or glowing orbs that hover for the duration. Alternatively, you combine the four lights into one glowing Medium form that is vaguely humanlike. Whichever form you choose, each light sheds Dim Light in a 10-foot radius.\nAs a Bonus Action, you can move the lights up to 60 feet to a space within range. A light must be within 20 feet of another light created by this spell, and a light vanishes if it exceeds the spell's range.","higherLevel":"","classes":"both"},{"name":"Elementalism","level":0,"school":"Transmutation","castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You exert control over the elements, creating one of the following effects within range.\nYou create a breeze strong enough to ripple cloth, stir dust, rustle leaves, and close open doors and shutters, all in a 5-foot Cube. Doors and shutters being held open by someone or something aren't affected.\nYou create a thin shroud of dust or sand that covers surfaces in a 5-foot-square area, or you cause a single word to appear in your handwriting in a patch of dirt or sand.\nYou create a thin cloud of harmless embers and colored, scented smoke in a 5-foot Cube. You choose the color and scent, and the embers can light candles, torches, or lamps in that area. The smoke's scent lingers for 1 minute.\nYou create a spray of cool mist that lightly dampens creatures and objects in a 5-foot Cube. Alternatively, you create 1 cup of clean water either in an open container or on a surface, and the water evaporates in 1 minute.\nYou cause dirt, sand, fire, smoke, mist, or water that can fit in a 1-foot Cube to assume a crude shape (such as that of a creature) for 1 hour.","higherLevel":"","classes":"sorcerer"},{"name":"Fire Bolt","level":0,"school":"Evocation","castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You hurl a mote of fire at a creature or an object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 Fire damage. A flammable object hit by this spell starts burning if it isn't being worn or carried.","higherLevel":"The damage increases by 1d10 when you reach levels 5 (2d10), 11 (3d10), and 17 (4d10).","classes":"sorcerer"},{"name":"Friends","level":0,"school":"Enchantment","castingTime":"1 action","range":"10 feet","components":"S, M (some makeup)","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"You magically emanate a sense of friendship toward one creature you can see within range. The target must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The target succeeds automatically if it isn't a Humanoid, if you're fighting it, or if you have cast this spell on it within the past 24 hours.\nThe spell ends early if the target takes damage or if you make an attack roll, deal damage, or force anyone to make a saving throw. When the spell ends, the target knows it was Charmed by you.","higherLevel":"","classes":"both"},{"name":"Light","level":0,"school":"Evocation","castingTime":"1 action","range":"touch","components":"V, M (a firefly or phosphorescent moss)","duration":"1 hour","concentration":false,"ritual":false,"desc":"You touch one Large or smaller object that isn't being worn or carried by someone else. Until the spell ends, the object sheds Bright Light in a 20-foot radius and Dim Light for an additional 20 feet. The light can be colored as you like.\nCovering the object with something opaque blocks the light. The spell ends if you cast it again.","higherLevel":"","classes":"both"},{"name":"Mage Hand","level":0,"school":"Conjuration","castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 minute","concentration":false,"ritual":false,"desc":"A spectral, floating hand appears at a point you choose within range. The hand lasts for the duration. The hand vanishes if it is ever more than 30 feet away from you or if you cast this spell again.\nWhen you cast the spell, you can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a vial.\nAs a Magic action on your later turns, you can control the hand thus again. As part of that action, you can move the hand up to 30 feet.\nThe hand can't attack, activate magic items, or carry more than 10 pounds.","higherLevel":"","classes":"both"},{"name":"Mending","level":0,"school":"Transmutation","castingTime":"1 minute","range":"touch","components":"V, S, M (two lodestones)","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"This spell repairs a single break or tear in an object you touch, such as a broken chain link, two halves of a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no larger than 1 foot in any dimension, you mend it, leaving no trace of the former damage.\nThis spell can physically repair a magic item, but it can't restore magic to such an object.","higherLevel":"","classes":"both"},{"name":"Message","level":0,"school":"Transmutation","castingTime":"1 action","range":"120 feet","components":"S, M (a copper wire)","duration":"1 round","concentration":false,"ritual":false,"desc":"You point toward a creature within range and whisper a message. The target (and only the target) hears the message and can reply in a whisper that only you can hear.\nYou can cast this spell through solid objects if you are familiar with the target and know it is beyond the barrier. Magical silence; 1 foot of stone, metal, or wood; or a thin sheet of lead blocks the spell.","higherLevel":"","classes":"both"},{"name":"Mind Sliver","level":0,"school":"Enchantment","castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You try to temporarily sliver the mind of one creature you can see within range. The target must succeed on an Intelligence saving throw or take 1d6 Psychic damage and subtract 1d4 from the next saving throw it makes before the end of your next turn.","higherLevel":"The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).","classes":"sorcerer"},{"name":"Minor Illusion","level":0,"school":"Illusion","castingTime":"1 action","range":"30 feet","components":"S, M (a bit of fleece)","duration":"1 minute","concentration":false,"ritual":false,"desc":"You create a sound or an image of an object within range that lasts for the duration. See the descriptions below for the effects of each. The illusion ends if you cast this spell again.\nIf a creature takes a Study action to examine the sound or image, the creature can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the illusion becomes faint to the creature.\nIf you create a sound, its volume can range from a whisper to a scream. It can be your voice, someone else's voice, a lion's roar, a beating of drums, or any other sound you choose. The sound continues unabated throughout the duration, or you can make discrete sounds at different times before the spell ends.\nIf you create an image of an object—such as a chair, muddy footprints, or a small chest—it must be no larger than a 5-foot Cube. The image can't create sound, light, smell, or any other sensory effect. Physical interaction with the image reveals it to be an illusion, since things can pass through it.","higherLevel":"","classes":"both"},{"name":"Poison Spray","level":0,"school":"Necromancy","castingTime":"1 action","range":"30 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You spray toxic mist at a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d12 Poison damage.","higherLevel":"The damage increases by 1d12 when you reach levels 5 (2d12), 11 (3d12), and 17 (4d12).","classes":"sorcerer"},{"name":"Prestidigitation","level":0,"school":"Transmutation","castingTime":"1 action","range":"10 feet","components":"V, S","duration":"1 hour","concentration":false,"ritual":false,"desc":"You create a magical effect within range. Choose the effect from the options below. If you cast this spell multiple times, you can have up to three of its non-instantaneous effects active at a time.\nYou create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor.\nYou instantaneously light or snuff out a candle, a torch, or a small campfire.\nYou instantaneously clean or soil an object no larger than 1 cubic foot.\nYou chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour.\nYou make a color, a small mark, or a symbol appear on an object or a surface for 1 hour.\nYou create a nonmagical trinket or an illusory image that can fit in your hand. It lasts until the end of your next turn. A trinket can deal no damage and has no monetary worth.","higherLevel":"","classes":"both"},{"name":"Ray of Frost","level":0,"school":"Evocation","castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"A frigid beam of blue-white light streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, it takes 1d8 Cold damage, and its Speed is reduced by 10 feet until the start of your next turn.","higherLevel":"The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).","classes":"sorcerer"},{"name":"Shocking Grasp","level":0,"school":"Evocation","castingTime":"1 action","range":"touch","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"Lightning springs from you to a creature that you try to touch. Make a melee spell attack against the target. On a hit, the target takes 1d8 Lightning damage, and it can't make Opportunity Attacks until the start of its next turn.","higherLevel":"The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).","classes":"sorcerer"},{"name":"Sorcerous Burst","level":0,"school":"Evocation","castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You cast sorcerous energy at one creature or object within range. Make a ranged attack roll against the target. On a hit, the target takes 1d8 damage of a type you choose: Acid, Cold, Fire, Lightning, Poison, Psychic, or Thunder.\nIf you roll an 8 on a d8 for this spell, you can roll another d8, and add it to the damage. When you cast this spell, the maximum number of these d8s you can add to the spell's damage equals your spellcasting ability modifier.","higherLevel":"The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).","classes":"sorcerer"},{"name":"Starry Wisp","level":0,"school":"Evocation","castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You launch a mote of light at one creature or object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d8 Radiant damage, and until the end of your next turn, it emits Dim Light in a 10-foot radius and can't benefit from the Invisible condition.","higherLevel":"The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).","classes":"bard"},{"name":"Thunderclap","level":0,"school":"Evocation","castingTime":"1 action","range":"Emanation","components":"S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"Each creature in a 5-foot Emanation originating from you must succeed on a Constitution saving throw or take 1d6 Thunder damage. The spell's thunderous sound can be heard up to 100 feet away.","higherLevel":"The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).","classes":"both"},{"name":"True Strike","level":0,"school":"Divination","castingTime":"1 action","range":"self","components":"S, M (a weapon with which you have proficiency and that is worth 1+ CP)","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"Guided by a flash of magical insight, you make one attack with the weapon used in the spell's casting. The attack uses your spellcasting ability for the attack and damage rolls instead of using Strength or Dexterity. If the attack deals damage, it can be Radiant damage or the weapon's normal damage type (your choice).","higherLevel":"Whether you deal Radiant damage or the weapon's normal damage type, the attack deals extra Radiant damage when you reach levels 5 (1d6), 11 (2d6), and 17 (3d6).","classes":"both"},{"name":"Vicious Mockery","level":0,"school":"Enchantment","castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You unleash a string of insults laced with subtle enchantments at one creature you can see or hear within range. The target must succeed on a Wisdom saving throw or take 1d6 Psychic damage and have Disadvantage on the next attack roll it makes before the end of its next turn.","higherLevel":"The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).","classes":"bard"},{"name":"Animal Friendship","level":1,"school":"Enchantment","castingTime":"1 action","range":"30 feet","components":"V, S, M (a morsel of food)","duration":"24 hour","concentration":false,"ritual":false,"desc":"Target a Beast that you can see within range. The target must succeed on a Wisdom saving throw or have the Charmed condition for the duration. If you or one of your allies deals damage to the target, the spells ends.","higherLevel":"You can target one additional Beast for each spell slot level above 1.","classes":"bard"},{"name":"Bane","level":1,"school":"Enchantment","castingTime":"1 action","range":"30 feet","components":"V, S, M (a drop of blood)","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"Up to three creatures of your choice that you can see within range must each make a Charisma saving throw. Whenever a target that fails this save makes an attack roll or a saving throw before the spell ends, the target must subtract 1d4 from the attack roll or save.","higherLevel":"You can target one additional creature for each spell slot level above 1.","classes":"bard"},{"name":"Burning Hands","level":1,"school":"Evocation","castingTime":"1 action","range":"Cone","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"A thin sheet of flames shoots forth from you. Each creature in a 15-foot Cone makes a Dexterity saving throw, taking 3d6 Fire damage on a failed save or half as much damage on a successful one.\nFlammable objects in the Cone that aren't being worn or carried start burning.","higherLevel":"The damage increases by 1d6 for each spell slot level above 1.","classes":"sorcerer"},{"name":"Charm Person","level":1,"school":"Enchantment","castingTime":"1 action","range":"30 feet","components":"V, S","duration":"1 hour","concentration":false,"ritual":false,"desc":"One Humanoid you can see within range makes a Wisdom saving throw. It does so with Advantage if you or your allies are fighting it. On a failed save, the target has the Charmed condition until the spell ends or until you or your allies damage it. The Charmed creature is Friendly to you. When the spell ends, the target knows it was Charmed by you.","higherLevel":"You can target one additional creature for each spell slot level above 1.","classes":"both"},{"name":"Chromatic Orb","level":1,"school":"Evocation","castingTime":"1 action","range":"90 feet","components":"V, S, M (a diamond worth 50+ GP)","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You hurl an orb of energy at a target within range. Choose Acid, Cold, Fire, Lightning, Poison, or Thunder for the type of orb you create, and then make a ranged spell attack against the target. On a hit, the target takes 3d8 damage of the chosen type.\nIf you roll the same number on two or more of the d8s, the orb leaps to a different target of your choice within 30 feet of the target. Make an attack roll against the new target, and make a new damage roll. The orb can't leap again unless you cast the spell with a level 2+ spell slot.","higherLevel":"The damage increases by 1d8 for each spell slot level above 1. The orb can leap a maximum number of times equal to the level of the slot expended, and a creature can be targeted only once by each casting of this spell.","classes":"sorcerer"},{"name":"Color Spray","level":1,"school":"Illusion","castingTime":"1 action","range":"Cone","components":"V, S, M (a pinch of colorful sand)","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You launch a dazzling array of flashing, colorful light. Each creature in a 15-foot Cone originating from you must succeed on a Constitution saving throw or have the Blinded condition until the end of your next turn.","higherLevel":"","classes":"both"},{"name":"Command","level":1,"school":"Enchantment","castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You speak a one-word command to a creature you can see within range. The target must succeed on a Wisdom saving throw or follow the command on its next turn. Choose the command from these options:\nThe target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you.\nThe target drops whatever it is holding and then ends its turn.\nThe target spends its turn moving away from you by the fastest available means.\nThe target has the Prone condition and then ends its turn.\nOn its turn, the target doesn't move and takes no action or Bonus Action.","higherLevel":"You can affect one additional creature for each spell slot level above 1.","classes":"bard"},{"name":"Comprehend Languages","level":1,"school":"Divination","castingTime":"1 action","range":"self","components":"V, S, M (a pinch of soot and salt)","duration":"1 hour","concentration":false,"ritual":true,"desc":"For the duration, you understand the literal meaning of any language that you hear or see signed. You also understand any written language that you see, but you must be touching the surface on which the words are written. It takes about 1 minute to read one page of text. This spell doesn't decode symbols or secret messages.","higherLevel":"","classes":"both"},{"name":"Cure Wounds","level":1,"school":"Abjuration","castingTime":"1 action","range":"touch","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"A creature you touch regains a number of Hit Points equal to 2d8 plus your spellcasting ability modifier.","higherLevel":"The healing increases by 2d8 for each spell slot level above 1.","classes":"bard"},{"name":"Detect Magic","level":1,"school":"Divination","castingTime":"1 action","range":"Sphere","components":"V, S","duration":"Concentration, up to 10 minute","concentration":true,"ritual":true,"desc":"For the duration, you sense the presence of magical effects within 30 feet of yourself. If you sense such effects, you can take the Magic action to see a faint aura around any visible creature or object in the area that bears the magic, and if an effect was created by a spell, you learn the spell's Schools of Magic.\nThe spell is blocked by 1 foot of stone, dirt, or wood; 1 inch of metal; or a thin sheet of lead.","higherLevel":"","classes":"both"},{"name":"Disguise Self","level":1,"school":"Illusion","castingTime":"1 action","range":"self","components":"V, S","duration":"1 hour","concentration":false,"ritual":false,"desc":"You make yourself—including your clothing, armor, weapons, and other belongings on your person—look different until the spell ends. You can seem 1 foot shorter or taller and can appear heavier or lighter. You must adopt a form that has the same basic arrangement of limbs as you have. Otherwise, the extent of the illusion is up to you.\nThe changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to your outfit, objects pass through the hat, and anyone who touches it would feel nothing.\nTo discern that you are disguised, a creature must take the Study action to inspect your appearance and succeed on an Intelligence (Investigation) check against your spell save DC.","higherLevel":"","classes":"both"},{"name":"Dissonant Whispers","level":1,"school":"Enchantment","castingTime":"1 action","range":"60 feet","components":"V","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"One creature of your choice that you can see within range hears a discordant melody in its mind. The target makes a Wisdom saving throw. On a failed save, it takes 3d6 Psychic damage and must immediately use its Reaction, if available, to move as far away from you as it can, using the safest route. On a successful save, the target takes half as much damage only.","higherLevel":"The damage increases by 1d6 for each spell slot level above 1.","classes":"bard"},{"name":"Expeditious Retreat","level":1,"school":"Transmutation","castingTime":"1 bonus","range":"self","components":"V, S","duration":"Concentration, up to 10 minute","concentration":true,"ritual":false,"desc":"You take the Dash action, and until the spell ends, you can take that action again as a Bonus Action.","higherLevel":"","classes":"sorcerer"},{"name":"Faerie Fire","level":1,"school":"Evocation","castingTime":"1 action","range":"60 feet","components":"V","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"Objects in a 20-foot Cube within range are outlined in blue, green, or violet light (your choice). Each creature in the Cube is also outlined if it fails a Dexterity saving throw. For the duration, objects and affected creatures shed Dim Light in a 10-foot radius and can't benefit from the Invisible condition.\nAttack rolls against an affected creature or object have Advantage if the attacker can see it.","higherLevel":"","classes":"bard"},{"name":"False Life","level":1,"school":"Necromancy","castingTime":"1 action","range":"self","components":"V, S, M (a drop of alcohol)","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You gain 2d4 + 4 Temporary Hit Points.","higherLevel":"You gain 5 additional Temporary Hit Points for each spell slot level above 1.","classes":"sorcerer"},{"name":"Feather Fall","level":1,"school":"Transmutation","castingTime":"1 reaction (which you take when you or a creature you can see within 60 feet of you falls)","range":"60 feet","components":"V, M (a small feather or piece of down)","duration":"1 minute","concentration":false,"ritual":false,"desc":"Choose up to five falling creatures within range. A falling creature's rate of descent slows to 60 feet per round until the spell ends. If a creature lands before the spell ends, the creature takes no damage from the fall, and the spell ends for that creature.","higherLevel":"","classes":"both"},{"name":"Fog Cloud","level":1,"school":"Conjuration","castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Concentration, up to 1 hour","concentration":true,"ritual":false,"desc":"You create a 20-foot-radius Sphere of fog centered on a point within range. The Sphere is Heavily Obscured. It lasts for the duration or until a strong wind (such as one created by Gust of Wind) disperses it.","higherLevel":"The fog's radius increases by 20 feet for each spell slot level above 1.","classes":"sorcerer"},{"name":"Grease","level":1,"school":"Conjuration","castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of pork rind or butter)","duration":"1 minute","concentration":false,"ritual":false,"desc":"Nonflammable grease covers the ground in a 10-foot square centered on a point within range and turns it into Difficult Terrain for the duration.\nWhen the grease appears, each creature standing in its area must succeed on a Dexterity saving throw or have the Prone condition. A creature that enters the area or ends its turn there must also succeed on that save or fall Prone.","higherLevel":"","classes":"sorcerer"},{"name":"Healing Word","level":1,"school":"Abjuration","castingTime":"1 bonus","range":"60 feet","components":"V","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"A creature of your choice that you can see within range regains Hit Points equal to 2d4 plus your spellcasting ability modifier.","higherLevel":"The healing increases by 2d4 for each spell slot level above 1.","classes":"bard"},{"name":"Heroism","level":1,"school":"Enchantment","castingTime":"1 action","range":"touch","components":"V, S","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"A willing creature you touch is imbued with bravery. Until the spell ends, the creature is immune to the Frightened condition and gains Temporary Hit Points equal to your spellcasting ability modifier at the start of each of its turns.","higherLevel":"You can target one additional creature for each spell slot level above 1.","classes":"bard"},{"name":"Ice Knife","level":1,"school":"Conjuration","castingTime":"1 action","range":"60 feet","components":"S, M (a drop of water or a piece of ice)","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You create a shard of ice and fling it at one creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 Piercing damage. Hit or miss, the shard then explodes. The target and each creature within 5 feet of it must succeed on a Dexterity saving throw or take 2d6 Cold damage.","higherLevel":"The Cold damage increases by 1d6 for each spell slot level above 1.","classes":"sorcerer"},{"name":"Identify","level":1,"school":"Divination","castingTime":"1 minute","range":"touch","components":"V, S, M (a pearl worth 100+ GP)","duration":"Instantaneous","concentration":false,"ritual":true,"desc":"You touch an object throughout the spell's casting. If the object is a magic item or some other magical object, you learn its properties and how to use them, whether it requires Attunement, and how many charges it has, if any. You learn whether any ongoing spells are affecting the item and what they are. If the item was created by a spell, you learn that spell's name.\nIf you instead touch a creature throughout the casting, you learn which ongoing spells, if any, are currently affecting it.","higherLevel":"","classes":"bard"},{"name":"Illusory Script","level":1,"school":"Illusion","castingTime":"1 minute","range":"touch","components":"S, M (ink worth 10+ GP, which the spell consumes)","duration":"10 day","concentration":false,"ritual":true,"desc":"You write on parchment, paper, or another suitable material and imbue it with an illusion that lasts for the duration. To you and any creatures you designate when you cast the spell, the writing appears normal, seems to be written in your hand, and conveys whatever meaning you intended when you wrote the text. To all others, the writing appears as if it were written in an unknown or magical script that is unintelligible. Alternatively, the illusion can alter the meaning, handwriting, and language of the text, though the language must be one you know.\nIf the spell is dispelled, the original script and the illusion both disappear.\nA creature that has Truesight can read the hidden message.","higherLevel":"","classes":"bard"},{"name":"Jump","level":1,"school":"Transmutation","castingTime":"1 bonus","range":"touch","components":"V, S, M (a grasshopper's hind leg)","duration":"1 minute","concentration":false,"ritual":false,"desc":"You touch a willing creature. Once on each of its turns until the spell ends, that creature can jump up to 30 feet by spending 10 feet of movement.","higherLevel":"You can target one additional creature for each spell slot level above 1.","classes":"sorcerer"},{"name":"Longstrider","level":1,"school":"Transmutation","castingTime":"1 action","range":"touch","components":"V, S, M (a pinch of dirt)","duration":"1 hour","concentration":false,"ritual":false,"desc":"You touch a creature. The target's Speed increases by 10 feet until the spell ends.","higherLevel":"You can target one additional creature for each spell slot level above 1.","classes":"bard"},{"name":"Mage Armor","level":1,"school":"Abjuration","castingTime":"1 action","range":"touch","components":"V, S, M (a piece of cured leather)","duration":"8 hour","concentration":false,"ritual":false,"desc":"You touch a willing creature who isn't wearing armor. Until the spell ends, the target's base AC becomes 13 plus its Dexterity modifier. The spell ends early if the target dons armor.","higherLevel":"","classes":"sorcerer"},{"name":"Magic Missile","level":1,"school":"Evocation","castingTime":"1 action","range":"120 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You create three glowing darts of magical force. Each dart strikes a creature of your choice that you can see within range. A dart deals 1d4 + 1 Force damage to its target. The darts all strike simultaneously, and you can direct them to hit one creature or several.","higherLevel":"The spell creates one more dart for each spell slot level above 1.","classes":"sorcerer"},{"name":"Ray of Sickness","level":1,"school":"Necromancy","castingTime":"1 action","range":"60 feet","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You shoot a greenish ray at a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 2d8 Poison damage and has the Poisoned condition until the end of your next turn.","higherLevel":"The damage increases by 1d8 for each spell slot level above 1.","classes":"sorcerer"},{"name":"Shield","level":1,"school":"Abjuration","castingTime":"1 reaction (which you take when you are hit by an attack roll or targeted by the Magic Missile spell)","range":"self","components":"V, S","duration":"1 round","concentration":false,"ritual":false,"desc":"An imperceptible barrier of magical force protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from Magic Missile.","higherLevel":"","classes":"sorcerer"},{"name":"Silent Image","level":1,"school":"Illusion","castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of fleece)","duration":"Concentration, up to 10 minute","concentration":true,"ritual":false,"desc":"You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 15-foot Cube. The image appears at a spot within range and lasts for the duration. The image is purely visual; it isn't accompanied by sound, smell, or other sensory effects.\nAs a Magic action, you can cause the image to move to any spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking.\nPhysical interaction with the image reveals it to be an illusion, since things can pass through it. A creature that takes a Study action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image.","higherLevel":"","classes":"both"},{"name":"Sleep","level":1,"school":"Enchantment","castingTime":"1 action","range":"60 feet","components":"V, S, M (a pinch of sand or rose petals)","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"Each creature of your choice in a 5-foot-radius Sphere centered on a point within range must succeed on a Wisdom saving throw or have the Incapacitated condition until the end of its next turn, at which point it must repeat the save. If the target fails the second save, the target has the Unconscious condition for the duration. The spell ends on a target if it takes damage or someone within 5 feet of it takes an action to shake it out of the spell's effect.\nCreatures that don't sleep, such as elves, or that have Immunity to the Exhaustion condition automatically succeed on saves against this spell.","higherLevel":"","classes":"both"},{"name":"Speak with Animals","level":1,"school":"Divination","castingTime":"1 action","range":"self","components":"V, S","duration":"10 minute","concentration":false,"ritual":true,"desc":"For the duration, you can comprehend and verbally communicate with Beasts, and you can use any of the Influence action's skill options with them.\nMost Beasts have little to say about topics that don't pertain to survival or companionship, but at minimum, a Beast can give you information about nearby locations and monsters, including whatever it has perceived within the past day.","higherLevel":"","classes":"bard"},{"name":"Tasha's Hideous Laughter","level":1,"school":"Enchantment","castingTime":"1 action","range":"30 feet","components":"V, S, M (a tart and a feather)","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"One creature of your choice that you can see within range makes a Wisdom saving throw. On a failed save, it has the Prone and Incapacitated conditions for the duration. During that time, it laughs uncontrollably if it's capable of laughter, and it can't end the Prone condition on itself.\nAt the end of each of its turns and each time it takes damage, it makes another Wisdom saving throw. The target has Advantage on the save if the save is triggered by damage. On a successful save, the spell ends.","higherLevel":"You can target one additional creature for each spell slot level above 1.","classes":"bard"},{"name":"Thunderwave","level":1,"school":"Evocation","castingTime":"1 action","range":"Cube","components":"V, S","duration":"Instantaneous","concentration":false,"ritual":false,"desc":"You unleash a wave of thunderous energy. Each creature in a 15-foot Cube originating from you makes a Constitution saving throw. On a failed save, a creature takes 2d8 Thunder damage and is pushed 10 feet away from you. On a successful save, a creature takes half as much damage only.\nIn addition, unsecured objects that are entirely within the Cube are pushed 10 feet away from you, and a thunderous boom is audible within 300 feet.","higherLevel":"The damage increases by 1d8 for each spell slot level above 1.","classes":"both"},{"name":"Unseen Servant","level":1,"school":"Conjuration","castingTime":"1 action","range":"60 feet","components":"V, S, M (a bit of string and of wood)","duration":"1 hour","concentration":false,"ritual":true,"desc":"This spell creates an Invisible, mindless, shapeless, Medium force that performs simple tasks at your command until the spell ends. The servant springs into existence in an unoccupied space on the ground within range. It has AC 10, 1 Hit Point, and a Strength of 2, and it can't attack. If it drops to 0 Hit Points, the spell ends.\nOnce on each of your turns as a Bonus Action, you can mentally command the servant to move up to 15 feet and interact with an object. The servant can perform simple tasks that a human could do, such as fetching things, cleaning, mending, folding clothes, lighting fires, serving food, and pouring drinks. Once you give the command, the servant performs the task to the best of its ability until it completes the task, then waits for your next command.\nIf you command the servant to perform a task that would move it more than 60 feet away from you, the spell ends.","higherLevel":"","classes":"bard"},{"name":"Witch Bolt","level":1,"school":"Evocation","castingTime":"1 action","range":"60 feet","components":"V, S, M (a twig struck by lightning)","duration":"Concentration, up to 1 minute","concentration":true,"ritual":false,"desc":"A beam of crackling energy lances toward a creature within range, forming a sustained arc of lightning between you and the target. Make a ranged spell attack against it. On a hit, the target takes 2d12 Lightning damage.\nOn each of your subsequent turns, you can take a Bonus Action to deal 1d12 Lightning damage to the target automatically, even if the first attack missed.\nThe spell ends if the target is ever outside the spell's range or if it has Total Cover from you.","higherLevel":"The initial damage increases by 1d12 for each spell slot level above 1.","classes":"sorcerer"}];

    // School colours for dot
    const SCHOOL_COLOUR = {
        Abjuration:'#3b82f6', Conjuration:'#f59e0b', Divination:'#8b5cf6',
        Enchantment:'#ec4899', Evocation:'#ef4444', Illusion:'#06b6d4',
        Necromancy:'#22c55e', Transmutation:'#f97316'
    };

    const CLASS_FILTERS = ['All', 'Sorcerer', 'Bard', 'Shared'];
    const LEVEL_FILTERS = ['All', 'Cantrip', 'Level 1'];
    const SCHOOLS = ['All', ...Array.from(new Set(SPELLS.map(s => s.school))).sort()];

    let activeClass = 'All', activeLevel = 'All', activeSchool = 'All';
    let openCards = new Set();
    let searchTerm = '';

    // Build filter buttons
    function renderFilterRow(containerId, options, active, onClick) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn' + (opt === active ? ' active' : '');
            if (containerId === 'school-filters' && opt !== 'All') {
                btn.innerHTML = `<span class="school-dot" style="background:${SCHOOL_COLOUR[opt]||'#888'}"></span>${opt}`;
            } else {
                btn.textContent = opt;
            }
            btn.addEventListener('click', () => onClick(opt));
            el.appendChild(btn);
        });
    }

    function matchesClass(sp) {
        if (activeClass === 'All') return true;
        if (activeClass === 'Sorcerer') return sp.classes === 'sorcerer' || sp.classes === 'both';
        if (activeClass === 'Bard')     return sp.classes === 'bard'     || sp.classes === 'both';
        if (activeClass === 'Shared')   return sp.classes === 'both';
        return true;
    }

    function filtered() {
        return SPELLS.filter(sp => {
            if (!matchesClass(sp)) return false;
            if (activeLevel === 'Cantrip' && sp.level !== 0) return false;
            if (activeLevel === 'Level 1' && sp.level !== 1) return false;
            if (activeSchool !== 'All' && sp.school !== activeSchool) return false;
            if (searchTerm) {
                const q = searchTerm.toLowerCase();
                return sp.name.toLowerCase().includes(q) ||
                       sp.desc.toLowerCase().includes(q) ||
                       sp.school.toLowerCase().includes(q);
            }
            return true;
        });
    }

    const HIGHLIGHT_TERMS = [
        'Temporary Hit Points', 'Opportunity Attacks', 'Difficult Terrain',
        'Heavily Obscured', 'Bright Light', 'Dim Light', 'Total Cover',
        'Bonus Action', 'Magic action', 'Study action', 'Dash action',
        'saving throw', 'attack roll', 'spell attack', 'Hit Points',
        'Concentration', 'Reaction', 'Advantage', 'Disadvantage',
        'Charmed', 'Frightened', 'Grappled', 'Incapacitated', 'Invisible',
        'Poisoned', 'Prone', 'Unconscious', 'Attunement', 'Truesight',
        'AC', 'Speed'
    ];
    const HIGHLIGHT_RE = new RegExp(
        '\\b(?:\\d+d\\d+(?:\\s*[+\\-]\\s*\\d+)?|[+\\-]\\d+|' +
        HIGHLIGHT_TERMS
            .sort((a, b) => b.length - a.length)
            .map(term => term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+'))
            .join('|') +
        ')\\b',
        'gi'
    );

    function escapeHtml(text) {
        return text.replace(/[&<>"']/g, ch => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[ch]));
    }

    function formatSpellText(text) {
        return escapeHtml(text).replace(HIGHLIGHT_RE, '<span class="text-token">$&</span>');
    }

    function renderList() {
        const list = document.getElementById('list');
        const spells = filtered();
        list.innerHTML = '';

        if (!spells.length) {
            list.innerHTML = '<div class="no-results">No spells match your filters.</div>';
            return;
        }

        spells.forEach(sp => {
            const isOpen = openCards.has(sp.name);
            const levelLabel = sp.level === 0 ? 'C' : sp.level.toString();
            const levelClass = sp.level === 0 ? 'cantrip' : 'lv' + sp.level;

            // Class tags
            let classTags = '';
            if (sp.classes === 'both') {
                classTags = '<span class="class-tag both-s">Sorcerer</span><span class="class-tag both-b">Bard</span>';
            } else if (sp.classes === 'sorcerer') {
                classTags = '<span class="class-tag sorcerer">Sorcerer</span>';
            } else {
                classTags = '<span class="class-tag bard">Bard</span>';
            }

            // Ritual / concentration badges
            let badges = '';
            if (sp.concentration) badges += '<span class="spell-pill conc">Conc.</span> ';
            if (sp.ritual)        badges += '<span class="spell-pill ritual">Ritual</span>';

            const card = document.createElement('div');
            card.className = 'spell-card';
            card.innerHTML = `
                <div class="spell-summary">
                    <div class="spell-level-badge ${levelClass}">${levelLabel}</div>
                    <div class="spell-info">
                        <div class="spell-name">${sp.name}</div>
                        <div class="spell-sub">
                            <span class="school-dot" style="background:${SCHOOL_COLOUR[sp.school]||'#888'}"></span>
                            ${sp.school} &nbsp; ${classTags} ${badges}
                        </div>
                    </div>
                    <span class="spell-chevron${isOpen ? ' open' : ''}">&#9654;</span>
                </div>
                <div class="spell-detail${isOpen ? ' open' : ''}">
                    <div class="stat-grid">
                        <div class="stat-cell"><div class="stat-label">Casting Time</div><div class="stat-value">${sp.castingTime}</div></div>
                        <div class="stat-cell"><div class="stat-label">Range</div><div class="stat-value">${sp.range}</div></div>
                        <div class="stat-cell"><div class="stat-label">Components</div><div class="stat-value">${sp.components}</div></div>
                        <div class="stat-cell"><div class="stat-label">Duration</div><div class="stat-value">${sp.duration}</div></div>
                    </div>
                    <div class="spell-desc">${formatSpellText(sp.desc).replace(/\n/g, '<br><br>')}</div>
                    ${sp.higherLevel ? `<div class="higher-level"><div class="higher-label">Using a Higher-Level Slot</div>${formatSpellText(sp.higherLevel)}</div>` : ''}
                </div>
            `;
            card.querySelector('.spell-summary').addEventListener('click', () => {
                if (openCards.has(sp.name)) openCards.delete(sp.name);
                else openCards.add(sp.name);
                renderList();
            });
            list.appendChild(card);
        });
    }

    function renderAll() {
        renderFilterRow('class-filters', CLASS_FILTERS, activeClass, v => { activeClass = v; renderAll(); });
        renderFilterRow('level-filters', LEVEL_FILTERS, activeLevel, v => { activeLevel = v; renderAll(); });
        renderFilterRow('school-filters', SCHOOLS, activeSchool, v => { activeSchool = v; renderAll(); });
        renderList();
    }

    document.getElementById('search').addEventListener('input', e => {
        searchTerm = e.target.value;
        renderList();
    });

    renderAll();
    </script>
</body>
</html>
