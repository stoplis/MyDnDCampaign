<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wish — Spell Book</title>
    <link rel="stylesheet" href="css/spell-book.css">
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-link">Back</a>
        <div class="brand" aria-label="Wish Spell Book">
            <span class="brand-mark">Wish</span>
            <span class="brand-context">Spell Book</span>
        </div>
        <span class="sep" aria-hidden="true"></span>
        <span class="header-title">Player Reference</span>
    </div>

    <section class="spell-intro" aria-labelledby="spell-title">
        <div class="chapter-label">Cantrips and Level 1</div>
        <h1 id="spell-title">Spell Book</h1>
        <p class="intro-copy">Search Hannah and Mum's current spell lists by class, level, and school.</p>
    </section>

    <div class="controls">
        <input type="text" class="search-bar" id="search" placeholder="Search spells...">
        <div class="filter-stack">
            <div class="filter-row" id="class-filters"></div>
            <div class="filter-row" id="level-filters"></div>
            <div class="filter-row" id="school-filters"></div>
        </div>
    </div>

    <div class="spell-list" id="list"></div>
    <script src="js/spells-data.js"></script>
    <script src="js/spell-book.js"></script>
</body>
</html>
