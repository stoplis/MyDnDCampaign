/* ── RulesPanel ────────────────────────────────────────────────── */

function RulesPanel() {
  const [activeBook, setActiveBook]   = useState('phb');
  const [phbSections, setPhbSections] = useState(null);
  const [dmgSections, setDmgSections] = useState(null);
  const [loadingBook, setLoadingBook] = useState(null);
  const [phbSectionId, setPhbSectionId] = useState(null);
  const [dmgSectionId, setDmgSectionId] = useState(null);
  const [search, setSearch]           = useState('');
  const [tocOpen, setTocOpen]         = useState(true);
  const [scrollTarget, setScrollTarget] = useState(null);
  const [collapsedH1, setCollapsedH1] = useState({});
  const contentRef = useRef(null);

  // Load both books: try IDB first, then fetch from server, then cache to IDB
  useEffect(() => {
    const SERVER_PATHS = {
      phb: "notes/rules/Player's Handbook (2024).md",
      dmg: "notes/rules/Dungeon Master's Guide (2024).md",
    };
    async function loadBook(key, setSections, setSectionId) {
      let text = await loadRulesBook(key);
      if (!text) {
        try {
          const resp = await fetch(SERVER_PATHS[key]);
          if (resp.ok) {
            text = await resp.text();
            await saveRulesBook(key, text);
          }
        } catch(_) {}
      }
      if (text) {
        const s = splitIntoSections(text);
        setSections(s);
        setSectionId(s[0]?.id || null);
      }
    }
    loadBook('phb', setPhbSections, setPhbSectionId);
    loadBook('dmg', setDmgSections, setDmgSectionId);
  }, []);

  const currentSections   = activeBook === 'phb' ? phbSections : dmgSections;
  const activeSectionId   = activeBook === 'phb' ? phbSectionId : dmgSectionId;
  const setActiveSectionId = id => activeBook === 'phb' ? setPhbSectionId(id) : setDmgSectionId(id);

  async function pickAndLoadFile(bookKey) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.md';
    input.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      setLoadingBook(bookKey);
      try {
        const text = await file.text();
        await saveRulesBook(bookKey, text);
        const secs = splitIntoSections(text);
        if (bookKey === 'phb') { setPhbSections(secs); setPhbSectionId(secs[0]?.id||null); }
        else                   { setDmgSections(secs); setDmgSectionId(secs[0]?.id||null); }
      } finally { setLoadingBook(null); }
    };
    input.click();
  }

  const toc = useMemo(() => currentSections ? buildRulesToc(currentSections) : [], [currentSections]);

  const searchResults = useMemo(() => {
    if (!search.trim() || !currentSections) return null;
    const q = search.toLowerCase();
    return currentSections
      .filter(s => s.content.toLowerCase().includes(q))
      .map(s => {
        const lower = s.content.toLowerCase();
        const pos   = lower.indexOf(q);
        const start = Math.max(0, pos - 70);
        const end   = Math.min(s.content.length, pos + q.length + 130);
        const snip  = (start > 0 ? '…' : '') + s.content.slice(start, end) + (end < s.content.length ? '…' : '');
        return { id: s.id, heading: s.heading, level: s.level, snip };
      });
  }, [search, currentSections]);

  const activeSection = currentSections?.find(s => s.id === activeSectionId);
  const renderedHtml  = useMemo(() => activeSection ? mdToHtml(activeSection.content, {}) : '', [activeSection]);

  useEffect(() => { if (contentRef.current) contentRef.current.scrollTop = 0; }, [activeSectionId]);

  // Scroll to H3 target after section content renders
  useEffect(() => {
    if (!scrollTarget || !contentRef.current) return;
    const timer = setTimeout(() => {
      const container = contentRef.current;
      const headings = container.querySelectorAll('h3');
      for (const h of headings) {
        if (h.textContent.trim() === scrollTarget) {
          const hRect = h.getBoundingClientRect();
          const cRect = container.getBoundingClientRect();
          container.scrollTop += hRect.top - cRect.top - 16;
          break;
        }
      }
      setScrollTarget(null);
    }, 80);
    return () => clearTimeout(timer);
  }, [renderedHtml, scrollTarget]);

  function selectSection(id, headingText) {
    setActiveSectionId(id);
    setSearch('');
    setScrollTarget(headingText || null);
  }

  const BOOK_NAMES = { phb: "Player's Handbook (2024)", dmg: "Dungeon Master's Guide (2024)" };

  return (
    <div className="flex flex-1 overflow-hidden flex-col">
      {/* Toolbar */}
      <div className="bg-gray-800 border-b border-gray-700 px-3 py-2 flex-shrink-0 flex items-center gap-2 flex-wrap">
        <div className="flex bg-gray-900 rounded overflow-hidden">
          {['phb','dmg'].map(b => (
            <button key={b} onClick={() => { setActiveBook(b); setSearch(''); }}
              className={`text-xs px-3 py-1 font-semibold transition-colors ${activeBook===b ? 'bg-indigo-700 text-white' : 'text-gray-400 hover:text-white'}`}>
              {b.toUpperCase()}
            </button>
          ))}
        </div>
        <span className={`text-xs px-2 py-0.5 rounded-full font-mono ${phbSections ? 'bg-green-900 text-green-300' : 'bg-gray-700 text-gray-500'}`}>
          PHB {phbSections ? `✓ ${phbSections.length}` : '—'}
        </span>
        <span className={`text-xs px-2 py-0.5 rounded-full font-mono ${dmgSections ? 'bg-green-900 text-green-300' : 'bg-gray-700 text-gray-500'}`}>
          DMG {dmgSections ? `✓ ${dmgSections.length}` : '—'}
        </span>
        <button onClick={() => pickAndLoadFile('phb')} disabled={!!loadingBook}
          className="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded disabled:opacity-50">
          {loadingBook==='phb' ? '⏳…' : '📄 Load PHB'}
        </button>
        <button onClick={() => pickAndLoadFile('dmg')} disabled={!!loadingBook}
          className="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded disabled:opacity-50">
          {loadingBook==='dmg' ? '⏳…' : '📄 Load DMG'}
        </button>
        <input type="text" placeholder={`Search ${activeBook.toUpperCase()}…`} value={search}
          onChange={e => setSearch(e.target.value)}
          className="ml-auto bg-gray-900 border border-gray-600 rounded px-3 py-1 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 w-56" />
        {search && <button onClick={() => setSearch('')} className="text-xs text-gray-500 hover:text-white">✕</button>}
        <button onClick={() => setTocOpen(o => !o)}
          className="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded">
          {tocOpen ? '◀' : '▶'} TOC
        </button>
      </div>

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        {/* TOC sidebar */}
        {tocOpen && (
          <div className="rules-sidebar flex-shrink-0 overflow-y-auto border-r border-gray-700 flex flex-col">
            <div className="px-3 py-2 border-b border-gray-700 sticky top-0 flex items-center gap-2" style={{background:'#161b27'}}>
              <span className="text-xs font-bold text-indigo-400 uppercase tracking-wider">{activeBook.toUpperCase()}</span>
              <span className="text-xs text-gray-600">{toc.filter(t=>t.level<=2).length} sections</span>
            </div>
            {!currentSections ? (
              <div className="p-3 text-xs text-gray-600 italic">Load a book to see contents</div>
            ) : (
              <ul className="py-1">
                {toc.map((item, idx) => {
                  // Track which H1 this item belongs to
                  const parentH1 = item.level === 1 ? item.id
                    : toc.slice(0, idx).filter(t => t.level === 1).pop()?.id;
                  const isCollapsed = item.level > 1 && collapsedH1[parentH1];
                  if (isCollapsed) return null;
                  return (
                    <li key={item.id}>
                      {item.level === 1 ? (
                        <button title={item.text}
                          onClick={() => {
                            setCollapsedH1(prev => ({ ...prev, [item.id]: !prev[item.id] }));
                            selectSection(item.sectionId, null);
                          }}
                          className={`w-full text-left text-xs py-0.5 hover:bg-gray-700 transition-colors truncate
                            px-2 pt-2 mt-1 font-bold text-indigo-300 border-t border-gray-700
                            ${item.sectionId === activeSectionId && !search ? 'bg-indigo-900 text-white' : ''}`}>
                          <span className="mr-1 text-gray-600 inline-block" style={{width:'0.8em'}}>{collapsedH1[item.id] ? '▸' : '▾'}</span>
                          {item.text}
                        </button>
                      ) : (
                        <button onClick={() => selectSection(item.sectionId, item.level === 3 ? item.text : null)} title={item.text}
                          className={`w-full text-left text-xs py-0.5 hover:bg-gray-700 transition-colors truncate
                            ${item.level === 2 ? 'pl-4 pr-2 text-gray-300' : ''}
                            ${item.level === 3 ? 'pl-6 pr-2 text-gray-500 text-xs' : ''}
                            ${item.sectionId === activeSectionId && !search ? 'bg-indigo-900 text-white' : ''}`}>
                          {item.text}
                        </button>
                      )}
                    </li>
                  );
                })}
              </ul>
            )}
          </div>
        )}

        {/* Main content */}
        <div className="flex-1 overflow-y-auto p-5" ref={contentRef}>
          {!currentSections ? (
            <div className="text-center mt-20">
              <div className="text-5xl mb-5">📚</div>
              <p className="text-gray-300 font-semibold mb-1">{BOOK_NAMES[activeBook]}</p>
              <p className="text-gray-600 text-sm mb-5">Load the file once — it will be cached automatically for all future sessions.</p>
              <button onClick={() => pickAndLoadFile(activeBook)}
                className="text-sm px-5 py-2 bg-indigo-700 hover:bg-indigo-600 text-white rounded">
                Load {activeBook.toUpperCase()} File
              </button>
            </div>
          ) : searchResults !== null ? (
            <div className="max-w-3xl mx-auto">
              <p className="text-xs text-gray-500 mb-4 font-mono">
                {searchResults.length} section{searchResults.length !== 1 ? 's' : ''} match <em>"{search}"</em> in {activeBook.toUpperCase()}
              </p>
              {searchResults.length === 0
                ? <p className="text-gray-600 text-sm">No results.</p>
                : searchResults.map(r => (
                    <div key={r.id} onClick={() => selectSection(r.id)}
                      className="mb-3 p-3 bg-gray-800 rounded-lg border border-gray-700 hover:border-indigo-500 cursor-pointer transition-colors">
                      <p className={`font-semibold mb-1 ${r.level===1 ? 'text-indigo-300 text-sm' : 'text-gray-200 text-xs'}`}>{r.heading}</p>
                      <p className="text-xs text-gray-500 font-mono leading-relaxed whitespace-pre-wrap">{r.snip}</p>
                    </div>
                  ))
              }
            </div>
          ) : (
            <div className="doc-body max-w-3xl mx-auto" dangerouslySetInnerHTML={{ __html: renderedHtml }} />
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [characters, setCharacters] = useState([]);
  const [pcs,        setPcs]        = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [error,      setError]      = useState(null);
  const [queue,      setQueue]      = useState([]);
  const [activeTab,  setActiveTab]  = useState("All");
  const [search,     setSearch]     = useState("");
  const [diceOpen,   setDiceOpen]   = useState(true);
  const [viewMode,   setViewMode]   = useState("encounter"); // "encounter" | "document"
  const [pcState,    setPcState]    = useState([]);

  useEffect(() => {
    setCharacters(Array.isArray(CHARACTERS_DATA) ? CHARACTERS_DATA : (CHARACTERS_DATA.characters||[]));
    const pcArr = Array.isArray(PC_DATA) ? PC_DATA : [];
    setPcs(pcArr);
    // Restore pcState from localStorage, or initialise from PC_DATA
    // Version check ensures stale saved state doesn't override new data structure
    const saved = loadState('pcState', null);
    const savedVersion = loadState('pcStateVersion', 0);
    if (saved && saved.length === pcArr.length && savedVersion === PC_DATA_VERSION) {
      setPcState(saved);
    } else {
      setPcState(pcArr.map(p => ({...p, id:uid()})));
      saveState('pcStateVersion', PC_DATA_VERSION);
    }
    setLoading(false);
  }, []);

  // Persist pcState on every change
  useEffect(() => {
    if (pcState.length > 0) saveState('pcState', pcState);
  }, [pcState]);

  function updatePcFromApp(id, patch) {
    setPcState(ps => ps.map(p => p.id === id ? {...p, ...patch} : p));
  }

  const chapters = ["All", ...Array.from(new Set(
    characters.filter(c => c.chapter_playable != null).map(c => c.chapter_playable)
  )).sort((a,b) => a-b).map(String)];

  return (
    <div className="flex flex-col h-screen bg-gray-900 text-gray-100 overflow-hidden" style={{minWidth:"900px"}}>
      {loading && (
        <div className="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
          <div className="text-center"><div className="text-4xl mb-3">⚔️</div>
          <p className="text-gray-400 text-sm">Loading campaign data…</p></div>
        </div>
      )}
      {error && (
        <div className="fixed bottom-4 right-4 bg-red-900 border border-red-700 text-red-200 text-xs px-4 py-3 rounded-lg z-50 max-w-sm shadow-xl">
          ⚠️ {error}
        </div>
      )}
      <TopHeader chapters={chapters} activeTab={activeTab} setActiveTab={setActiveTab}
        search={search} setSearch={setSearch} viewMode={viewMode} setViewMode={setViewMode}
        diceOpen={diceOpen} setDiceOpen={setDiceOpen} />
      <div className="flex flex-1 overflow-hidden">
        {/* All views stay mounted so state is preserved when switching */}
        <div className="flex flex-1 overflow-hidden" style={{display: viewMode === "encounter" ? "flex" : "none"}}>
          <LeftPanel characters={characters} activeTab={activeTab} search={search}
            onAddToEncounter={char => setQueue(q=>[...q,{...char,_qid:uid()}])} />
          <div className="panel-sep" />
          <CentrePanel characters={characters} pcs={pcs}
            activeTab={activeTab}
            encounterQueue={queue} onQueueConsumed={()=>setQueue([])}
            pcState={pcState} setPcState={setPcState} />
          <div className="panel-sep" />
          <RightPanel diceOpen={diceOpen} />
        </div>
        <div className="flex flex-1 overflow-hidden" style={{display: viewMode === "document" ? "flex" : "none"}}>
          <PCStripPanel pcState={pcState} onUpdatePc={updatePcFromApp} />
          <div className="panel-sep" />
          <DocumentPanel characters={characters} activeTab={activeTab} />
          {diceOpen && <div className="panel-sep" />}
          <RightPanel diceOpen={diceOpen} />
        </div>
        <div className="flex flex-1 overflow-hidden" style={{display: viewMode === "rules" ? "flex" : "none"}}>
          <RulesPanel />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
