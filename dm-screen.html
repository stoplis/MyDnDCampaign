    --surface:       #ffffff;

  * { box-sizing: border-box; }
  body { font-family: var(--serif); background: var(--bg); color: var(--ink); }

  /* ── Layout grid ── */
  .app-grid {
    display: grid;
    grid-template-columns: 360px 1fr 320px;
    grid-template-rows: 56px 1fr;
    height: 100vh; overflow: hidden; position: relative;
  }
  .topbar {
    grid-column: 1 / -1;
    background: var(--surface); border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 8px; padding: 0 16px;
    position: relative; z-index: 41;

  .party-rail {
    grid-column: 1; border-right: 1px solid var(--rule);
    overflow-y: auto; background: var(--surface);
  }
  .notes-pane {
    grid-column: 2; background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .right-rail {
    grid-column: 3; border-left: 1px solid var(--rule);
    background: var(--surface); display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Chapter drawer ── */
  .chapter-drawer {
    position: absolute; top: 56px; left: 0; right: 0;
    background: var(--surface); border-bottom: 1px solid var(--rule);
    z-index: 40; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 2px; padding: 8px;

  .chapter-btn {
    padding: 8px 12px; border-radius: 6px; text-align: left;
    border: none; background: transparent; color: var(--ink-2);
    cursor: pointer; font-size: 0.85rem; font-family: var(--serif);

  .chapter-btn:hover  { background: var(--surface-2); color: var(--ink); }
  .chapter-btn.active { background: var(--accent-bg); color: var(--ink); }

  /* ── Combat overlay ── */
  .combat-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg); display: flex; flex-direction: column;
  }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface-2); }
  ::-webkit-scrollbar-thumb { background: #b0a898; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #8c8070; }

  .cond-yellow  { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }

const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── Persistence Layer ────────────────────────────────────────── */

const STORAGE_KEY = 'dmscreen_';

function saveState(key, value) {
  try { localStorage.setItem(STORAGE_KEY + key, JSON.stringify(value)); } catch(_) {}
}

function loadState(key, fallback) {
  try {
    const v = localStorage.getItem(STORAGE_KEY + key);
    return v !== null ? JSON.parse(v) : fallback;
  } catch(_) { return fallback; }
}

// Generic IndexedDB helper (used for images + rules)
function openIDB(dbName, storeName) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(dbName, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(storeName);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const IMG_DB = 'dmscreen_images';
const IMG_STORE = 'images';

async function saveImages(imageEntries) {
  try {
    const db = await openIDB(IMG_DB, IMG_STORE);
    const tx = db.transaction(IMG_STORE, 'readwrite');
    const store = tx.objectStore(IMG_STORE);
    store.clear();
    imageEntries.forEach(e => store.put(e.dataUrl, e.name));
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    db.close();
  } catch(_) {}
}

async function loadImages() {
  try {
    const db = await openIDB(IMG_DB, IMG_STORE);
    const tx = db.transaction(IMG_STORE, 'readonly');
    const store = tx.objectStore(IMG_STORE);
    const keys = await new Promise(r => { const req = store.getAllKeys(); req.onsuccess = () => r(req.result); });
    const vals = await new Promise(r => { const req = store.getAll(); req.onsuccess = () => r(req.result); });
    db.close();
    const map = {};
    keys.forEach((k, i) => { map[k] = vals[i]; });
    return map;
  } catch(_) { return {}; }
}

// Convert File to base64 data URL for persistence
function fileToDataUrl(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* ── Server manifest for hosted notes & images ────────────── */
let serverManifest = null;
let serverImageMap = {};  // filename → relative URL path

async function loadManifest() {
  try {
    const resp = await fetch('manifest.json');
    if (!resp.ok) return null;
    serverManifest = await resp.json();
    serverImageMap = serverManifest.images || {};
    return serverManifest;
  } catch(_) { return null; }
}
// Load manifest on startup
loadManifest();

function resolveImageUrl(fname, userImageMap) {
  // User-uploaded images take priority (base64 data URLs)
  if (userImageMap && userImageMap[fname]) return userImageMap[fname];
  // Fall back to server-hosted image path
  if (serverImageMap[fname]) return serverImageMap[fname];
  return null;
}

/* ── Helpers ───────────────────────────────────────────────────── */

function mod(s)    { return Math.floor((s - 10) / 2); }
function modStr(s) { const m = mod(s); return m >= 0 ? `+${m}` : `${m}`; }
function d20()     { return Math.floor(Math.random() * 20) + 1; }
function dN(n)     { return Math.floor(Math.random() * n) + 1; }
function uid()     { return Math.random().toString(36).slice(2,9); }

function parseCR(cr) {
  if (cr === null || cr === undefined || cr === "") return 0;
  if (typeof cr === "number") return cr;
  const s = String(cr).trim();
  if (s.includes("/")) { const [a,b] = s.split("/"); return +a / +b; }
  return parseFloat(s) || 0;
}

function fmtCR(cr) {
  if (cr === null || cr === undefined || cr === "") return "—";
  return String(cr);
}

function scaledHp(baseHp, cr, partyLevel, difficulty) {
  if (!baseHp) return null;
  const diffMult = { Easy:0.75, Standard:1.0, Hard:1.25, Deadly:1.5 }[difficulty] ?? 1;
  let mult = diffMult;
  const delta = partyLevel - parseCR(cr);
  if (delta > 3)  { mult *= Math.min(1 + (delta - 3) * 0.1, 2); }
  if (delta < -3) { mult *= Math.max(1 - (-delta - 3) * 0.1, 0.5); }
  return Math.round(baseHp * mult);
}

function isScaled(cr, partyLevel, difficulty) {
  if (difficulty !== "Standard") return true;
  return Math.abs(partyLevel - parseCR(cr)) > 0;
}

  boss:       { borderColor:"var(--fac-enemy)",   badgeBg:"var(--fac-enemy-bg)",   badgeColor:"var(--fac-enemy)",   nameColor:"var(--fac-enemy)",   headerColor:"var(--fac-enemy)",   lineColor:"var(--fac-enemy-bg)" },
  npc:        { borderColor:"var(--fac-neutral)", badgeBg:"var(--fac-neutral-bg)", badgeColor:"var(--fac-neutral)", nameColor:"var(--fac-neutral)", headerColor:"var(--fac-neutral)", lineColor:"var(--fac-neutral-bg)" },
  pc:         { borderColor:"var(--fac-pc)",      badgeBg:"var(--fac-pc-bg)",      badgeColor:"var(--fac-pc)",      nameColor:"var(--fac-pc)",      headerColor:"var(--fac-pc)",      lineColor:"var(--fac-pc-bg)" },
  _default:   { borderColor:"var(--accent)",      badgeBg:"var(--accent-bg)",      badgeColor:"var(--accent)",      nameColor:"var(--accent)",      headerColor:"var(--accent)",      lineColor:"var(--accent-bg)" },
  _none:      { borderColor:"var(--rule)",        badgeBg:"var(--surface-2)",      badgeColor:"var(--ink-3)",       nameColor:"var(--ink-2)",       headerColor:"var(--ink-3)",       lineColor:"var(--surface-2)" },
};
function roleStyle(role) { return ROLE_STYLES[(role||"").toLowerCase()] || ROLE_STYLES._default; }
function roleBorderColor(role) { return role ? roleStyle(role).borderColor : ROLE_STYLES._none.borderColor; }
function roleBadgeStyle(role)  { const s = role ? roleStyle(role) : ROLE_STYLES._none; return { background: s.badgeBg, color: s.badgeColor }; }
function roleNameStyle(role)   { return { color: role ? roleStyle(role).nameColor : ROLE_STYLES._none.nameColor }; }

function prepareCreature(char, partyLevel, difficulty) {
  const sh = scaledHp(char.hp_max, char.cr, partyLevel, difficulty) || char.hp_max || 0;
  return {
    ...char, id: uid(), conditions: [],
    initiative: d20() + mod(char.stats?.dex || 10),
    reactionSpent: false, legendaryUsed: 0,
    currentHp: sh, scaledMax: sh
  };
}


function SectionHeader({ title, role }) {
  const s = roleStyle(role);
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,marginBottom:4}}>
      <span style={{fontSize:"0.62rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:s.headerColor,whiteSpace:"nowrap"}}>{title}</span>
      <div style={{flex:1,height:1,background:s.lineColor}} />
    </div>
  );
}

function hpColor(cur, max) {
  if (!max) return "var(--fac-ally)";
  const p = cur / max;
  if (p > 0.5) return "var(--fac-ally)";
  if (p > 0.25) return "oklch(0.65 0.15 75)";
  return "var(--fac-enemy)";
}

/* ── HpBar ─────────────────────────────────────────────────────── */

function HpBar({ cur, max }) {
  if (!max) return null;
  const pct = Math.max(0, Math.min(1, cur / max)) * 100;
  return (
    <div style={{width:"100%",background:"var(--surface-2)",borderRadius:4,height:4,marginTop:4}}>
      <div style={{height:4,borderRadius:4,transition:"width 0.2s",width:`${pct}%`,background:hpColor(cur,max)}} />
    </div>
  );
}

/* ── AbilityRow ────────────────────────────────────────────────── */

function AbilityRow({ stats, savingThrows }) {
  if (!stats) return null;
  const saveMap = {};
  (savingThrows || []).forEach(sv => {
    const m = sv.match(/^([A-Za-z]+)\s+([+-]\d+)/);
    if (m) saveMap[m[1].toUpperCase()] = m[2];
  });
  const all = [
    {k:'str',l:'STR'},{k:'dex',l:'DEX'},{k:'con',l:'CON'},
    {k:'int',l:'INT'},{k:'wis',l:'WIS'},{k:'cha',l:'CHA'},
  ];
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:1,marginTop:6,borderRadius:4,overflow:"hidden",border:"1px solid var(--rule)"}}>
      {all.map(({k,l}) => {
        const score = stats[k] ?? 10;
        const mv    = modStr(score);
        const save  = saveMap[l] || mv;
        const prof  = !!saveMap[l];
        return (
          <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 2px",background:"var(--surface-2)"}}>
            <span style={{fontSize:"0.55rem",fontWeight:700,color:"var(--ink-3)",textTransform:"uppercase"}}>{l}</span>
            <span style={{fontSize:"0.55rem",color:"var(--ink-4)"}}>{score}</span>
            <span style={{fontSize:"0.82rem",fontWeight:700,color:"var(--ink)",lineHeight:1.2}}>{mv}</span>
            <span style={{fontSize:"0.55rem",fontWeight:600,color: prof ? "var(--fac-ally)" : "var(--ink-4)"}}>{save}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── Condition tooltip ─────────────────────────────────────────── */

function CondTooltip({ text, x, y }) {
  if (!text) return null;
  return <div className="condition-tooltip" style={{left: x+10, top: y-6}}>{text}</div>;
}

/* ── ConditionTag ──────────────────────────────────────────────── */

function CondTag({ name, onRemove }) {
  const [tip, setTip] = useState(null);
  const [pos, setPos] = useState({x:0,y:0});
  return (
    <>
      <span
        className={`${COND_COLORS[name]||"cond-neutral"}`}
        style={{display:"inline-flex",alignItems:"center",gap:2,padding:"1px 6px",borderRadius:10,fontSize:"0.72rem",fontWeight:600,cursor:"default"}}
        onMouseEnter={e => { setTip(CONDITIONS[name]); setPos({x:e.clientX,y:e.clientY}); }}
        onMouseMove={e => setPos({x:e.clientX,y:e.clientY})}
        onMouseLeave={() => setTip(null)}
      >
        {name}
        <button onClick={onRemove} style={{marginLeft:1,opacity:0.6,lineHeight:1,fontSize:"0.75rem",background:"none",border:"none",cursor:"pointer",padding:0,color:"inherit"}}>×</button>
      </span>
      {tip && <CondTooltip text={tip} x={pos.x} y={pos.y} />}
    </>
  );
}

/* ── ConditionPicker ───────────────────────────────────────────── */

function CondPicker({ active, onAdd, onClose, rect }) {
  const ref = useRef(null);
  const available = Object.keys(CONDITIONS).filter(c => !active.includes(c));

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [onClose]);

  if (!rect) return null;
  const below = window.innerHeight - rect.bottom;
  const estH = Math.min(available.length * 26 + 8, 200);
  const top = below < estH + 10 ? rect.top - estH - 4 : rect.bottom + 4;
  const left = Math.min(rect.left, window.innerWidth - 180);

  return (
    <div ref={ref} className="cond-picker" style={{top, left}}>
      {available.length === 0
        ? <div style={{padding:"6px 12px",fontSize:"0.75rem",color:"var(--ink-3)"}}>All conditions active</div>
        : available.map(c => <button key={c} onClick={() => { onAdd(c); onClose(); }}>{c}</button>)
      }
    </div>
  );
}

/* ── ConditionsRow ─────────────────────────────────────────────── */

function CondRow({ conditions, onAdd, onRemove }) {
  const [open, setOpen] = useState(false);
  const [rect, setRect] = useState(null);
  const btnRef = useRef(null);

  function openPicker() {
    if (btnRef.current) { setRect(btnRef.current.getBoundingClientRect()); setOpen(true); }
  }

  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6,alignItems:"center",minHeight:20}}>
      {conditions.map(c => <CondTag key={c} name={c} onRemove={() => onRemove(c)} />)}
      <button ref={btnRef} onClick={openPicker}
        style={{fontSize:"0.72rem",padding:"1px 6px",borderRadius:10,background:"var(--surface-2)",color:"var(--ink-3)",border:"1px solid var(--rule)",cursor:"pointer"}}>+</button>
      {open && <CondPicker active={conditions} onAdd={onAdd} onClose={() => setOpen(false)} rect={rect} />}
    </div>
  );
}

/* ── PowerTokenRow ─────────────────────────────────────────────── */

function PowerTokenRow({ tokens, onToggle }) {
  if (!tokens || !tokens.length) return null;
  return (
    <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
      {tokens.map((tk, ti) => {
        if (!tk.total) return null;
        const avail = tk.total - tk.used;
        return (
          <div key={ti} style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>{tk.label}</span>
            <div style={{display:"flex",gap:1}}>
              {Array.from({length: tk.total}).map((_,i) => (
                <span key={i} className={`pip ${i < avail ? "pip-on" : "pip-off"}`}
                  onClick={() => onToggle(ti, i, avail)}
                  title={i < avail ? "Mark used" : "Restore"} />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── DeathSaves ────────────────────────────────────────────────── */

function DeathSaves({ ds, onChange }) {
  const {successes:s, failures:f} = ds;
  return (
    <div style={{marginTop:6,display:"flex",alignItems:"center",gap:8,fontSize:"0.72rem"}}>
      <span style={{color:"var(--fac-ally)",fontWeight:600}}>Successes</span>
      {[0,1,2].map(i => (
        <input key={i} type="checkbox" style={{width:13,height:13,cursor:"pointer",accentColor:"var(--fac-ally)"}}
          checked={i < s} onChange={e => onChange("successes", e.target.checked ? s+1 : s-1)} />
      ))}
      <span style={{color:"var(--fac-enemy)",fontWeight:600,marginLeft:4}}>Failures</span>
      {[0,1,2].map(i => (
        <input key={i} type="checkbox" style={{width:13,height:13,cursor:"pointer",accentColor:"var(--fac-enemy)"}}
          checked={i < f} onChange={e => onChange("failures", e.target.checked ? f+1 : f-1)} />
      ))}
    </div>
  );
}

/* ── HpEditor ──────────────────────────────────────────────────── */

function HpEditor({ cur, max, onSet, onDelta }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState("");
  const ref = useRef(null);

  function start() { setVal(String(cur)); setEditing(true); setTimeout(()=>ref.current?.select(),0); }
  function commit() {
    const v = parseInt(val, 10);
    if (!isNaN(v)) onSet(Math.max(0, max ? Math.min(v, max) : v));
    setEditing(false);
  }

  return (
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      <button onClick={() => onDelta(-1)} style={{width:20,height:20,fontSize:"0.75rem",background:"var(--surface-2)",border:"1px solid var(--rule)",borderRadius:4,color:"var(--ink-2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
      {editing
        ? <input ref={ref} type="number" className="hp-input" value={val}
            onChange={e => setVal(e.target.value)}
            onBlur={commit}
            onKeyDown={e => { if (e.key==="Enter") commit(); if (e.key==="Escape") setEditing(false); }} />
        : <span style={{fontWeight:700,color:"var(--ink)",fontSize:"0.85rem",cursor:"pointer",minWidth:44,textAlign:"center"}} onClick={start}>
            {cur}/{max||"?"}
          </span>
      }
      <button onClick={() => onDelta(1)} style={{width:20,height:20,fontSize:"0.75rem",background:"var(--surface-2)",border:"1px solid var(--rule)",borderRadius:4,color:"var(--ink-2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
    </div>
  );
}

/* ── PC Card ───────────────────────────────────────────────────── */

function PCCard({ pc, onUpdate }) {
  const hp = pc.hp || {current:0, max:0};
  const dead = hp.current <= 0;
  const [craftOpen, setCraftOpen] = useState(false);
  const [craftMsg, setCraftMsg] = useState(null);

  function setHp(v) { onUpdate({hp:{...hp, current:v}}); }
  function deltaHp(d) { onUpdate({hp:{...hp, current:Math.max(0, Math.min(hp.current+d, hp.max))}}); }

  function toggleToken(tokenIdx, pipIdx, avail) {
    const tks = (pc.power_tokens || []).map((tk, i) => {
      if (i !== tokenIdx) return tk;
      const newUsed = pipIdx < avail ? Math.min(tk.total, tk.used + 1) : Math.max(0, tk.used - 1);
      return {...tk, used: newUsed};
    });
    onUpdate({power_tokens: tks});
  }

  function updateDs(type, val) {
    onUpdate({death_saves: {...pc.death_saves, [type]: Math.max(0, Math.min(3, val))}});
  }

  function craftItem(item) {
    setCraftMsg(`Crafted: ${item}`);
    setCraftOpen(false);
    setTimeout(() => setCraftMsg(null), 4000);
  }

  const displayName = pc.name || pc.player || "—";
  const showPlayer = pc.player && pc.name;

  const cardStyle = {background:"var(--surface)",border:"1px solid var(--rule)",borderLeft:`4px solid var(--fac-pc)`,borderRadius:8,padding:12,marginBottom:8};
  return (
    <div style={cardStyle}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,color:"var(--ink)"}}>{displayName}</span>
            <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>{pc.class} {pc.level}</span>
          </div>
          {showPlayer && <div style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>{pc.player}</div>}
          {!pc.name && pc.player && <div style={{fontSize:"0.72rem",color:"var(--fac-pc)"}}>{pc.player}</div>}
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>Init</span>
              <input type="number" className="init-input" placeholder="—"
                value={pc.initiative ?? ""}
                onChange={e => onUpdate({initiative: e.target.value==="" ? null : parseInt(e.target.value,10)})} />
            </div>
            {pc.spell_atk && (
              <span style={{fontSize:"0.72rem",color:"var(--fac-pc)",fontFamily:"monospace"}}>Spell {pc.spell_atk} / DC {pc.spell_dc}</span>
            )}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
            <span style={{fontSize:"0.72rem",padding:"1px 6px",borderRadius:10,background:"var(--surface-2)",color:"var(--ink-2)",border:"1px solid var(--rule)",fontFamily:"monospace"}}>AC {pc.ac}</span>
            {pc.ac_armoured && pc.ac_armoured !== pc.ac && (
              <span style={{fontSize:"0.72rem",padding:"1px 6px",borderRadius:10,background:"var(--surface-2)",color:"var(--ink-3)",border:"1px solid var(--rule)",fontFamily:"monospace"}} title="AC with armour">{pc.ac_armoured}⚔</span>
            )}
          </div>
          <HpEditor cur={hp.current} max={hp.max} onSet={setHp} onDelta={deltaHp} />
        </div>
      </div>
      <HpBar cur={hp.current} max={hp.max} />
      <AbilityRow stats={pc.stats} />
      <CondRow
        conditions={pc.conditions||[]}
        onAdd={c => onUpdate({conditions:[...(pc.conditions||[]),c]})}
        onRemove={c => onUpdate({conditions:(pc.conditions||[]).filter(x=>x!==c)})}
      />
      <div style={{marginTop:6,display:"flex"}}>
        <AdvDisToggle value={pc.adv_dis} onChange={v => onUpdate({adv_dis: v})} />
      </div>
      {pc.power_tokens && <PowerTokenRow tokens={pc.power_tokens} onToggle={toggleToken} />}
      {pc.crafting_items && (
        <div style={{marginTop:6}}>
          <button onClick={() => setCraftOpen(o => !o)}
            style={{fontSize:"0.72rem",padding:"2px 8px",borderRadius:4,background:"var(--accent-bg)",color:"var(--accent)",border:"1px solid var(--accent-border)",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            ⚒ Fast Crafting {craftOpen ? "▲" : "▼"}
          </button>
          {craftMsg && <div style={{fontSize:"0.72rem",color:"var(--accent)",marginTop:4}}>{craftMsg}</div>}
          {craftOpen && (
            <div style={{marginTop:4,padding:6,background:"var(--surface-2)",borderRadius:6,border:"1px solid var(--rule)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:2}}>
              {pc.crafting_items.map(item => (
                <button key={item} onClick={() => craftItem(item)}
                  style={{textAlign:"left",fontSize:"0.72rem",color:"var(--ink-2)",padding:"2px 4px",borderRadius:3,background:"none",border:"none",cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {item}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
      {dead && pc.death_saves && <DeathSaves ds={pc.death_saves} onChange={updateDs} />}
    </div>
  );
}

/* ── NPC Card ──────────────────────────────────────────────────── */

function AdvDisToggle({ value, onChange }) {
  const cur = value || "normal";
  const btnBase = {fontSize:"0.72rem",padding:"2px 6px",fontWeight:700,cursor:"pointer",border:"none",lineHeight:1};
  return (
    <div style={{display:"flex",borderRadius:4,overflow:"hidden",border:"1px solid var(--rule)"}} title="Advantage / Disadvantage">
      <button onClick={() => onChange(cur==="adv" ? "normal" : "adv")}
        style={{...btnBase, background: cur==="adv" ? "var(--fac-ally)" : "var(--surface-2)", color: cur==="adv" ? "#fff" : "var(--ink-3)"}}
        title="Advantage">ADV</button>
      <button onClick={() => onChange(cur==="dis" ? "normal" : "dis")}
        style={{...btnBase, background: cur==="dis" ? "var(--fac-enemy)" : "var(--surface-2)", color: cur==="dis" ? "#fff" : "var(--ink-3)"}}
        title="Disadvantage">DIS</button>
    </div>
  );
}

function NPCCard({ creature, partyLevel, difficulty, onUpdate, onRemove }) {
  const [expanded, setExpanded] = useState(false);

  const baseHp = creature.hp_max || 0;
  const scaledMax = baseHp ? (scaledHp(baseHp, creature.cr, partyLevel, difficulty) ?? baseHp) : 0;
  const curHp = creature.currentHp !== undefined ? creature.currentHp : scaledMax;
  const displayMax = creature.scaledMax !== undefined ? creature.scaledMax : scaledMax;
  const showScaled = baseHp && isScaled(creature.cr, partyLevel, difficulty);
  const laCount = creature.legendary_actions?.count || 0;
  const laUsed  = creature.legendaryUsed || 0;

  function setHp(v) { onUpdate({currentHp: Math.max(0, v)}); }
  function deltaHp(d) { onUpdate({currentHp: Math.max(0, curHp + d)}); }
  function cycleRole() {
    const roles = ["Enemy", "NPC", "Ally"];
    const currentLower = (creature.role || "").toLowerCase();
    const currentIdx = roles.findIndex(r => r.toLowerCase() === currentLower);
    const nextIdx = (currentIdx + 1) % roles.length;
    onUpdate({role: roles[nextIdx]});
  }

  const bs = roleBadgeStyle(creature.role);
  const cardStyle = {background:"var(--surface)",border:"1px solid var(--rule)",borderLeft:`4px solid ${roleBorderColor(creature.role)}`,borderRadius:8,padding:12,marginBottom:8};

  return (
    <div style={cardStyle}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,...roleNameStyle(creature.role),overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{creature.nickname||creature.name}</span>
            <button onClick={cycleRole} style={{fontSize:"0.65rem",padding:"1px 6px",borderRadius:10,fontWeight:700,cursor:"pointer",border:"none",...bs}}>{creature.role}</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>Init</span>
              <input type="number" className="init-input" placeholder="—"
                value={creature.initiative ?? ""}
                onChange={e => onUpdate({initiative: e.target.value==="" ? null : parseInt(e.target.value,10)})} />
            </div>
            {creature.speed && <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>{creature.speed}ft</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:"0.65rem",padding:"1px 5px",borderRadius:3,background:"var(--surface-2)",color:"var(--ink-3)",border:"1px solid var(--rule)",fontFamily:"monospace"}}>CR {fmtCR(creature.cr)}</span>
            <span style={{fontSize:"0.65rem",padding:"1px 5px",borderRadius:10,background:"var(--surface-2)",color:"var(--ink-3)",border:"1px solid var(--rule)",fontFamily:"monospace"}}>AC {creature.ac||"—"}</span>
            <button onClick={onRemove} style={{color:"var(--ink-4)",fontSize:"1rem",lineHeight:1,background:"none",border:"none",cursor:"pointer",padding:"0 2px"}}>×</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <HpEditor cur={curHp} max={displayMax} onSet={setHp} onDelta={deltaHp} />
            {showScaled && <span style={{fontSize:"0.65rem",color:"var(--ink-4)"}}>(s)</span>}
          </div>
        </div>
      </div>
      <HpBar cur={curHp} max={displayMax} />
      <AbilityRow stats={creature.stats} savingThrows={creature.saving_throws} />
      <CondRow
        conditions={creature.conditions||[]}
        onAdd={c => onUpdate({conditions:[...(creature.conditions||[]),c]})}
        onRemove={c => onUpdate({conditions:(creature.conditions||[]).filter(x=>x!==c)})}
      />
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,flexWrap:"wrap"}}>
        <AdvDisToggle value={creature.adv_dis} onChange={v => onUpdate({adv_dis: v})} />
        <button
          onClick={() => onUpdate({reactionSpent: !creature.reactionSpent})}
          style={{fontSize:"0.72rem",display:"flex",alignItems:"center",gap:4,padding:"2px 6px",borderRadius:4,background:"var(--surface-2)",border:"1px solid var(--rule)",cursor:"pointer",color: creature.reactionSpent ? "var(--ink-4)" : "oklch(0.65 0.15 75)"}}
          title={creature.reactionSpent ? "Reaction spent" : "Reaction available"}
        >⚡ Reaction</button>
        {laCount > 0 && (
          <div style={{display:"flex",alignItems:"center",gap:2}}>
            <span style={{fontSize:"0.65rem",color:"var(--ink-3)",marginRight:2}}>LA</span>
            {Array.from({length:laCount}).map((_,i) => (
              <span key={i}

/* ── Difficulty Calculator ─────────────────────────────────────── */

function DifficultyCalc({ encounter, partyLevel, partySize }) {
  if (!encounter.length) return null;

  // Split creatures by role
  const enemies = encounter.filter(c => {
    const r = (c.role || "").toLowerCase();
    return ["antagonist", "boss", "enemy"].includes(r);
  });
  const allies = encounter.filter(c => (c.role || "").toLowerCase() === "ally");

  // Count allies as extra party members
  const effectivePartySize = partySize + allies.length;

  // Calculate XP from enemies only
  const rawXP = enemies.reduce((sum, c) => {
    const crStr = String(c.cr ?? "0").trim();
    return sum + (CR_XP[crStr] || 0);
  }, 0);
  const adjusted = enemies.length > 0 ? Math.round(rawXP * encMult(enemies.length)) : 0;
  const lvl = Math.max(1, Math.min(20, partyLevel));
  const sz = Math.max(1, effectivePartySize);
  const thresholds = XP_THRESH[lvl];
  const partyEasy = thresholds[0] * sz;
  const partyMed  = thresholds[1] * sz;
  const partyHard = thresholds[2] * sz;
  const partyDead = thresholds[3] * sz;
  let rating, ratingColor;
  if (adjusted >= partyDead)      { rating = "Deadly";  ratingColor = "var(--fac-enemy)"; }
  else if (adjusted >= partyHard) { rating = "Hard";    ratingColor = "oklch(0.52 0.15 40)"; }
  else if (adjusted >= partyMed)  { rating = "Medium";  ratingColor = "oklch(0.55 0.15 75)"; }
  else if (adjusted >= partyEasy) { rating = "Easy";    ratingColor = "var(--fac-ally)"; }
  else                            { rating = "Trivial"; ratingColor = "var(--ink-4)"; }
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",fontSize:"0.72rem",background:"var(--surface-2)",borderRadius:6,padding:"5px 10px",marginBottom:8,border:"1px solid var(--rule)"}}>
      <span style={{color:"var(--ink-3)"}}>XP: {rawXP} raw / {adjusted} adj</span>
      <span style={{color:"var(--rule)"}}>|</span>
      <span style={{color:"var(--ink-3)"}}>Easy {partyEasy} · Med {partyMed} · Hard {partyHard} · Deadly {partyDead}</span>
      <span style={{color:"var(--rule)"}}>|</span>
      <span style={{fontWeight:700,color:ratingColor}}>{rating}</span>
    </div>
  );
}

/* ── COMBAT OVERLAY ────────────────────────────────────────────── */

function CombatOverlay({ characters, pcs, pcState, setPcState, encounterQueue, onQueueConsumed, launchPresetKey, onPresetConsumed, onClose }) {
  const [partyLevel,   setPartyLevel]   = useState(() => loadState('partyLevel', 1));
  const [difficulty,   setDifficulty]   = useState(() => loadState('difficulty', "Standard"));
  const [round,        setRound]        = useState(() => loadState('round', 1));
  const [encounter,    setEncounter]    = useState(() => loadState('encounter', []));
  const [pendingWave2, setPendingWave2] = useState(null);
  const [preset,       setPreset]       = useState("");
  const [showForm,     setShowForm]     = useState(false);
  const [dropOver,     setDropOver]     = useState(false);

  useEffect(() => { saveState('partyLevel', partyLevel); }, [partyLevel]);
  useEffect(() => { saveState('difficulty', difficulty); }, [difficulty]);
  useEffect(() => { saveState('round', round); }, [round]);
  useEffect(() => { saveState('encounter', encounter); }, [encounter]);

  /* Consume encounter queue */
  useEffect(() => {
    if (!encounterQueue?.length) return;
    encounterQueue.forEach(char => {
      setEncounter(e => [...e, prepareCreature(char, partyLevel, difficulty)]);
    });
    onQueueConsumed?.();
  }, [encounterQueue]);

  /* Handle @encounter:key launch from notes */
  useEffect(() => {
    if (!launchPresetKey) return;
    const p = PRESETS.find(x => x.key === launchPresetKey);
    if (p) {
      const wave1 = p.wave1.map(nick =>
        characters.find(c => (c.nickname||c.name||"").toLowerCase()===nick.toLowerCase())
      ).filter(Boolean);
      setEncounter(wave1.map(c => prepareCreature(c, partyLevel, difficulty)));
      setPendingWave2(p.wave2?.length ? p.wave2 : null);
      setPreset(p.name);
    }
    onPresetConsumed?.();
  }, [launchPresetKey]);

  function updatePc(id, patch) {
    setPcState(ps => ps.map(p => p.id===id ? {...p,...patch} : p));
  }
  function updateCreature(id, patch) {
    setEncounter(e => e.map(c => c.id===id ? {...c,...patch} : c));
  }
  function removeCreature(id) {
    setEncounter(e => e.filter(c => c.id!==id));
  }
  function advanceRound() {
    setRound(r => r+1);
    setEncounter(e => e.map(c => ({...c, reactionSpent:false, legendaryUsed:0})));
  }
  function rollInitiatives() {
    setEncounter(e => e.map(c => ({
      ...c,
      initiative: d20() + mod(c.stats?.dex || 10)
    })));
  }
  function loadPreset(name) {
    setPreset(name);
    const p = PRESETS.find(x => x.name===name);
    if (!p) { setEncounter([]); setPendingWave2(null); return; }
    const wave1 = p.wave1.map(nick =>
      characters.find(c => (c.nickname||c.name||"").toLowerCase()===nick.toLowerCase())
    ).filter(Boolean);
    setEncounter(wave1.map(c => prepareCreature(c, partyLevel, difficulty)));
    setPendingWave2(p.wave2?.length ? p.wave2 : null);
  }
  function spawnWave2() {
    if (!pendingWave2) return;
    const wave2 = pendingWave2.map(nick =>
      characters.find(c => (c.nickname||c.name||"").toLowerCase()===nick.toLowerCase())
    ).filter(Boolean);
    setEncounter(e => [...e, ...wave2.map(c => prepareCreature(c, partyLevel, difficulty))]);
    setPendingWave2(null);
  }
  function dropCharacter(e) {
    e.preventDefault();
    setDropOver(false);
    const raw = e.dataTransfer.getData("application/dnd-character");
    if (!raw) return;
    try {
      const char = JSON.parse(raw);
      setEncounter(enc => [...enc, prepareCreature(char, partyLevel, difficulty)]);
    } catch(_) {}
  }

  const sortedEncounter = [...encounter].sort((a,b) => {
    if (a.initiative===null && b.initiative===null) return 0;
    if (a.initiative===null) return 1;
    if (b.initiative===null) return -1;
    return b.initiative - a.initiative;
  });
  const sortedPcs = [...pcState].sort((a,b) => {
    if (a.initiative===null && b.initiative===null) return 0;
    if (a.initiative===null) return 1;
    if (b.initiative===null) return -1;
    return b.initiative - a.initiative;
  });

  const DIFFS = ["Easy","Standard","Hard","Deadly"];

  return (
    <div className="combat-overlay">
      {/* Header */}
      <div style={{height:56,display:"flex",alignItems:"center",padding:"0 16px",borderBottom:"1px solid var(--rule)",flexShrink:0,background:"var(--surface)"}}>
        <span style={{fontWeight:700,fontSize:"1rem",color:"var(--ink)"}}>⚔ Combat</span>
        <button onClick={onClose}
          style={{marginLeft:"auto",padding:"4px 14px",borderRadius:6,border:"1px solid var(--rule)",
            background:"transparent",color:"var(--ink-2)",cursor:"pointer",fontSize:"0.85rem"}}>
          ✕ Close
        </button>
      </div>

      {/* Settings bar */}
      <div style={{background:"var(--surface-2)",borderBottom:"1px solid var(--rule)",padding:"8px 12px",flexShrink:0}}>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:"0.72rem",color:"var(--ink-3)",whiteSpace:"nowrap"}}>Party Lv</span>
            <input type="number" min="1" max="20"
              style={{background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:4,padding:"2px 6px",
                fontSize:"0.85rem",color:"var(--ink)",width:48,textAlign:"center",outline:"none"}}
              value={partyLevel}
              onChange={e => setPartyLevel(Math.max(1,Math.min(20,parseInt(e.target.value,10)||1)))} />
          </div>
          <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
            {DIFFS.map(d => (
              <button key={d} onClick={() => setDifficulty(d)}
                style={{fontSize:"0.72rem",padding:"2px 8px",borderRadius:4,border:"none",cursor:"pointer",
                  background: difficulty===d ? "var(--accent)" : "var(--surface)",
                  color: difficulty===d ? "#fff" : "var(--ink-2)"}}>
                {d}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:"auto"}}>
            <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>Round</span>
            <button onClick={() => setRound(r=>Math.max(1,r-1))}
              style={{width:24,height:24,background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:4,
                color:"var(--ink-2)",fontSize:"0.85rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            <span style={{fontSize:"0.85rem",fontWeight:700,color:"var(--ink)",width:24,textAlign:"center"}}>{round}</span>
            <button onClick={advanceRound}
              style={{width:24,height:24,background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:4,
                color:"var(--ink-2)",fontSize:"0.85rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
          <select value={preset} onChange={e => loadPreset(e.target.value)}
            style={{background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:4,
              padding:"2px 8px",fontSize:"0.72rem",color:"var(--ink-2)",outline:"none",maxWidth:240}}>
            <option value="">— Select Preset —</option>
            {PRESETS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
          </select>
        </div>
      </div>

      {/* Scrollable body */}
      <div style={{flex:1,overflowY:"auto",padding:12}}>

        {/* Party */}
        <div style={{marginBottom:16}}>
          <h3 style={{fontSize:"0.7rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",
            color:"var(--ink-3)",marginBottom:8}}>Party</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {sortedPcs.map(pc => (
              <div key={pc.id} className="encounter-card">
                <PCCard pc={pc} onUpdate={patch => updatePc(pc.id,patch)} />
              </div>
            ))}
          </div>
          {sortedPcs.length===0 && <p style={{fontSize:"0.72rem",color:"var(--ink-4)"}}>No player characters loaded.</p>}
        </div>

        {/* Encounter */}
        <div
          onDragOver={e => { e.preventDefault(); setDropOver(true); }}
          onDragLeave={() => setDropOver(false)}
          onDrop={dropCharacter}
          style={{borderRadius:8,transition:"background 0.15s",
            background: dropOver ? "color-mix(in oklch, var(--accent) 8%, var(--bg))" : "transparent",
            outline: dropOver ? "2px solid var(--accent)" : "none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <h3 style={{fontSize:"0.7rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",
              color:"var(--ink-3)",display:"flex",alignItems:"center",gap:6}}>
              Encounter
              {encounter.length>0 && (
                <span style={{background:"var(--surface-2)",color:"var(--ink-2)",fontSize:"0.7rem",
                  padding:"1px 6px",borderRadius:99}}>{encounter.length}</span>
              )}
            </h3>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {pendingWave2 && (
                <button onClick={spawnWave2}
                  style={{fontSize:"0.72rem",padding:"2px 8px",borderRadius:4,border:"none",cursor:"pointer",
                    background:"color-mix(in oklch, var(--fac-enemy) 20%, var(--surface-2))",
                    color:"var(--fac-enemy)",fontWeight:600}}>
                  Spawn Wave 2 →
                </button>
              )}
              {encounter.length>0 && (
                <button onClick={rollInitiatives}
                  style={{fontSize:"0.72rem",padding:"2px 8px",borderRadius:4,border:"none",cursor:"pointer",
                    background:"color-mix(in oklch, var(--fac-pc) 20%, var(--surface-2))",
                    color:"var(--fac-pc)"}}>
                  🎲 Roll Initiative
                </button>
              )}
            </div>
          </div>

          <DifficultyCalc encounter={encounter} partyLevel={partyLevel} partySize={pcState.length || 4} />

          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {sortedEncounter.map(c => (
              <div key={c.id} className="encounter-card">
                <NPCCard creature={c}
                  partyLevel={partyLevel} difficulty={difficulty}
                  onUpdate={patch => updateCreature(c.id,patch)}
                  onRemove={() => removeCreature(c.id)} />
              </div>
            ))}
          </div>

          {encounter.length===0 && !dropOver && (
            <p style={{fontSize:"0.72rem",color:"var(--ink-4)",marginBottom:8}}>Drag a card from the roster, or use a preset above.</p>
          )}
          {encounter.length===0 && dropOver && (
            <p style={{fontSize:"0.72rem",color:"var(--accent)",marginBottom:8,textAlign:"center",fontWeight:600}}>Drop to add to encounter ✦</p>
          )}

          {showForm
            ? <CustomForm
                onAdd={c => { setEncounter(e=>[...e,c]); setShowForm(false); }}
                onCancel={() => setShowForm(false)} />
            : <button onClick={() => setShowForm(true)}
                style={{width:"100%",marginTop:4,fontSize:"0.72rem",padding:"6px 12px",
                  background:"var(--surface)",border:"1px dashed var(--rule)",
                  color:"var(--ink-3)",borderRadius:8,cursor:"pointer",transition:"color 0.15s"}}>
                + Custom Creature
              </button>
          }
        </div>
      </div>
    </div>
  );
}

/* ── Markdown Pipeline ─────────────────────────────────────────── */

function stripFrontmatter(md) { return md.replace(/^---[\s\S]*?---\n?/, ''); }

function mdToHtml(md, imageMap, depth) {
  if (!md) return '';
  depth = depth || 0;
  if (depth > 4) return md;

  // Strip frontmatter
  let text = stripFrontmatter(md);

  // Handle ![[image]] embeds — check user uploads first, then server manifest
  text = text.replace(/!\[\[([^\]]+)\]\]/g, (_, fname) => {
    const url = resolveImageUrl(fname, imageMap);
    if (url) return `<img src="${url}" alt="${fname}" />`;
    return `<em>[Image: ${fname}]</em>`;
  });

  // Replace [[wikilinks]] with placeholders before marked parses
  const wikilinks = [];
  text = text.replace(/\[\[([^\]]+)\]\]/g, (_, inner) => {
    const parts = inner.split('|');
    const target = parts[0].trim();
    const display = (parts[1] || parts[0]).trim();
    const idx = wikilinks.length;
    wikilinks.push({ target, display });
    return `WWIKI${idx}PH`;
  });

  // Process Obsidian callouts: > [!type] Title
  // Match the opening line, then greedily capture ALL following lines starting with >
  text = text.replace(/^(>{1,4})\s*\[!(\w+)\]\s*(.*)\n((?:(?:\1[^\S\n]?.*|>\s*)\n?)*)/gm, (_, gt, type, title, body) => {
    const t = type.toLowerCase();
    // Strip leading > from each body line, then remove bare --- separators
    // (marked treats text + --- as setext h2 headings inside callouts)
    const bodyClean = body.replace(/^>+\s?/gm, '').replace(/^---+\s*$/gm, '');
    const innerHtml = mdToHtml(bodyClean, imageMap, depth + 1);
    const titleHtml = marked.parseInline(title || t.charAt(0).toUpperCase() + t.slice(1));
    return `<div class="callout callout-${t}"><div class="callout-title">${titleHtml}</div><div>${innerHtml}</div></div>\n`;
  });

  // Run marked parser
  let html = marked.parse(text);

  // Restore wikilink placeholders
  wikilinks.forEach((wl, i) => {
    html = html.replace(`WWIKI${i}PH`, `<span class="wikilink" data-target="${wl.target}">${wl.display}</span>`);
  });

  // Replace @encounter:key with clickable chips
  const presetMap = {};
  PRESETS.forEach(p => { if (p.key) presetMap[p.key] = p.name; });
  html = html.replace(/@encounter:([\w-]+)/g, (_, key) => {
    const label = presetMap[key] || key;
    return `<button class="encounter-chip" data-encounter="${key}">⚔ ${label}</button>`;
  });

  return html;
}

function linkCharacterNamesInHtml(html, characters) {
  if (!characters || !characters.length) return html;
  // Split on HTML tags to avoid mangling attributes
  const parts = html.split(/(<[^>]+>)/);
  const names = characters.map(c => c.nickname || c.name).filter(Boolean).sort((a, b) => b.length - a.length);
  const namePattern = new RegExp('\\b(' + names.map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')\\b', 'g');
  for (let i = 0; i < parts.length; i++) {
    // Only process text nodes (odd indices are tags)
    if (i % 2 === 0 && parts[i].trim()) {
      // Don't process if already inside a char-ref or wikilink
      parts[i] = parts[i].replace(namePattern, '<span class="char-ref" data-char="$1">$1</span>');
    }
  }
  return parts.join('');
}

function extractToc(rawMd) {
  if (!rawMd) return [];
  const clean = stripFrontmatter(rawMd);
  const toc = [];
  const re = /^(#{1,4})\s+(.+)$/gm;
  let m, idx = 0;
  while ((m = re.exec(clean)) !== null) {
    toc.push({ level: m[1].length, text: m[2].trim(), idx: idx++ });
  }
  return toc;
}

/* ── PCStripPanel (Document Mode) ─────────────────────────────── */

function PartyRail({ pcState, onUpdatePc }) {
  return (
    <div className="party-rail">
      <div style={{padding:"8px 12px",borderBottom:"1px solid var(--rule)",flexShrink:0}}>
        <span style={{fontSize:"0.7rem",fontWeight:700,textTransform:"uppercase",
          letterSpacing:"0.1em",color:"var(--ink-3)"}}>Party</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:8,display:"flex",flexDirection:"column",gap:8}}>
        {pcState.map(pc => (
          <PCCard key={pc.id} pc={pc} onUpdate={patch => onUpdatePc(pc.id, patch)} />
        ))}
        {pcState.length === 0 && <p style={{fontSize:"0.72rem",color:"var(--ink-4)"}}>No PCs loaded.</p>}
      </div>
    </div>
  );
}

/* ── NotesPane ─────────────────────────────────────────────────── */

function NotesPane({ characters, activeChapter, onLaunchEncounter }) {
  const [mdContent, setMdContent] = useState(null);
  const [fileName,  setFileName]  = useState("");
  const [imageMap,  setImageMap]  = useState({});
  const [toc,       setToc]       = useState([]);
  const [hoverChar, setHoverChar] = useState(null);
  const [hoverPos,  setHoverPos]  = useState({ x: 0, y: 0 });
  const contentRef = useRef(null);

  // Restore images from IndexedDB on mount
  useEffect(() => {
    loadImages().then(map => { if (Object.keys(map).length > 0) setImageMap(map); });
  }, []);

  // Auto-load chapter note when activeChapter changes
  useEffect(() => {
    const ch = CHAPTERS.find(c => c.id === activeChapter);
    if (!ch || !ch.notePath) { setMdContent(null); setFileName(""); setToc([]); return; }
    fetch(ch.notePath).then(r => r.ok ? r.text() : null).then(raw => {
      if (raw) { setMdContent(raw); setFileName(ch.notePath.split('/').pop()); setToc(extractToc(raw)); }
      else { setMdContent(null); setFileName(""); setToc([]); }
    }).catch(() => { setMdContent(null); setFileName(""); setToc([]); });
  }, [activeChapter]);

  // Persist images to IndexedDB
  useEffect(() => {
    const entries = Object.entries(imageMap);
    if (entries.length > 0) saveImages(entries.map(([name, dataUrl]) => ({ name, dataUrl })));
  }, [imageMap]);

  function jumpToHeading(idx) {
    if (!contentRef.current) return;
    const headings = contentRef.current.querySelectorAll('h1, h2, h3, h4');
    if (headings[idx]) {
      const container = contentRef.current;
      container.scrollTo({ top: headings[idx].offsetTop - container.offsetTop - 12, behavior: 'smooth' });
    }
  }

  function handleClick(e) {
    const chip = e.target.closest('.encounter-chip');
    if (chip) onLaunchEncounter?.(chip.dataset.encounter);
  }

  function handleMouseOver(e) {
    const target = e.target.closest('.char-ref');
    if (target) {
      const char = characters.find(c => (c.nickname || c.name) === target.getAttribute('data-char'));
      if (char) { setHoverChar(char); setHoverPos({ x: e.clientX, y: e.clientY }); }
    }
  }
  function handleMouseOut(e)  { if (e.target.closest('.char-ref')) setHoverChar(null); }
  function handleMouseMove(e) { if (e.target.closest('.char-ref')) setHoverPos({ x: e.clientX, y: e.clientY }); }

  const renderedHtml = React.useMemo(() => {
    if (!mdContent) return '';
    let html = mdToHtml(mdContent, imageMap);
    html = linkCharacterNamesInHtml(html, characters);
    return html;
  }, [mdContent, imageMap, characters]);

  const chapterEntry = CHAPTERS.find(c => c.id === activeChapter);
  const hasNotePath  = chapterEntry?.notePath;

  return (
    <div className="notes-pane" style={{display:"flex",flexDirection:"column"}}>
      {/* Toolbar */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--rule)",padding:"6px 12px",
        flexShrink:0,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        {fileName && <span style={{fontSize:"0.72rem",color:"var(--ink-3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fileName}</span>}
        {toc.length > 0 && (
          <select onChange={e => jumpToHeading(parseInt(e.target.value, 10))}
            style={{marginLeft:"auto",background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:4,
              padding:"2px 8px",fontSize:"0.72rem",color:"var(--ink-2)",outline:"none",maxWidth:240}}>
            <option value="">— Jump to… —</option>
            {toc.map((h, i) => (
              <option key={i} value={h.idx}>{'  '.repeat(h.level - 1)}{h.text}</option>
            ))}
          </select>
        )}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"24px 32px"}}
        ref={contentRef}
        onClick={handleClick}
        onMouseOver={handleMouseOver}
        onMouseOut={handleMouseOut}
        onMouseMove={handleMouseMove}>
        {!mdContent ? (
          <div style={{textAlign:"center",marginTop:64,color:"var(--ink-3)",fontSize:"0.9rem"}}>
            {hasNotePath ? "Loading…" : "No notes yet for this chapter."}
          </div>
        ) : (
          <div className="doc-body" style={{maxWidth:720,margin:"0 auto",fontFamily:"var(--serif)"}}
            dangerouslySetInnerHTML={{ __html: renderedHtml }} />
        )}
      </div>

      {/* Hover card */}
      {hoverChar && (
        <div style={{position:"fixed",left:hoverPos.x+12,top:hoverPos.y-10,zIndex:9999,pointerEvents:"none"}}>
          <div style={{background:"var(--surface)",borderRadius:8,padding:12,
            border:`1px solid var(--rule)`,borderLeft:`4px solid var(--fac-pc)`,maxWidth:320,
            boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontWeight:700,color:"var(--ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {hoverChar.nickname || hoverChar.name}
                  </span>
                  <FactionChip role={hoverChar.role} />
                </div>
                <span style={{fontSize:"0.72rem",color:"var(--ink-3)"}}>{hoverChar.fullname || hoverChar.type || hoverChar.class || "—"}</span>
              </div>
            </div>
            {hoverChar.stats && <AbilityRow stats={hoverChar.stats} />}
            <div style={{display:"flex",alignItems:"center",gap:8,fontSize:"0.72rem",marginBottom:8}}>
              {hoverChar.ac != null && (
                <span style={{padding:"1px 6px",borderRadius:4,background:"var(--surface-2)",color:"var(--ink-2)",fontFamily:"monospace"}}>AC {hoverChar.ac}</span>
              )}
              {(hoverChar.hp?.max || hoverChar.hp_max) && (
                <span style={{padding:"1px 6px",borderRadius:4,background:"var(--surface-2)",color:"var(--ink-2)",fontFamily:"monospace"}}>
                  {hoverChar.hp?.current ?? hoverChar.currentHp ?? (hoverChar.hp_max||0)}/{hoverChar.hp?.max||hoverChar.hp_max||"?"}
                </span>
              )}
            </div>
            {(hoverChar.traits?.length > 0 || hoverChar.actions?.length > 0) && (
              <div style={{fontSize:"0.72rem",color:"var(--ink-2)"}}>
                {hoverChar.traits?.length > 0 && (
                  <div style={{marginBottom:4}}>
                    <SectionHeader title="Traits" role={hoverChar.role} />
                    {hoverChar.traits.map((t, i) => (
                      <p key={i} style={{marginBottom:2}}><strong>{t.name}.</strong> {t.desc}</p>
                    ))}
                  </div>
                )}
                {hoverChar.actions?.length > 0 && (
                  <div>
                    <SectionHeader title="Actions" role={hoverChar.role} />
                    {hoverChar.actions.map((a, i) => (
                      <p key={i} style={{marginBottom:2}}><strong>{a.name}.</strong> {a.desc}</p>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── APP ───────────────────────────────────────────────────────── */

function App() {
  const [characters,    setCharacters]    = useState([]);
  const [pcs,           setPcs]           = useState([]);
  const [loading,       setLoading]       = useState(true);
  const [pcState,       setPcState]       = useState([]);
  const [activeChapter, setActiveChapter] = useState(() => loadState('activeChapter', "1"));
  const [drawerOpen,    setDrawerOpen]    = useState(false);
  const [combatOpen,    setCombatOpen]    = useState(false);
  const [encounterQueue,setEncounterQueue]= useState([]);
  const [launchPresetKey,setLaunchPresetKey] = useState(null);

  useEffect(() => {
    setCharacters(Array.isArray(CHARACTERS_DATA) ? CHARACTERS_DATA : (CHARACTERS_DATA.characters||[]));
    const pcArr = Array.isArray(PC_DATA) ? PC_DATA : [];
    setPcs(pcArr);
    const saved = loadState('pcState', null);
    const savedVersion = loadState('pcStateVersion', 0);
    if (saved && saved.length === pcArr.length && savedVersion === PC_DATA_VERSION) {
      setPcState(saved);
    } else {
      setPcState(pcArr.map(p => ({...p, id:uid()})));
      saveState('pcStateVersion', PC_DATA_VERSION);
    }
    setLoading(false);
  }, []);

  useEffect(() => { if (pcState.length > 0) saveState('pcState', pcState); }, [pcState]);
  useEffect(() => { saveState('activeChapter', activeChapter); }, [activeChapter]);

  function updatePcFromApp(id, patch) {
    setPcState(ps => ps.map(p => p.id === id ? {...p, ...patch} : p));
  }

  function handleLaunchEncounter(key) {
    setLaunchPresetKey(key);
    setCombatOpen(true);
  }

  if (loading) return (
    <div style={{position:"fixed",inset:0,background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:"2.5rem",marginBottom:12}}>⚔</div>
        <p style={{color:"var(--ink-3)",fontSize:"0.9rem"}}>Loading campaign data…</p>
      </div>
    </div>
  );

  return (
    <div className="app-grid">
      <TopBar activeChapter={activeChapter} drawerOpen={drawerOpen}
        onToggleDrawer={() => setDrawerOpen(d => !d)}
        onOpenCombat={() => setCombatOpen(true)} />

      {drawerOpen && (
        <ChapterDrawer activeChapter={activeChapter}
          onSelect={id => { setActiveChapter(id); setDrawerOpen(false); }} />
      )}

      <PartyRail pcState={pcState} onUpdatePc={updatePcFromApp} />

      <NotesPane characters={characters} activeChapter={activeChapter}
        onLaunchEncounter={handleLaunchEncounter} />

      <RightRail characters={characters} activeChapter={activeChapter}
        onAddToEncounter={char => { setEncounterQueue(q=>[...q,{...char,_qid:uid()}]); setCombatOpen(true); }}
        onLaunchEncounter={preset => { setLaunchPresetKey(preset.key||null); setEncounterQueue([]); setCombatOpen(true); }} />

      {combatOpen && (
        <CombatOverlay
          characters={characters} pcs={pcs}
          pcState={pcState} setPcState={setPcState}
          encounterQueue={encounterQueue} onQueueConsumed={() => setEncounterQueue([])}
          launchPresetKey={launchPresetKey} onPresetConsumed={() => setLaunchPresetKey(null)}
          onClose={() => setCombatOpen(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
