const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── Persistence Layer ────────────────────────────────────────── */

const STORAGE_KEY = 'dmscreen_';

function saveState(key, value) {
  try { localStorage.setItem(STORAGE_KEY + key, JSON.stringify(value)); } catch(_) {}
}

function loadState(key, fallback) {
  try {
    const v = localStorage.getItem(STORAGE_KEY + key);
    return v !== null ? JSON.parse(v) : fallback;
  } catch(_) { return fallback; }
}

// Generic IndexedDB helper (used for images + rules)
function openIDB(dbName, storeName) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(dbName, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(storeName);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const IMG_DB = 'dmscreen_images';
const IMG_STORE = 'images';

async function saveImages(imageEntries) {
  try {
    const db = await openIDB(IMG_DB, IMG_STORE);
    const tx = db.transaction(IMG_STORE, 'readwrite');
    const store = tx.objectStore(IMG_STORE);
    store.clear();
    imageEntries.forEach(e => store.put(e.dataUrl, e.name));
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    db.close();
  } catch(_) {}
}

async function loadImages() {
  try {
    const db = await openIDB(IMG_DB, IMG_STORE);
    const tx = db.transaction(IMG_STORE, 'readonly');
    const store = tx.objectStore(IMG_STORE);
    const keys = await new Promise(r => { const req = store.getAllKeys(); req.onsuccess = () => r(req.result); });
    const vals = await new Promise(r => { const req = store.getAll(); req.onsuccess = () => r(req.result); });
    db.close();
    const map = {};
    keys.forEach((k, i) => { map[k] = vals[i]; });
    return map;
  } catch(_) { return {}; }
}

// Convert File to base64 data URL for persistence
function fileToDataUrl(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* ── Server manifest for hosted notes & images ────────────── */
let serverManifest = null;
let serverImageMap = {};  // filename → relative URL path

async function loadManifest() {
  try {
    const resp = await fetch('manifest.json');
    if (!resp.ok) return null;
    serverManifest = await resp.json();
    serverImageMap = serverManifest.images || {};
    return serverManifest;
  } catch(_) { return null; }
}
// Load manifest on startup
loadManifest();

function resolveImageUrl(fname, userImageMap) {
  // User-uploaded images take priority (base64 data URLs)
  if (userImageMap && userImageMap[fname]) return userImageMap[fname];
  // Fall back to server-hosted image path
  if (serverImageMap[fname]) return serverImageMap[fname];
  return null;
}

/* ── Rules IndexedDB helpers (uses generic openIDB) ────────────── */

const RULES_DB    = 'dmscreen_rules';
const RULES_STORE = 'books';

async function saveRulesBook(key, text) {
  const db = await openIDB(RULES_DB, RULES_STORE);
  return new Promise((res, rej) => {
    const tx = db.transaction(RULES_STORE, 'readwrite');
    tx.objectStore(RULES_STORE).put(text, key);
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  });
}

async function loadRulesBook(key) {
  const db = await openIDB(RULES_DB, RULES_STORE);
  return new Promise((res, rej) => {
    const tx  = db.transaction(RULES_STORE, 'readonly');
    const req = tx.objectStore(RULES_STORE).get(key);
    req.onsuccess = () => res(req.result || null);
    req.onerror   = () => rej(req.error);
  });
}

function splitIntoSections(markdown) {
  const lines = markdown.split('\n');
  const sections = [];
  let current = null;
  for (const line of lines) {
    const h1 = line.match(/^# (.+)/);
    const h2 = line.match(/^## (.+)/);
    if (h1 || h2) {
      if (current) sections.push(current);
      const level   = h1 ? 1 : 2;
      const heading = (h1 || h2)[1];
      const id      = heading.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      current = { id, heading, level, content: line + '\n' };
    } else if (current) {
      current.content += line + '\n';
    }
  }
  if (current) sections.push(current);
  return sections;
}

function buildRulesToc(sections) {
  const toc = [];
  for (const sec of sections) {
    toc.push({ id: sec.id, text: sec.heading, level: sec.level, sectionId: sec.id });
    // Extract H3 headings from content
    const h3matches = sec.content.matchAll(/^### (.+)/gm);
    for (const m of h3matches) {
      const heading = m[1];
      const id = heading.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      toc.push({ id: sec.id + '--' + id, text: heading, level: 3, sectionId: sec.id });
    }
  }
  return toc;
}

/* ── Helpers ───────────────────────────────────────────────────── */

function mod(s)    { return Math.floor((s - 10) / 2); }
function modStr(s) { const m = mod(s); return m >= 0 ? `+${m}` : `${m}`; }
function d20()     { return Math.floor(Math.random() * 20) + 1; }
function dN(n)     { return Math.floor(Math.random() * n) + 1; }
function uid()     { return Math.random().toString(36).slice(2,9); }

function parseCR(cr) {
  if (cr === null || cr === undefined || cr === "") return 0;
  if (typeof cr === "number") return cr;
  const s = String(cr).trim();
  if (s.includes("/")) { const [a,b] = s.split("/"); return +a / +b; }
  return parseFloat(s) || 0;
}

function fmtCR(cr) {
  if (cr === null || cr === undefined || cr === "") return "—";
  return String(cr);
}

function scaledHp(baseHp, cr, partyLevel, difficulty) {
  if (!baseHp) return null;
  const diffMult = { Easy:0.75, Standard:1.0, Hard:1.25, Deadly:1.5 }[difficulty] ?? 1;
  let mult = diffMult;
  const delta = partyLevel - parseCR(cr);
  if (delta > 3)  { mult *= Math.min(1 + (delta - 3) * 0.1, 2); }
  if (delta < -3) { mult *= Math.max(1 - (-delta - 3) * 0.1, 0.5); }
  return Math.round(baseHp * mult);
}

function isScaled(cr, partyLevel, difficulty) {
  if (difficulty !== "Standard") return true;
  return Math.abs(partyLevel - parseCR(cr)) > 0;
}

const ROLE_STYLES = {
  ally:       { border:"border-green-500", badge:"bg-green-900 text-green-300", name:"text-green-300", header:"text-green-400", line:"bg-green-900" },
  antagonist: { border:"border-red-500",   badge:"bg-red-900 text-red-300",     name:"text-red-300",   header:"text-red-400",   line:"bg-red-900"   },
  enemy:      { border:"border-red-500",   badge:"bg-red-900 text-red-300",     name:"text-red-300",   header:"text-red-400",   line:"bg-red-900"   },
  boss:       { border:"border-red-500",   badge:"bg-red-900 text-red-300",     name:"text-red-300",   header:"text-red-400",   line:"bg-red-900"   },
  npc:        { border:"border-blue-400",  badge:"bg-blue-900 text-blue-300",   name:"text-blue-300",  header:"text-blue-400",  line:"bg-blue-900"  },
  pc:         { border:"border-purple-500", badge:"bg-purple-900 text-purple-300", name:"text-purple-300", header:"text-purple-400", line:"bg-purple-900" },
  _default:   { border:"border-yellow-500", badge:"bg-yellow-900 text-yellow-300", name:"text-yellow-300", header:"text-yellow-400", line:"bg-yellow-900" },
  _none:      { border:"border-gray-500",  badge:"bg-gray-700 text-gray-300",   name:"text-gray-200",  header:"text-gray-400",  line:"bg-gray-700"  }
};
function roleStyle(role) { return ROLE_STYLES[(role||"").toLowerCase()] || ROLE_STYLES._default; }


function prepareCreature(char, partyLevel, difficulty) {
  const sh = scaledHp(char.hp_max, char.cr, partyLevel, difficulty) || char.hp_max || 0;
  return {
    ...char, id: uid(), conditions: [],
    initiative: d20() + mod(char.stats?.dex || 10),
    reactionSpent: false, legendaryUsed: 0,
    currentHp: sh, scaledMax: sh
  };
}

function roleBorder(role)    { return role ? roleStyle(role).border : ROLE_STYLES._none.border; }
function roleBadge(role)     { return role ? roleStyle(role).badge  : ROLE_STYLES._none.badge; }
function roleNameColor(role) { return role ? roleStyle(role).name   : ROLE_STYLES._none.name; }

function SectionHeader({ title, role }) {
  const s = roleStyle(role);
  return (
    <div className="flex items-center gap-2 mt-2 mb-1">
      <span className={`text-xs font-bold uppercase tracking-wider ${s.header}`}>{title}</span>
      <div className={`flex-1 h-px ${s.line}`} />
    </div>
  );
}

function hpColor(cur, max) {
  if (!max) return "bg-green-600";
  const p = cur / max;
  if (p > 0.5) return "bg-green-600";
  if (p > 0.25) return "bg-yellow-500";
  return "bg-red-600";
}

/* ── HpBar ─────────────────────────────────────────────────────── */

function HpBar({ cur, max }) {
  if (!max) return null;
  const pct = Math.max(0, Math.min(1, cur / max)) * 100;
  return (
    <div className="w-full bg-gray-700 rounded-full h-1.5 mt-1">
      <div className={`h-1.5 rounded-full transition-all ${hpColor(cur, max)}`} style={{width:`${pct}%`}} />
    </div>
  );
}

/* ── AbilityRow ────────────────────────────────────────────────── */

function AbilityRow({ stats, savingThrows }) {
  if (!stats) return null;

  // Parse ['STR +6', 'CON +5'] → { STR: '+6', CON: '+5' }
  const saveMap = {};
  (savingThrows || []).forEach(sv => {
    const m = sv.match(/^([A-Za-z]+)\s+([+-]\d+)/);
    if (m) saveMap[m[1].toUpperCase()] = m[2];
  });

  const groups = [
    { keys: ['str','dex','con'], labels: ['STR','DEX','CON'], bg: 'rgb(77,64,64)'  },
    { keys: ['int','wis','cha'], labels: ['INT','WIS','CHA'], bg: 'rgb(65,63,80)'  },
  ];

  return (
    <div className="flex mt-2 rounded overflow-hidden gap-px" style={{background:'rgb(31,36,47)'}}>
      {groups.map(({ keys, labels, bg }, gi) => (
        <div key={gi} className="flex-1 grid grid-cols-3 gap-px">
          {keys.map((k, i) => {
            const score = stats[k] ?? 10;
            const mod   = modStr(score);
            const label = labels[i];
            const save  = saveMap[label] || mod;
            const prof  = !!saveMap[label];
            return (
              <div key={k} className="flex flex-col items-center py-1.5 px-0.5" style={{background: bg}}>
                <span className="font-semibold leading-none text-gray-400" style={{fontSize:'0.58rem'}}>{label}</span>
                <span className="leading-none text-gray-500" style={{fontSize:'0.58rem'}}>{score}</span>
                <span className="font-bold text-white leading-snug" style={{fontSize:'0.85rem'}}>{mod}</span>
                <span className={`leading-none font-medium ${prof ? 'text-green-400' : 'text-gray-500'}`} style={{fontSize:'0.58rem'}}>{save}</span>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* ── Condition tooltip ─────────────────────────────────────────── */

function CondTooltip({ text, x, y }) {
  if (!text) return null;
  return <div className="condition-tooltip" style={{left: x+10, top: y-6}}>{text}</div>;
}

/* ── ConditionTag ──────────────────────────────────────────────── */

function CondTag({ name, onRemove }) {
  const [tip, setTip] = useState(null);
  const [pos, setPos] = useState({x:0,y:0});
  return (
    <>
      <span
        className={`inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-xs font-medium cursor-default ${COND_COLORS[name]||"bg-gray-700"} text-white`}
        onMouseEnter={e => { setTip(CONDITIONS[name]); setPos({x:e.clientX,y:e.clientY}); }}
        onMouseMove={e => setPos({x:e.clientX,y:e.clientY})}
        onMouseLeave={() => setTip(null)}
      >
        {name}
        <button onClick={onRemove} className="ml-0.5 opacity-60 hover:opacity-100 leading-none text-xs">×</button>
      </span>
      {tip && <CondTooltip text={tip} x={pos.x} y={pos.y} />}
    </>
  );
}

/* ── ConditionPicker ───────────────────────────────────────────── */

function CondPicker({ active, onAdd, onClose, rect }) {
  const ref = useRef(null);
  const available = Object.keys(CONDITIONS).filter(c => !active.includes(c));

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [onClose]);

  if (!rect) return null;
  const below = window.innerHeight - rect.bottom;
  const estH = Math.min(available.length * 26 + 8, 200);
  const top = below < estH + 10 ? rect.top - estH - 4 : rect.bottom + 4;
  const left = Math.min(rect.left, window.innerWidth - 180);

  return (
    <div ref={ref} className="cond-picker" style={{top, left}}>
      {available.length === 0
        ? <div className="px-3 py-2 text-xs text-gray-500">All conditions active</div>
        : available.map(c => <button key={c} onClick={() => { onAdd(c); onClose(); }}>{c}</button>)
      }
    </div>
  );
}

/* ── ConditionsRow ─────────────────────────────────────────────── */

function CondRow({ conditions, onAdd, onRemove }) {
  const [open, setOpen] = useState(false);
  const [rect, setRect] = useState(null);
  const btnRef = useRef(null);

  function openPicker() {
    if (btnRef.current) { setRect(btnRef.current.getBoundingClientRect()); setOpen(true); }
  }

  return (
    <div className="flex flex-wrap gap-1 mt-2 items-center min-h-5">
      {conditions.map(c => <CondTag key={c} name={c} onRemove={() => onRemove(c)} />)}
      <button ref={btnRef} onClick={openPicker}
        className="text-xs px-1.5 py-0.5 rounded bg-gray-700 text-gray-400 hover:bg-gray-600 hover:text-white">+</button>
      {open && <CondPicker active={conditions} onAdd={onAdd} onClose={() => setOpen(false)} rect={rect} />}
    </div>
  );
}

/* ── PowerTokenRow ─────────────────────────────────────────────── */

function PowerTokenRow({ tokens, onToggle }) {
  if (!tokens || !tokens.length) return null;
  return (
    <div className="mt-2 flex flex-col gap-1">
      {tokens.map((tk, ti) => {
        if (!tk.total) return null;
        const avail = tk.total - tk.used;
        return (
          <div key={ti} className="flex items-center gap-1.5 flex-wrap">
            <span className="text-xs text-gray-500">{tk.label}</span>
            <div className="flex gap-0.5">
              {Array.from({length: tk.total}).map((_,i) => (
                <span key={i} className={`pip ${i < avail ? "pip-on" : "pip-off"}`}
                  onClick={() => onToggle(ti, i, avail)}
                  title={i < avail ? "Mark used" : "Restore"} />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── DeathSaves ────────────────────────────────────────────────── */

function DeathSaves({ ds, onChange }) {
  const {successes:s, failures:f} = ds;
  return (
    <div className="mt-2 flex items-center gap-3 text-xs">
      <span className="text-green-400 font-medium">Successes</span>
      {[0,1,2].map(i => (
        <input key={i} type="checkbox" className="w-3.5 h-3.5 cursor-pointer accent-green-500"
          checked={i < s} onChange={e => onChange("successes", e.target.checked ? s+1 : s-1)} />
      ))}
      <span className="text-red-400 font-medium ml-2">Failures</span>
      {[0,1,2].map(i => (
        <input key={i} type="checkbox" className="w-3.5 h-3.5 cursor-pointer accent-red-500"
          checked={i < f} onChange={e => onChange("failures", e.target.checked ? f+1 : f-1)} />
      ))}
    </div>
  );
}

/* ── HpEditor ──────────────────────────────────────────────────── */

function HpEditor({ cur, max, onSet, onDelta }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState("");
  const ref = useRef(null);

  function start() { setVal(String(cur)); setEditing(true); setTimeout(()=>ref.current?.select(),0); }
  function commit() {
    const v = parseInt(val, 10);
    if (!isNaN(v)) onSet(Math.max(0, max ? Math.min(v, max) : v));
    setEditing(false);
  }

  return (
    <div className="flex items-center gap-0.5">
      <button onClick={() => onDelta(-1)} className="w-5 h-5 text-xs bg-gray-700 hover:bg-gray-600 rounded text-gray-300 flex items-center justify-center leading-none">−</button>
      {editing
        ? <input ref={ref} type="number" className="hp-input" value={val}
            onChange={e => setVal(e.target.value)}
            onBlur={commit}
            onKeyDown={e => { if (e.key==="Enter") commit(); if (e.key==="Escape") setEditing(false); }} />
        : <span className="font-bold text-white text-sm cursor-pointer hover:text-purple-300 w-12 text-center" onClick={start}>
            {cur}/{max||"?"}
          </span>
      }
      <button onClick={() => onDelta(1)} className="w-5 h-5 text-xs bg-gray-700 hover:bg-gray-600 rounded text-gray-300 flex items-center justify-center leading-none">+</button>
    </div>
  );
}

/* ── PC Card ───────────────────────────────────────────────────── */

function PCCard({ pc, onUpdate }) {
  const hp = pc.hp || {current:0, max:0};
  const dead = hp.current <= 0;
  const [craftOpen, setCraftOpen] = useState(false);
  const [craftMsg, setCraftMsg] = useState(null);

  function setHp(v) { onUpdate({hp:{...hp, current:v}}); }
  function deltaHp(d) { onUpdate({hp:{...hp, current:Math.max(0, Math.min(hp.current+d, hp.max))}}); }

  function toggleToken(tokenIdx, pipIdx, avail) {
    const tks = (pc.power_tokens || []).map((tk, i) => {
      if (i !== tokenIdx) return tk;
      const newUsed = pipIdx < avail ? Math.min(tk.total, tk.used + 1) : Math.max(0, tk.used - 1);
      return {...tk, used: newUsed};
    });
    onUpdate({power_tokens: tks});
  }

  function updateDs(type, val) {
    onUpdate({death_saves: {...pc.death_saves, [type]: Math.max(0, Math.min(3, val))}});
  }

  function craftItem(item) {
    setCraftMsg(`Crafted: ${item}`);
    setCraftOpen(false);
    setTimeout(() => setCraftMsg(null), 4000);
  }

  const displayName = pc.name || pc.player || "—";
  const showPlayer = pc.player && pc.name;

  return (
    <div className="dnd-card rounded-lg p-3 mb-2 border border-gray-700 border-l-4 border-purple-500">
      <div className="flex items-start justify-between gap-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-bold text-white">{displayName}</span>
            <span className="text-xs text-gray-400">{pc.class} {pc.level}</span>
          </div>
          {showPlayer && <div className="text-xs text-gray-500 leading-tight">{pc.player}</div>}
          {!pc.name && pc.player && <div className="text-xs text-purple-400 leading-tight">{pc.player}</div>}
          <div className="flex items-center gap-2 mt-0.5 flex-wrap">
            <div className="flex items-center gap-1">
              <span className="text-xs text-gray-500">Init</span>
              <input type="number" className="init-input" placeholder="—"
                value={pc.initiative ?? ""}
                onChange={e => onUpdate({initiative: e.target.value==="" ? null : parseInt(e.target.value,10)})} />
            </div>
            {pc.spell_atk && (
              <span className="text-xs text-purple-400 font-mono">Spell {pc.spell_atk} / DC {pc.spell_dc}</span>
            )}
          </div>
        </div>
        <div className="flex flex-col items-end gap-1 flex-shrink-0">
          <div className="flex items-center gap-1 flex-wrap justify-end">
            <span className="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-300 font-mono">AC {pc.ac}</span>
            {pc.ac_armoured && pc.ac_armoured !== pc.ac && (
              <span className="text-xs px-2 py-0.5 rounded-full bg-gray-600 text-gray-400 font-mono" title="AC with armour">{pc.ac_armoured}⚔</span>
            )}
          </div>
          <HpEditor cur={hp.current} max={hp.max} onSet={setHp} onDelta={deltaHp} />
        </div>
      </div>
      <HpBar cur={hp.current} max={hp.max} />
      <AbilityRow stats={pc.stats} />
      <CondRow
        conditions={pc.conditions||[]}
        onAdd={c => onUpdate({conditions:[...(pc.conditions||[]),c]})}
        onRemove={c => onUpdate({conditions:(pc.conditions||[]).filter(x=>x!==c)})}
      />
      <div className="mt-2">
        <AdvDisToggle value={pc.adv_dis} onChange={v => onUpdate({adv_dis: v})} />
      </div>
      {pc.power_tokens && (
        <PowerTokenRow tokens={pc.power_tokens} onToggle={toggleToken} />
      )}
      {pc.crafting_items && (
        <div className="mt-2">
          <button onClick={() => setCraftOpen(o => !o)}
            className="text-xs px-2 py-0.5 rounded bg-amber-900 text-amber-300 hover:bg-amber-800 flex items-center gap-1">
            ⚒ Fast Crafting {craftOpen ? "▲" : "▼"}
          </button>
          {craftMsg && <div className="text-xs text-amber-400 mt-1">{craftMsg}</div>}
          {craftOpen && (
            <div className="mt-1 p-2 bg-gray-800 rounded border border-gray-700 grid grid-cols-2 gap-0.5">
              {pc.crafting_items.map(item => (
                <button key={item} onClick={() => craftItem(item)}
                  className="text-left text-xs text-gray-300 hover:text-amber-300 hover:bg-gray-700 px-1 py-0.5 rounded truncate">
                  {item}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
      {dead && pc.death_saves && (
        <DeathSaves ds={pc.death_saves} onChange={updateDs} />
      )}
    </div>
  );
}

function AdvDisToggle({ value, onChange }) {
  // value: null/"normal" = none, "adv" = advantage, "dis" = disadvantage
  const cur = value || "normal";
  return (
    <div className="flex rounded overflow-hidden" title="Advantage / Disadvantage">
      <button onClick={() => onChange(cur==="adv" ? "normal" : "adv")}
        className={`text-xs px-1.5 py-0.5 font-semibold transition-colors leading-tight ${cur==="adv" ? "bg-green-700 text-green-100" : "bg-gray-700 text-gray-500 hover:text-green-400"}`}
        title="Advantage">ADV</button>
      <button onClick={() => onChange(cur==="dis" ? "normal" : "dis")}
        className={`text-xs px-1.5 py-0.5 font-semibold transition-colors leading-tight ${cur==="dis" ? "bg-red-700 text-red-100" : "bg-gray-700 text-gray-500 hover:text-red-400"}`}
        title="Disadvantage">DIS</button>
    </div>
  );
}

function NPCCard({ creature, partyLevel, difficulty, onUpdate, onRemove }) {
  const [expanded, setExpanded] = useState(false);

  const baseHp = creature.hp_max || 0;
  const scaledMax = baseHp ? (scaledHp(baseHp, creature.cr, partyLevel, difficulty) ?? baseHp) : 0;
  const curHp = creature.currentHp !== undefined ? creature.currentHp : scaledMax;
  const displayMax = creature.scaledMax !== undefined ? creature.scaledMax : scaledMax;
  const showScaled = baseHp && isScaled(creature.cr, partyLevel, difficulty);
  const laCount = creature.legendary_actions?.count || 0;
  const laUsed  = creature.legendaryUsed || 0;

  function setHp(v) { onUpdate({currentHp: Math.max(0, v)}); }
  function deltaHp(d) { onUpdate({currentHp: Math.max(0, curHp + d)}); }
  function cycleRole() {
    const roles = ["Enemy", "NPC", "Ally"];
    const currentLower = (creature.role || "").toLowerCase();
    const currentIdx = roles.findIndex(r => r.toLowerCase() === currentLower);
    const nextIdx = (currentIdx + 1) % roles.length;
    onUpdate({role: roles[nextIdx]});
  }

  return (
    <div className={`dnd-card rounded-lg p-3 mb-2 border border-gray-700 border-l-4 ${roleBorder(creature.role)}`}>
      <div className="flex items-start justify-between gap-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className={`font-bold truncate ${roleNameColor(creature.role)}`}>{creature.nickname||creature.name}</span>
            <button onClick={cycleRole} className={`text-xs px-1.5 py-0.5 rounded-full font-medium cursor-pointer hover:opacity-80 transition-opacity ${roleBadge(creature.role)}`}>{creature.role}</button>
          </div>
          <div className="flex items-center gap-2 mt-0.5 flex-wrap">
            <div className="flex items-center gap-1">
              <span className="text-xs text-gray-500">Init</span>
              <input type="number" className="init-input" placeholder="—"
                value={creature.initiative ?? ""}
                onChange={e => onUpdate({initiative: e.target.value==="" ? null : parseInt(e.target.value,10)})} />
            </div>
            {creature.speed && <span className="text-xs text-gray-500">{creature.speed}ft</span>}
          </div>
        </div>
        <div className="flex flex-col items-end gap-1 flex-shrink-0">
          <div className="flex items-center gap-1">
            <span className="text-xs px-1.5 py-0.5 rounded bg-gray-700 text-gray-300 font-mono">CR {fmtCR(creature.cr)}</span>
            <span className="text-xs px-1.5 py-0.5 rounded-full bg-gray-700 text-gray-300 font-mono">AC {creature.ac||"—"}</span>
            <button onClick={onRemove} className="text-gray-600 hover:text-red-400 text-sm ml-0.5 leading-none">×</button>
          </div>
          <div className="flex items-center gap-0.5">
            <HpEditor cur={curHp} max={displayMax} onSet={setHp} onDelta={deltaHp} />
            {showScaled && <span className="text-xs text-gray-500 ml-1">(s)</span>}
          </div>
        </div>
      </div>
      <HpBar cur={curHp} max={displayMax} />
      <AbilityRow stats={creature.stats} savingThrows={creature.saving_throws} />
      <CondRow
        conditions={creature.conditions||[]}
        onAdd={c => onUpdate({conditions:[...(creature.conditions||[]),c]})}
        onRemove={c => onUpdate({conditions:(creature.conditions||[]).filter(x=>x!==c)})}
      />
      <div className="flex items-center gap-3 mt-2 flex-wrap">
        <AdvDisToggle value={creature.adv_dis} onChange={v => onUpdate({adv_dis: v})} />
        <button
          onClick={() => onUpdate({reactionSpent: !creature.reactionSpent})}
          className={`text-xs flex items-center gap-1 px-2 py-0.5 rounded bg-gray-700 hover:bg-gray-600 ${creature.reactionSpent ? "text-gray-500" : "text-yellow-400"}`}
          title={creature.reactionSpent ? "Reaction spent" : "Reaction available"}
        >⚡ Reaction</button>
        {laCount > 0 && (
          <div className="flex items-center gap-0.5">
            <span className="text-xs text-gray-500 mr-0.5">LA</span>
            {Array.from({length:laCount}).map((_,i) => (
              <span key={i}
                className={`pip ${i < (laCount - laUsed) ? "pip-la-on" : "pip-la-off"}`}
                onClick={() => onUpdate({legendaryUsed: i < (laCount-laUsed) ? laUsed+1 : Math.max(0,laUsed-1)})}
                title={`Legendary action ${i+1}`} />
            ))}
          </div>
        )}
      </div>
      <button onClick={() => setExpanded(x=>!x)}
        className="mt-2 text-xs text-gray-500 hover:text-gray-300 flex items-center gap-1">
        {expanded ? "▴" : "▾"} Full Stats
      </button>
      {expanded && (
        <div className="expand-body text-xs dnd-text space-y-1">
          {creature.speed              && <p><span className="text-gray-500">Speed:</span> {creature.speed} ft.</p>}
          {creature.alignment          && <p><span className="text-gray-500">Alignment:</span> {creature.alignment}{creature.type ? ` · ${creature.type}` : ''}{creature.size ? ` · ${creature.size}` : ''}</p>}
          {creature.passive_perception && <p><span className="text-gray-500">Passive Perc:</span> <span className="text-purple-400">{creature.passive_perception}</span></p>}
          {creature.skills?.length>0   && <p><span className="text-gray-500">Skills:</span> <span className="text-green-400">{creature.skills.join(", ")}</span></p>}
          {creature.saving_throws?.length>0 && <p><span className="text-gray-500">Saves:</span> <span className="text-green-400">{creature.saving_throws.join(", ")}</span></p>}
          {creature.damage_resistances && <p><span className="text-gray-500">Resistances:</span> <span className="text-blue-300">{creature.damage_resistances}</span></p>}
          {creature.damage_immunities  && <p><span className="text-gray-500">Immunities:</span> <span className="text-yellow-300">{creature.damage_immunities}</span></p>}
          {creature.languages?.length>0 && <p><span className="text-gray-500">Languages:</span> {creature.languages.join(", ")}</p>}
          {creature.traits?.length>0 && (
            <div>
              <SectionHeader title="Traits" role={creature.role} />
              {creature.traits.map((t,i) => <p key={i} className="mb-1"><em className="text-gray-200 not-italic font-semibold">{t.name}.</em> {t.desc}</p>)}
            </div>
          )}
          {(creature.actions?.length>0 || creature.bonus_actions?.filter(a=>a.name).length>0) && (
            <div>
              <SectionHeader title="Actions" role={creature.role} />
              {creature.actions?.map((a,i) => <p key={i} className="mb-1"><em className="text-gray-200 not-italic font-semibold">{a.name}.</em> {a.desc}</p>)}
              {creature.bonus_actions?.filter(a=>a.desc).map((a,i) =>
                <p key={i} className="mb-1"><em className="text-gray-200 not-italic font-semibold">Bonus – {a.name}.</em> {a.desc}</p>)}
            </div>
          )}
          {creature.reactions?.filter(r=>r.desc).length>0 && (
            <div>
              <SectionHeader title="Reactions" role={creature.role} />
              {creature.reactions.filter(r=>r.desc).map((r,i) =>
                <p key={i} className="mb-1"><em className="text-gray-200 not-italic font-semibold">{r.name}.</em> {r.desc}</p>)}
            </div>
          )}
          {creature.legendary_actions?.actions?.length>0 && (
            <div>
              <SectionHeader title={`Legendary Actions (${laCount}/turn)`} role={creature.role} />
              {creature.legendary_actions.actions.map((a,i) =>
                <p key={i} className="mb-1"><em className="text-gray-200 not-italic font-semibold">{a.name}.</em> {a.desc}</p>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function CustomForm({ onAdd, onCancel }) {
  const [f, setF] = useState({name:"",hp:10,ac:12,cr:"0",str:10,dex:10,con:10,int:10,wis:10,cha:10});
  const set = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = "bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white w-full focus:outline-none focus:border-purple-500";
  const num = "bg-gray-900 border border-gray-600 rounded px-1 py-1 text-xs text-white w-10 text-center focus:outline-none focus:border-purple-500";
  function submit(e) {
    e.preventDefault();
    const stats = {str:+f.str,dex:+f.dex,con:+f.con,int:+f.int,wis:+f.wis,cha:+f.cha};
    onAdd({
      id:uid(), name:f.name||"Custom", nickname:f.name||"Custom",
      role:"Enemy", cr:f.cr, hp_max:+f.hp, ac:+f.ac, stats,
      traits:[], actions:[], bonus_actions:[], reactions:[],
      skills:[], saving_throws:[], languages:[],
      conditions:[], initiative:null, reactionSpent:false, legendaryUsed:0
    });
  }
  return (
    <form onSubmit={submit} className="bg-gray-800 border border-gray-600 rounded-lg p-3 mt-2">
      <p className="text-sm font-semibold text-gray-300 mb-2">New Custom Creature</p>
      <div className="space-y-2">
        <input className={inp} placeholder="Name" value={f.name} onChange={e=>set("name",e.target.value)} />
        <div className="grid grid-cols-3 gap-2">
          <div><label className="text-xs text-gray-500">HP</label><input type="number" className={inp} value={f.hp} onChange={e=>set("hp",e.target.value)} /></div>
          <div><label className="text-xs text-gray-500">AC</label><input type="number" className={inp} value={f.ac} onChange={e=>set("ac",e.target.value)} /></div>
          <div><label className="text-xs text-gray-500">CR</label><input className={inp} value={f.cr} onChange={e=>set("cr",e.target.value)} /></div>
        </div>
        <div className="grid grid-cols-6 gap-1">
          {STAT_KEYS.map(k => (
            <div key={k} className="flex flex-col items-center">
              <span className="text-xs text-gray-500 uppercase">{k}</span>
              <input type="number" className={num} value={f[k]} onChange={e=>set(k,e.target.value)} />
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <button type="submit" className="flex-1 bg-purple-700 hover:bg-purple-600 text-white text-sm rounded px-3 py-1">Add</button>
          <button type="button" onClick={onCancel} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded px-3 py-1">Cancel</button>
        </div>
      </div>
    </form>
  );
}

        className="ml-auto bg-gray-900 border border-gray-600 rounded px-3 py-1 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 w-52" />
    </div>
  );
}

function LeftPanel({ characters, activeTab, search, onAddToEncounter }) {
  const [rosterFilter, setRosterFilter] = useState("All");

  const ROSTER_FILTERS = [
    { label: "All",     match: () => true },
    { label: "Allies",  match: c => c.role?.toLowerCase() === "ally" },
    { label: "Enemies", match: c => ["antagonist","enemy","boss"].includes(c.role?.toLowerCase()) },
    { label: "NPCs",    match: c => ["npc","neutral"].includes(c.role?.toLowerCase()) || (!c.role || !["ally","antagonist","enemy","boss","pc"].includes(c.role?.toLowerCase())) },
  ];

  const filtered = characters.filter(c => {
    const q = search.toLowerCase();
    const matchSearch = !search || [c.nickname,c.fullname,c.name,c.role]
      .some(s => s && s.toLowerCase().includes(q));
    const matchTab = search ? true
      : activeTab === "All" ? true
      : String(c.chapter_playable) === activeTab;
    const matchRole = ROSTER_FILTERS.find(f => f.label === rosterFilter)?.match(c) ?? true;
    return matchSearch && matchTab && matchRole;
  });

  return (
    <div className="flex flex-col h-full w-80 flex-shrink-0">
      <div className="p-2 border-b border-gray-700 flex-shrink-0">
        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Roster</h2>
        <div className="flex gap-1 flex-wrap">
          {ROSTER_FILTERS.map(f => (
            <button key={f.label} onClick={() => setRosterFilter(f.label)}
              className={`text-xs px-2 py-0.5 rounded transition-colors ${rosterFilter === f.label
                ? f.label === "Allies"  ? "bg-green-800 text-green-200"
                : f.label === "Enemies" ? "bg-red-900 text-red-200"
                : f.label === "NPCs"    ? "bg-blue-900 text-blue-200"
                : "bg-purple-800 text-purple-200"
                : "bg-gray-700 text-gray-400 hover:bg-gray-600 hover:text-white"}`}>
              {f.label}
            </button>
          ))}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-2">
        {filtered.length === 0 && <p className="text-xs text-gray-600 text-center mt-4">No matches</p>}
        {filtered.map((c, i) => {
          const showCh = search && c.chapter_playable && String(c.chapter_playable) !== activeTab;
          return (
            <div key={c.name+i} className="relative mb-2"
              draggable
              onDragStart={e => e.dataTransfer.setData("application/dnd-character", JSON.stringify(c))}>
              <RosterCard character={c} onAddToEncounter={onAddToEncounter} />
              {showCh && (
                <span className="text-xs px-1.5 py-0.5 rounded bg-blue-900 text-blue-300 absolute top-3 right-3">
                  Ch.{c.chapter_playable}
                </span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── RIGHT PANEL ───────────────────────────────────────────────── */

function RightPanel({ diceOpen }) {
  if (!diceOpen) return null;
  return <RightPanelInner />;
}

function RightPanelInner() {
  const [count, setCount] = useState(1);
  const [manual, setManual] = useState("");
  const [history, setHistory] = useState([]);
  const [rollMode, setRollMode] = useState("normal"); // "normal" | "adv" | "dis"

  function addEntry(label, total, rawD20) {
    const t = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const crit = rawD20===20?"crit":rawD20===1?"fumble":null;
    setHistory(h => [{id:uid(),label,total,time:t,crit},...h].slice(0,60));
  }

  function roll(sides) {
    const n = Math.max(1, Math.min(10, count));
    if (sides === 20 && n === 1 && rollMode !== "normal") {
      const a = dN(20), b = dN(20);
      const result = rollMode === "adv" ? Math.max(a,b) : Math.min(a,b);
      const kept = rollMode === "adv" ? (a>=b?a:b) : (a<=b?a:b);
      const dropped = rollMode === "adv" ? (a>=b?b:a) : (a<=b?b:a);
      const modeLabel = rollMode === "adv" ? "ADV" : "DIS";
      const crit = result===20?"crit":result===1?"fumble":null;
      const t = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      setHistory(h => [{id:uid(),label:`d20 ${modeLabel} [${kept} / ~~${dropped}~~] = ${result}`,total:result,time:t,crit,mode:rollMode},...h].slice(0,60));
      return;
    }
    const rolls = Array.from({length:n}, () => dN(sides));
    const total = rolls.reduce((a,b)=>a+b,0);
    const label = n>1 ? `${n}d${sides} [${rolls.join("+")}] = ${total}` : `d${sides} = ${total}`;
    addEntry(label, total, n===1&&sides===20 ? rolls[0] : null);
  }

  function useManual() {
    const v = parseInt(manual, 10);
    if (!isNaN(v)) { addEntry(`Manual: ${v}`, v, null); setManual(""); }
  }

  const DICE = [4,6,8,10,12,20,100];

  const MODE_BUTTONS = [
    { key:"adv",    label:"Adv",    active:"bg-green-700 text-green-100",  inactive:"bg-gray-700 text-gray-400 hover:bg-gray-600" },
    { key:"normal", label:"Normal", active:"bg-gray-600 text-white",       inactive:"bg-gray-700 text-gray-400 hover:bg-gray-600" },
    { key:"dis",    label:"Dis",    active:"bg-orange-700 text-orange-100",inactive:"bg-gray-700 text-gray-400 hover:bg-gray-600" },
  ];

  return (
    <div className="flex flex-col h-full w-52 flex-shrink-0">
      <div className="p-2 border-b border-gray-700 flex-shrink-0">
        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Dice Roller</h2>
        <div className="flex rounded overflow-hidden mb-2">
          {MODE_BUTTONS.map(m => (
            <button key={m.key} onClick={() => setRollMode(m.key)}
              className={`flex-1 text-xs py-1.5 font-semibold transition-colors ${rollMode===m.key ? m.active : m.inactive}`}>
              {m.label}
            </button>
          ))}
        </div>
        {rollMode !== "normal" && (
          <p className="text-xs text-center mb-2 font-semibold" style={{color: rollMode==="adv"?"#86efac":"#fdba74"}}>
            {rollMode==="adv" ? "⬆ Advantage — d20 takes highest" : "⬇ Disadvantage — d20 takes lowest"}
          </p>
        )}
        <div className="flex items-center gap-2 mb-2">
          <span className="text-xs text-gray-500">Count</span>
          <input type="number" min="1" max="10"
            className="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white w-14 text-center focus:outline-none focus:border-purple-500"
            value={count} onChange={e => setCount(Math.max(1,Math.min(10,parseInt(e.target.value,10)||1)))} />
        </div>
        <div className="grid grid-cols-3 gap-1 mb-2">
          {DICE.map(d => (
            <button key={d} onClick={() => roll(d)}
              className={`py-2 rounded text-sm font-bold transition-colors ${
                d===20 && rollMode==="adv"  ? "bg-green-700 hover:bg-green-600 text-green-100" :
                d===20 && rollMode==="dis"  ? "bg-orange-700 hover:bg-orange-600 text-orange-100" :
                d===20                      ? "bg-purple-800 hover:bg-purple-700 text-purple-100" :
                "bg-gray-700 hover:bg-gray-600 text-gray-200"
              }`}>
              d{d}
            </button>
          ))}
        </div>
        <div className="flex gap-1 min-w-0">
          <input type="number" placeholder="Value"
            className="flex-1 min-w-0 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
            value={manual} onChange={e=>setManual(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&useManual()} />
          <button onClick={useManual} className="bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm rounded px-2 py-1 flex-shrink-0">Use</button>
        </div>
      </div>
      <div className="flex items-center justify-between px-2 pt-2 pb-1 flex-shrink-0">
        <span className="text-xs text-gray-500">History</span>
        <button onClick={()=>setHistory([])} className="text-xs text-gray-600 hover:text-gray-400">Clear</button>
      </div>
      <div className="flex-1 overflow-y-auto px-2 pb-2">
        {history.length===0 && <p className="text-xs text-gray-600 text-center mt-3">No rolls yet</p>}
        {history.map(e => (
          <div key={e.id} className={`flex items-center justify-between px-2 py-1.5 rounded mb-1 text-xs ${
            e.crit==="crit"?"bg-yellow-900 border border-yellow-700":
            e.crit==="fumble"?"bg-red-950 border border-red-900":
            "bg-gray-800"}`}>
            <span className={`truncate mr-1 flex-1 ${e.mode==="adv"?"text-green-300":e.mode==="dis"?"text-orange-300":"text-gray-300"}`}>{e.label}</span>
            <div className="flex items-center gap-1 flex-shrink-0">
              {e.crit==="crit"   && <span className="text-yellow-400 font-bold text-xs">CRIT!</span>}
              {e.crit==="fumble" && <span className="text-red-400 font-bold text-xs">FUMBLE</span>}
              <span className="text-gray-600">{e.time}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Difficulty Calculator ─────────────────────────────────────── */

function DifficultyCalc({ encounter, partyLevel, partySize }) {
  if (!encounter.length) return null;

  // Split creatures by role
  const enemies = encounter.filter(c => {
    const r = (c.role || "").toLowerCase();
    return ["antagonist", "boss", "enemy"].includes(r);
  });
  const allies = encounter.filter(c => (c.role || "").toLowerCase() === "ally");

  // Count allies as extra party members
  const effectivePartySize = partySize + allies.length;

  // Calculate XP from enemies only
  const rawXP = enemies.reduce((sum, c) => {
    const crStr = String(c.cr ?? "0").trim();
    return sum + (CR_XP[crStr] || 0);
  }, 0);
  const adjusted = enemies.length > 0 ? Math.round(rawXP * encMult(enemies.length)) : 0;
  const lvl = Math.max(1, Math.min(20, partyLevel));
  const sz = Math.max(1, effectivePartySize);
  const thresholds = XP_THRESH[lvl];
  const partyEasy = thresholds[0] * sz;
  const partyMed  = thresholds[1] * sz;
  const partyHard = thresholds[2] * sz;
  const partyDead = thresholds[3] * sz;
  let rating, color;
  if (adjusted >= partyDead)      { rating = "Deadly";  color = "text-red-400"; }
  else if (adjusted >= partyHard) { rating = "Hard";    color = "text-orange-400"; }
  else if (adjusted >= partyMed)  { rating = "Medium";  color = "text-yellow-400"; }
  else if (adjusted >= partyEasy) { rating = "Easy";    color = "text-green-400"; }
  else                            { rating = "Trivial"; color = "text-gray-400"; }
  return (
    <div className="flex items-center gap-3 text-xs bg-gray-800 rounded px-3 py-1.5 mb-2 border border-gray-700">
      <span className="text-gray-500">XP: {rawXP} raw / {adjusted} adj</span>
      <span className="text-gray-600">|</span>
      <span className="text-gray-500">Easy {partyEasy} · Med {partyMed} · Hard {partyHard} · Deadly {partyDead}</span>
      <span className="text-gray-600">|</span>
      <span className={`font-bold ${color}`}>{rating}</span>
    </div>
  );
}

/* ── CENTRE PANEL ──────────────────────────────────────────────── */

function CentrePanel({ characters, pcs, activeTab, encounterQueue, onQueueConsumed, pcState, setPcState }) {
  const [partyLevel,    setPartyLevel]    = useState(() => loadState('partyLevel', 1));
  const [difficulty,    setDifficulty]    = useState(() => loadState('difficulty', "Standard"));
  const [round,         setRound]         = useState(() => loadState('round', 1));
  const [encounter,     setEncounter]     = useState(() => loadState('encounter', []));
  const [pendingWave2,  setPendingWave2]  = useState(null);
  const [preset,        setPreset]        = useState("");
  const [showForm,      setShowForm]      = useState(false);
  const [dropOver,      setDropOver]      = useState(false);

  // Persist encounter state
  useEffect(() => { saveState('partyLevel', partyLevel); }, [partyLevel]);
  useEffect(() => { saveState('difficulty', difficulty); }, [difficulty]);
  useEffect(() => { saveState('round', round); }, [round]);
  useEffect(() => { saveState('encounter', encounter); }, [encounter]);

  /* Consume encounter queue from left panel */
  useEffect(() => {
    if (!encounterQueue?.length) return;
    encounterQueue.forEach(char => {
      setEncounter(e => [...e, prepareCreature(char, partyLevel, difficulty)]);
    });
    onQueueConsumed();
  }, [encounterQueue]);

  function updatePc(id, patch) {
    setPcState(ps => ps.map(p => p.id===id ? {...p,...patch} : p));
  }

  function updateCreature(id, patch) {
    setEncounter(e => e.map(c => c.id===id ? {...c,...patch} : c));
  }

  function removeCreature(id) {
    setEncounter(e => e.filter(c => c.id!==id));
  }

  function advanceRound() {
    setRound(r => r+1);
    setEncounter(e => e.map(c => ({...c, reactionSpent:false, legendaryUsed:0})));
  }

  function rollInitiatives() {
    setEncounter(e => e.map(c => ({
      ...c,
      initiative: d20() + mod(c.stats?.dex || 10)
    })));
  }

  function loadPreset(name) {
    setPreset(name);
    const p = PRESETS.find(x => x.name===name);
    if (!p) { setEncounter([]); setPendingWave2(null); return; }
    const wave1 = p.wave1.map(nick =>
      characters.find(c => (c.nickname||c.name||"").toLowerCase()===nick.toLowerCase())
    ).filter(Boolean);
    setEncounter(wave1.map(c => prepareCreature(c, partyLevel, difficulty)));
    setPendingWave2(p.wave2?.length ? p.wave2 : null);
  }

  function spawnWave2() {
    if (!pendingWave2) return;
    const wave2 = pendingWave2.map(nick =>
      characters.find(c => (c.nickname||c.name||"").toLowerCase()===nick.toLowerCase())
    ).filter(Boolean);
    setEncounter(e => [...e, ...wave2.map(c => prepareCreature(c, partyLevel, difficulty))]);
    setPendingWave2(null);
  }

  function dropCharacter(e) {
    e.preventDefault();
    setDropOver(false);
    const raw = e.dataTransfer.getData("application/dnd-character");
    if (!raw) return;
    try {
      const char = JSON.parse(raw);
      setEncounter(enc => [...enc, prepareCreature(char, partyLevel, difficulty)]);
    } catch(_) {}
  }

  const sortedEncounter = [...encounter].sort((a,b) => {
    if (a.initiative===null && b.initiative===null) return 0;
    if (a.initiative===null) return 1;
    if (b.initiative===null) return -1;
    return b.initiative - a.initiative;
  });

  const sortedPcs = [...pcState].sort((a,b) => {
    if (a.initiative===null && b.initiative===null) return 0;
    if (a.initiative===null) return 1;
    if (b.initiative===null) return -1;
    return b.initiative - a.initiative;
  });

  const DIFFS = ["Easy","Standard","Hard","Deadly"];

  return (
    <div className="flex flex-col h-full flex-1 min-w-0">

      {/* Settings bar */}
      <div className="bg-gray-800 border-b border-gray-700 p-2 flex-shrink-0">
        <div className="flex flex-wrap items-center gap-2">
          <div className="flex items-center gap-1">
            <span className="text-xs text-gray-500 whitespace-nowrap">Party Lv</span>
            <input type="number" min="1" max="20"
              className="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white w-14 text-center focus:outline-none focus:border-purple-500"
              value={partyLevel}
              onChange={e => setPartyLevel(Math.max(1,Math.min(20,parseInt(e.target.value,10)||1)))} />
          </div>
          <div className="flex gap-0.5 flex-wrap">
            {DIFFS.map(d => (
              <button key={d} onClick={() => setDifficulty(d)}
                className={`text-xs px-2 py-1 rounded ${difficulty===d?"bg-purple-700 text-white":"bg-gray-700 text-gray-400 hover:bg-gray-600"}`}>
                {d}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-1 ml-auto">
            <span className="text-xs text-gray-500">Round</span>
            <button onClick={() => setRound(r=>Math.max(1,r-1))} className="w-6 h-6 bg-gray-700 hover:bg-gray-600 rounded text-gray-300 text-sm flex items-center justify-center">−</button>
            <span className="text-sm font-bold text-white w-6 text-center">{round}</span>
            <button onClick={advanceRound} className="w-6 h-6 bg-gray-700 hover:bg-purple-700 rounded text-gray-300 hover:text-white text-sm flex items-center justify-center">+</button>
          </div>
          <select value={preset} onChange={e => loadPreset(e.target.value)}
            className="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-purple-500 max-w-xs">
            <option value="">— Select Preset —</option>
            {PRESETS
              .filter(p => activeTab === "All" || String(p.chapter) === activeTab)
              .map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
          </select>
        </div>
      </div>

      {/* Scrollable body */}
      <div className="flex-1 overflow-y-auto p-3">

        {/* Party */}
        <div className="mb-4">
          <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Party</h3>
          <div className="flex flex-wrap gap-2">
            {sortedPcs.map(pc => (
              <div key={pc.id} className="encounter-card">
                <PCCard pc={pc} onUpdate={patch => updatePc(pc.id,patch)} />
              </div>
            ))}
          </div>
          {sortedPcs.length===0 && <p className="text-xs text-gray-600">No player characters loaded.</p>}
        </div>

        {/* Encounter */}
        <div
          onDragOver={e => { e.preventDefault(); setDropOver(true); }}
          onDragLeave={() => setDropOver(false)}
          onDrop={dropCharacter}
          className={`rounded-lg transition-colors ${dropOver ? "ring-2 ring-purple-500 bg-purple-900 bg-opacity-10" : ""}`}>
          <div className="flex items-center justify-between mb-2">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wide flex items-center gap-2">
              Encounter
              {encounter.length>0 && (
                <span className="bg-gray-700 text-gray-300 text-xs px-1.5 py-0.5 rounded-full">{encounter.length}</span>
              )}
            </h3>
            <div className="flex items-center gap-2">
              {pendingWave2 && (
                <button onClick={spawnWave2}
                  className="text-xs px-2 py-1 bg-orange-800 hover:bg-orange-700 text-orange-200 rounded font-medium">
                  Spawn Wave 2 →
                </button>
              )}
              {encounter.length>0 && (
                <button onClick={rollInitiatives}
                  className="text-xs px-2 py-1 bg-blue-800 hover:bg-blue-700 text-blue-200 rounded">
                  🎲 Roll Initiative
                </button>
              )}
            </div>
          </div>

          <DifficultyCalc encounter={encounter} partyLevel={partyLevel} partySize={pcState.length || 4} />

          <div className="flex flex-wrap gap-2">
            {sortedEncounter.map(c => (
              <div key={c.id} className="encounter-card">
                <NPCCard creature={c}
                  partyLevel={partyLevel} difficulty={difficulty}
                  onUpdate={patch => updateCreature(c.id,patch)}
                  onRemove={() => removeCreature(c.id)} />
              </div>
            ))}
          </div>

          {encounter.length===0 && !dropOver && (
            <p className="text-xs text-gray-600 mb-3">Drag a card from the roster, or use a preset above.</p>
          )}
          {encounter.length===0 && dropOver && (
            <p className="text-xs text-purple-400 mb-3 text-center font-medium">Drop to add to encounter ✦</p>
          )}

          {showForm
            ? <CustomForm
                onAdd={c => { setEncounter(e=>[...e,c]); setShowForm(false); }}
                onCancel={() => setShowForm(false)} />
            : <button onClick={() => setShowForm(true)}
                className="w-full mt-1 text-xs px-3 py-2 bg-gray-800 hover:bg-gray-700 border border-dashed border-gray-600 text-gray-400 hover:text-gray-200 rounded-lg transition-colors">
                + Custom Creature
              </button>
          }
        </div>
      </div>
    </div>
  );
}

/* ── Markdown Pipeline ─────────────────────────────────────────── */

function stripFrontmatter(md) { return md.replace(/^---[\s\S]*?---\n?/, ''); }

function mdToHtml(md, imageMap, depth) {
  if (!md) return '';
  depth = depth || 0;
  if (depth > 4) return md;

  // Strip frontmatter
  let text = stripFrontmatter(md);

  // Handle ![[image]] embeds — check user uploads first, then server manifest
  text = text.replace(/!\[\[([^\]]+)\]\]/g, (_, fname) => {
    const url = resolveImageUrl(fname, imageMap);
    if (url) return `<img src="${url}" alt="${fname}" />`;
    return `<em>[Image: ${fname}]</em>`;
  });

  // Replace [[wikilinks]] with placeholders before marked parses
  const wikilinks = [];
  text = text.replace(/\[\[([^\]]+)\]\]/g, (_, inner) => {
    const parts = inner.split('|');
    const target = parts[0].trim();
    const display = (parts[1] || parts[0]).trim();
    const idx = wikilinks.length;
    wikilinks.push({ target, display });
    return `WWIKI${idx}PH`;
  });

  // Process Obsidian callouts: > [!type] Title
  // Match the opening line, then greedily capture ALL following lines starting with >
  text = text.replace(/^(>{1,4})\s*\[!(\w+)\]\s*(.*)\n((?:(?:\1[^\S\n]?.*|>\s*)\n?)*)/gm, (_, gt, type, title, body) => {
    const t = type.toLowerCase();
    // Strip leading > from each body line, then remove bare --- separators
    // (marked treats text + --- as setext h2 headings inside callouts)
    const bodyClean = body.replace(/^>+\s?/gm, '').replace(/^---+\s*$/gm, '');
    const innerHtml = mdToHtml(bodyClean, imageMap, depth + 1);
    const titleHtml = marked.parseInline(title || t.charAt(0).toUpperCase() + t.slice(1));
    return `<div class="callout callout-${t}"><div class="callout-title">${titleHtml}</div><div>${innerHtml}</div></div>\n`;
  });

  // Run marked parser
  let html = marked.parse(text);

  // Restore wikilink placeholders
  wikilinks.forEach((wl, i) => {
    html = html.replace(`WWIKI${i}PH`, `<span class="wikilink" data-target="${wl.target}">${wl.display}</span>`);
  });

  return html;
}

function linkCharacterNamesInHtml(html, characters) {
  if (!characters || !characters.length) return html;
  // Split on HTML tags to avoid mangling attributes
  const parts = html.split(/(<[^>]+>)/);
  const names = characters.map(c => c.nickname || c.name).filter(Boolean).sort((a, b) => b.length - a.length);
  const namePattern = new RegExp('\\b(' + names.map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')\\b', 'g');
  for (let i = 0; i < parts.length; i++) {
    // Only process text nodes (odd indices are tags)
    if (i % 2 === 0 && parts[i].trim()) {
      // Don't process if already inside a char-ref or wikilink
      parts[i] = parts[i].replace(namePattern, '<span class="char-ref" data-char="$1">$1</span>');
    }
  }
  return parts.join('');
}

function extractToc(rawMd) {
  if (!rawMd) return [];
  const clean = stripFrontmatter(rawMd);
  const toc = [];
  const re = /^(#{1,4})\s+(.+)$/gm;
  let m, idx = 0;
  while ((m = re.exec(clean)) !== null) {
    toc.push({ level: m[1].length, text: m[2].trim(), idx: idx++ });
  }
  return toc;
}

function DocumentPanel({ characters, activeTab }) {
  const [mdContent, setMdContent]   = useState(null);
  const [fileName, setFileName]     = useState("");
  const [imageMap, setImageMap]     = useState({});
  const [toc, setToc]               = useState([]);
  const [hoverChar, setHoverChar]   = useState(null);
  const [hoverPos, setHoverPos]     = useState({ x: 0, y: 0 });
  const [showBrowser, setShowBrowser] = useState(false);
  const [notesList, setNotesList]   = useState(null);
  const contentRef = useRef(null);

  // Restore document state from persistence on mount
  useEffect(() => {
    const savedMd = loadState('docContent', null);
    const savedName = loadState('docFileName', '');
    if (savedMd) {
      setMdContent(savedMd);
      setFileName(savedName);
      setToc(extractToc(savedMd));
    }
    // Restore images from IndexedDB
    loadImages().then(map => {
      if (Object.keys(map).length > 0) setImageMap(map);
    });
  }, []);

  // Auto-load chapter note when the chapter tab changes
  const prevTab = useRef(null);
  useEffect(() => {
    if (!activeTab || activeTab === "All" || activeTab === prevTab.current) return;
    prevTab.current = activeTab;
    // Map chapter number to note path
    const chapterMap = {
      '1': 'notes/chapters/Chapter 1 - Around Town.md',
      '2': 'notes/chapters/Chapter 2 - The Field of Miracles.md',
      '3': 'notes/chapters/Chapter 3 - The Puppet Theatre.md',
      '4': 'notes/chapters/Chapter 4 - The Circus.md',
    };
    const path = chapterMap[activeTab];
    if (path) {
      fetch(path).then(r => { if (r.ok) return r.text(); }).then(raw => {
        if (raw) {
          setMdContent(raw);
          setFileName(path.split('/').pop());
          setToc(extractToc(raw));
        }
      }).catch(() => {});
    }
  }, [activeTab]);

  // Persist document content + filename
  useEffect(() => {
    if (mdContent !== null) {
      saveState('docContent', mdContent);
      saveState('docFileName', fileName);
    }
  }, [mdContent, fileName]);

  // Persist images to IndexedDB when imageMap changes
  useEffect(() => {
    const entries = Object.entries(imageMap);
    if (entries.length > 0) {
      saveImages(entries.map(([name, dataUrl]) => ({ name, dataUrl })));
    }
  }, [imageMap]);

  function loadFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.md';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      setFileName(file.name);
      const reader = new FileReader();
      reader.onload = (ev) => {
        const raw = ev.target.result;
        setMdContent(raw);
        setToc(extractToc(raw));
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function loadImagesFromPicker() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = async (e) => {
      const map = { ...imageMap };
      for (const f of Array.from(e.target.files)) {
        map[f.name] = await fileToDataUrl(f);
      }
      setImageMap(map);
    };
    input.click();
  }

  async function openBrowseNotes() {
    if (!serverManifest) await loadManifest();
    if (serverManifest && serverManifest.notes) {
      setNotesList(serverManifest.notes);
      setShowBrowser(true);
    }
  }

  async function fetchNote(note) {
    try {
      const resp = await fetch(note.path);
      if (!resp.ok) return;
      const raw = await resp.text();
      setMdContent(raw);
      setFileName(note.name + '.md');
      setToc(extractToc(raw));
      setShowBrowser(false);
    } catch(_) {}
  }

  function jumpToHeading(idx) {
    if (!contentRef.current) return;
    const headings = contentRef.current.querySelectorAll('h1, h2, h3, h4');
    if (headings[idx]) {
      // Calculate offset relative to the scroll container, not the page
      const container = contentRef.current;
      const headingTop = headings[idx].offsetTop - container.offsetTop;
      container.scrollTo({ top: headingTop - 12, behavior: 'smooth' });
    }
  }

  function handleMouseOver(e) {
    const target = e.target.closest('.char-ref');
    if (target) {
      const charName = target.getAttribute('data-char');
      const char = characters.find(c => (c.nickname || c.name) === charName);
      if (char) {
        setHoverChar(char);
        setHoverPos({ x: e.clientX, y: e.clientY });
      }
    }
  }

  function handleMouseOut(e) {
    if (e.target.closest('.char-ref')) {
      setHoverChar(null);
    }
  }

  function handleMouseMove(e) {
    if (e.target.closest('.char-ref')) {
      setHoverPos({ x: e.clientX, y: e.clientY });
    }
  }

  const renderedHtml = React.useMemo(() => {
    if (!mdContent) return '';
    let html = mdToHtml(mdContent, imageMap);
    html = linkCharacterNamesInHtml(html, characters);
    return html;
  }, [mdContent, imageMap, characters]);

  return (
    <div className="flex flex-col h-full flex-1 min-w-0">
      {/* Toolbar */}
      <div className="bg-gray-800 border-b border-gray-700 p-2 flex-shrink-0 flex items-center gap-2 flex-wrap">
        <button onClick={openBrowseNotes}
          className="text-xs px-3 py-1 bg-purple-700 hover:bg-purple-600 text-white rounded">
          📂 Browse Notes
        </button>
        <button onClick={loadFile}
          className="text-xs px-3 py-1 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded">
          📄 Upload .md
        </button>
        <button onClick={loadImagesFromPicker}
          className="text-xs px-3 py-1 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded">
          🖼 Load Images
        </button>
        {fileName && <span className="text-xs text-gray-400 truncate">{fileName}</span>}
        {toc.length > 0 && (
          <select onChange={e => jumpToHeading(parseInt(e.target.value, 10))}
            className="ml-auto bg-gray-900 border border-gray-600 rounded px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-purple-500 max-w-xs">
            <option value="">— Jump to… —</option>
            {toc.map((h, i) => (
              <option key={i} value={h.idx}>{'  '.repeat(h.level - 1)}{h.text}</option>
            ))}
          </select>
        )}
      </div>

      {/* Content */}
      <div className="flex-1 overflow-y-auto p-4 md:p-6"
        ref={contentRef}
        onMouseOver={handleMouseOver}
        onMouseOut={handleMouseOut}
        onMouseMove={handleMouseMove}>
        {showBrowser && notesList && (
          <div style={{ position: 'absolute', inset: 0, zIndex: 40, background: 'rgba(0,0,0,0.85)', overflow: 'auto', padding: '1rem' }}>
            <div style={{ maxWidth: 480, margin: '0 auto' }}>
              <div className="flex items-center justify-between mb-3">
                <span className="text-sm font-semibold text-white">Browse Notes</span>
                <button onClick={() => setShowBrowser(false)}
                  className="text-gray-400 hover:text-white text-lg px-2">&times;</button>
              </div>
              {(() => {
                const groups = {};
                notesList.forEach(n => {
                  const cat = n.category || 'root';
                  if (!groups[cat]) groups[cat] = [];
                  groups[cat].push(n);
                });
                const order = ['chapters', 'characters', 'locations', 'root'];
                const labels = { chapters: 'Chapters', characters: 'Characters', locations: 'Locations', root: 'Other Notes' };
                // Add any categories not in the predefined order
                Object.keys(groups).forEach(k => { if (!order.includes(k)) order.push(k); });
                return order.filter(k => groups[k]).map(cat => (
                  <div key={cat} className="mb-3">
                    <div className="text-xs text-gray-500 uppercase tracking-wide mb-1">{labels[cat] || cat}</div>
                    {groups[cat].map((note, i) => (
                      <button key={i} onClick={() => fetchNote(note)}
                        className="block w-full text-left text-sm px-3 py-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white transition-colors">
                        {note.name}
                      </button>
                    ))}
                  </div>
                ));
              })()}
            </div>
          </div>
        )}
        {!mdContent && !showBrowser ? (
          <div className="text-center mt-16">
            <p className="text-gray-500 text-sm mb-3">No document loaded</p>
            <button onClick={openBrowseNotes}
              className="text-sm px-4 py-2 bg-purple-700 hover:bg-purple-600 text-white rounded mb-2 mr-2">
              Browse Notes
            </button>
            <button onClick={loadFile}
              className="text-sm px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded mb-2">
              Upload a File
            </button>
          </div>
        ) : (
          <div className="doc-body max-w-3xl mx-auto" dangerouslySetInnerHTML={{ __html: renderedHtml }} />
        )}
      </div>

      {/* Hover card */}
      {hoverChar && (
        <div style={{ position: "fixed", left: hoverPos.x + 12, top: hoverPos.y - 10, zIndex: 9999, pointerEvents: "none" }}>
          <div className="bg-gray-800 rounded-lg p-3 border border-gray-700 border-l-4 border-blue-400 max-w-sm">
            <div className="flex items-start justify-between gap-2 mb-2">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-bold text-white truncate">{hoverChar.nickname || hoverChar.name}</span>
                  <span className={`text-xs px-1.5 py-0.5 rounded-full font-medium ${roleBadge(hoverChar.role)}`}>
                    {hoverChar.role || "—"}
                  </span>
                </div>
                <span className="text-xs text-gray-400">{hoverChar.fullname || hoverChar.type || hoverChar.class || "—"}</span>
              </div>
            </div>

            {hoverChar.stats && <AbilityRow stats={hoverChar.stats} />}

            <div className="flex items-center gap-2 text-xs mb-2">
              {hoverChar.ac !== undefined && hoverChar.ac !== null && (
                <span className="px-2 py-0.5 rounded bg-gray-700 text-gray-300 font-mono">AC {hoverChar.ac}</span>
              )}
              {(hoverChar.hp?.max || hoverChar.hp_max) && (
                <span className="px-2 py-0.5 rounded bg-gray-700 text-gray-300 font-mono">
                  {hoverChar.hp?.current ?? hoverChar.currentHp ?? (hoverChar.hp_max || 0)}/{hoverChar.hp?.max || hoverChar.hp_max || "?"}
                </span>
              )}
            </div>

            {(hoverChar.traits?.length > 0 || hoverChar.actions?.length > 0) && (
              <div className="text-xs text-gray-300 space-y-1">
                {hoverChar.traits?.length > 0 && (
                  <div>
                    <SectionHeader title="Traits" role={hoverChar.role} />
                    {hoverChar.traits.map((t, i) => (
                      <p key={i} className="mb-0.5">
                        <em className="text-gray-200 not-italic font-semibold">{t.name}.</em> {t.desc}
                      </p>
                    ))}
                  </div>
                )}
                {hoverChar.actions?.length > 0 && (
                  <div>
                    <SectionHeader title="Actions" role={hoverChar.role} />
                    {hoverChar.actions.map((a, i) => (
                      <p key={i} className="mb-0.5">
                        <em className="text-gray-200 not-italic font-semibold">{a.name}.</em> {a.desc}
                      </p>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}
