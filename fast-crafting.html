<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fast Crafting</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e5e7eb;
            min-height: 100%;
            padding: 1.25rem;
            padding-bottom: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .back-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 1.4rem;
            line-height: 1;
            padding: 0.25rem;
        }
        .back-link:hover { color: #e5e7eb; }
        h1 { font-size: 1.35rem; font-weight: 600; }

        .filter-bar {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.35rem 0.75rem;
            border-radius: 0.4rem;
            border: 1px solid #2a2d3a;
            background: #1a1d27;
            color: #9ca3af;
            font-size: 0.8rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .filter-btn:hover { border-color: #6366f1; color: #e5e7eb; }
        .filter-btn.active {
            background: #6366f1;
            border-color: #6366f1;
            color: #fff;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.65rem;
        }

        .item-card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 0.625rem;
            padding: 0.85rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .item-card:hover, .item-card:active {
            border-color: #6366f1;
            background: #1e2133;
        }
        .item-card.selected {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px #6366f1;
        }

        .item-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #f3f4f6;
        }
        .item-type {
            font-size: 0.7rem;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.35rem;
        }
        .item-meta {
            font-size: 0.75rem;
            color: #6b7280;
        }

        /* Detail panel */
        .detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }
        .detail-overlay.active { display: flex; }

        .detail-panel {
            background: #1a1d27;
            border-top: 1px solid #2a2d3a;
            border-radius: 1rem 1rem 0 0;
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
            animation: slideUp 0.2s ease-out;
        }
        @media (min-width: 600px) {
            .detail-overlay { align-items: center; }
            .detail-panel {
                border-radius: 0.75rem;
                border: 1px solid #2a2d3a;
                max-height: 70vh;
            }
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .detail-close {
            float: right;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 0.25rem;
            line-height: 1;
        }
        .detail-close:hover { color: #fff; }

        .detail-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f3f4f6;
            margin-bottom: 0.15rem;
        }
        .detail-type {
            font-size: 0.8rem;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.75rem;
        }
        .detail-stats {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .stat-chip {
            padding: 0.3rem 0.65rem;
            background: #22253a;
            border-radius: 0.35rem;
            font-size: 0.8rem;
            color: #d1d5db;
            font-weight: 500;
        }
        .detail-desc {
            font-size: 0.9rem;
            line-height: 1.55;
            color: #d1d5db;
        }

        @media (max-width: 400px) {
            .items-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-link">&#8592;</a>
        <h1>Fast Crafting</h1>
    </div>

    <div class="filter-bar" id="filters"></div>
    <div class="items-grid" id="grid"></div>

    <div class="detail-overlay" id="detail">
        <div class="detail-panel" id="detail-panel"></div>
    </div>

    <script>
    const ITEMS = [
        {
            name: "Ball Bearings",
            type: "Adventuring Gear",
            weight: "2 lb.",
            cost: "1 GP",
            desc: "As a Utilize action, you can spill Ball Bearings from their pouch. They spread to cover a level, 10-foot-square area within 10 feet of yourself. A creature that enters this area for the first time on a turn must succeed on a DC 10 Dexterity saving throw or have the Prone condition. It takes 10 minutes to recover the Ball Bearings."
        },
        {
            name: "Basket",
            type: "Adventuring Gear",
            weight: "2 lb.",
            cost: "4 SP",
            desc: "A Basket holds up to 40 pounds within 2 cubic feet."
        },
        {
            name: "Bell",
            type: "Adventuring Gear",
            weight: "—",
            cost: "1 GP",
            desc: "When rung as a Utilize action, a Bell produces a sound that can be heard up to 60 feet away."
        },
        {
            name: "Block and Tackle",
            type: "Adventuring Gear",
            weight: "5 lb.",
            cost: "1 GP",
            desc: "A Block and Tackle allows you to hoist up to four times the weight you can normally lift."
        },
        {
            name: "Bucket",
            type: "Adventuring Gear",
            weight: "2 lb.",
            cost: "5 CP",
            desc: "A Bucket holds up to half a cubic foot of contents."
        },
        {
            name: "Caltrops",
            type: "Adventuring Gear",
            weight: "2 lb.",
            cost: "1 GP",
            desc: "As a Utilize action, you can spread Caltrops from their bag to cover a 5-foot-square area within 5 feet of yourself. A creature that enters this area for the first time on a turn must succeed on a DC 15 Dexterity saving throw or take 1 Piercing damage and have its Speed reduced to 0 until the start of its next turn. It takes 10 minutes to recover the Caltrops."
        },
        {
            name: "Case",
            type: "Adventuring Gear",
            weight: "1 lb.",
            cost: "1 GP",
            desc: "A Map or Scroll Case holds up to 10 sheets of paper or 5 sheets of parchment."
        },
        {
            name: "Club",
            type: "Simple Melee Weapon",
            weight: "2 lb.",
            cost: "1 SP",
            damage: "1d4 Bludgeoning",
            properties: "Light",
            desc: "A simple bludgeoning weapon. Its Light property allows it to be used for two-weapon fighting."
        },
        {
            name: "Grappling Hook",
            type: "Adventuring Gear",
            weight: "4 lb.",
            cost: "2 GP",
            desc: "As a Utilize action, you can throw the Grappling Hook at a railing, a ledge, or another catch within 50 feet of yourself, and the hook catches on if you succeed on a DC 13 Dexterity (Acrobatics) check. If you tied a Rope to the hook, you can then climb it."
        },
        {
            name: "Greatclub",
            type: "Simple Melee Weapon",
            weight: "10 lb.",
            cost: "2 SP",
            damage: "1d8 Bludgeoning",
            properties: "Two-Handed",
            desc: "A heavy, two-handed bludgeoning weapon. Deals more damage than a Club but requires both hands to wield."
        },
        {
            name: "Iron Pot",
            type: "Adventuring Gear",
            weight: "10 lb.",
            cost: "2 GP",
            desc: "An Iron Pot holds up to 1 gallon."
        },
        {
            name: "Jug",
            type: "Adventuring Gear",
            weight: "4 lb.",
            cost: "2 CP",
            desc: "A Jug holds up to 1 gallon."
        },
        {
            name: "Ladder",
            type: "Adventuring Gear",
            weight: "25 lb.",
            cost: "1 SP",
            desc: "A Ladder is 10 feet tall. You must climb to move up or down it."
        },
        {
            name: "Lamp",
            type: "Adventuring Gear",
            weight: "1 lb.",
            cost: "5 SP",
            desc: "A Lamp burns Oil as fuel to cast Bright Light in a 15-foot radius and Dim Light for an additional 30 feet."
        },
        {
            name: "Pouch",
            type: "Adventuring Gear",
            weight: "1 lb.",
            cost: "5 SP",
            desc: "A Pouch holds up to 6 pounds within one-fifth of a cubic foot."
        },
        {
            name: "Quarterstaff",
            type: "Simple Melee Weapon",
            weight: "4 lb.",
            cost: "2 SP",
            damage: "1d6 Bludgeoning",
            properties: "Versatile (1d8)",
            desc: "A versatile bludgeoning weapon. Can be wielded with one hand for 1d6 damage, or two hands for 1d8 damage."
        },
        {
            name: "Rope",
            type: "Adventuring Gear",
            weight: "5 lb.",
            cost: "1 GP",
            desc: "As a Utilize action, you can tie a knot with Rope if you succeed on a DC 10 Dexterity (Sleight of Hand) check. The Rope can be burst with a successful DC 20 Strength (Athletics) check. You can bind an unwilling creature with the Rope only if the creature has the Grappled, Incapacitated, or Restrained condition. If the creature's legs are bound, the creature has the Restrained condition until it escapes. Escaping the Rope requires the creature to make a successful DC 15 Dexterity (Acrobatics) check as an action."
        },
        {
            name: "Shovel",
            type: "Adventuring Gear",
            weight: "5 lb.",
            cost: "2 GP",
            desc: "Working for 1 hour, you can use a Shovel to dig a hole that is 5 feet on each side in soil or similar material."
        },
        {
            name: "Tent",
            type: "Adventuring Gear",
            weight: "20 lb.",
            cost: "2 GP",
            desc: "A Tent sleeps up to two Small or Medium creatures."
        },
        {
            name: "Tinderbox",
            type: "Adventuring Gear",
            weight: "1 lb.",
            cost: "5 SP",
            desc: "A Tinderbox is a small container holding flint, fire steel, and tinder (usually dry cloth soaked in light oil) used to kindle a fire. Using it to light a Candle, Lamp, Hooded Lantern, or Torch takes a Bonus Action. Lighting any other fire takes 1 minute."
        },
        {
            name: "Torch",
            type: "Adventuring Gear",
            weight: "1 lb.",
            cost: "1 CP",
            desc: "A Torch burns for 1 hour, casting Bright Light in a 20-foot radius and Dim Light for an additional 20 feet. When you take the Attack action, you can attack with the Torch, using it as a Simple Melee weapon. On a hit, the target takes 1 Fire damage."
        }
    ];

    const CATEGORIES = ["All", "Gear", "Weapons"];

    function categorize(item) {
        return item.type.includes("Weapon") ? "Weapons" : "Gear";
    }

    let activeFilter = "All";
    const filtersEl = document.getElementById('filters');
    const gridEl = document.getElementById('grid');
    const detailEl = document.getElementById('detail');
    const detailPanel = document.getElementById('detail-panel');

    // Render filter buttons
    function renderFilters() {
        filtersEl.innerHTML = '';
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn' + (activeFilter === cat ? ' active' : '');
            btn.textContent = cat;
            btn.addEventListener('click', () => {
                activeFilter = cat;
                renderFilters();
                renderGrid();
            });
            filtersEl.appendChild(btn);
        });
    }

    // Render item cards
    function renderGrid() {
        gridEl.innerHTML = '';
        const filtered = activeFilter === "All" ? ITEMS : ITEMS.filter(i => categorize(i) === activeFilter);
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';

            let meta = item.weight !== '—' ? item.weight : '';
            if (item.cost) meta += (meta ? ' · ' : '') + item.cost;
            if (item.damage) meta += (meta ? ' · ' : '') + item.damage;

            card.innerHTML = `
                <div class="item-name">${item.name}</div>
                <div class="item-type">${item.damage ? 'Weapon' : 'Gear'}</div>
                <div class="item-meta">${meta}</div>
            `;
            card.addEventListener('click', () => openDetail(item));
            gridEl.appendChild(card);
        });
    }

    // Detail panel
    function openDetail(item) {
        let chips = '';
        if (item.cost) chips += `<span class="stat-chip">${item.cost}</span>`;
        if (item.weight && item.weight !== '—') chips += `<span class="stat-chip">${item.weight}</span>`;
        if (item.damage) chips += `<span class="stat-chip">${item.damage}</span>`;
        if (item.properties) chips += `<span class="stat-chip">${item.properties}</span>`;

        detailPanel.innerHTML = `
            <button class="detail-close" id="detail-close">&times;</button>
            <div class="detail-name">${item.name}</div>
            <div class="detail-type">${item.type}</div>
            ${chips ? `<div class="detail-stats">${chips}</div>` : ''}
            <div class="detail-desc">${item.desc}</div>
        `;
        detailEl.classList.add('active');
        document.body.style.overflow = 'hidden';
        document.getElementById('detail-close').addEventListener('click', closeDetail);
    }

    function closeDetail() {
        detailEl.classList.remove('active');
        document.body.style.overflow = '';
    }

    detailEl.addEventListener('click', e => { if (e.target === detailEl) closeDetail(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // Init
    renderFilters();
    renderGrid();
    </script>
</body>
</html>
