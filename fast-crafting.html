<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wish — Fast Crafting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&display=swap">
    <link rel="stylesheet" href="css/item-tools.css">
</head>
<body data-tool="fast-crafting">
    <div class="header">
        <a href="index.html" class="back-link">Back</a>
        <div class="brand" aria-label="Wish Fast Crafting">
            <span class="brand-mark">Wish</span>
            <span class="brand-context">Fast Crafting</span>
        </div>
        <span class="sep" aria-hidden="true"></span>
        <span class="header-title">Player Reference</span>
    </div>

    <section class="tool-intro" aria-labelledby="tool-title">
        <div class="chapter-label">Craftable Gear</div>
        <h1 id="tool-title">Fast Crafting</h1>
        <p class="intro-copy">Browse the gear and simple weapons available through your fast crafting feature.</p>
    </section>

    <section class="controls" aria-label="Filters">
        <input type="text" class="search-bar" id="search" placeholder="Search craftable items..." autocomplete="off">
        <div class="filter-row" id="filters"></div>
    </section>

    <main class="item-grid" id="grid" aria-live="polite"></main>

    <div class="detail-overlay" id="detail" aria-hidden="true">
        <div class="detail-panel" id="detail-panel" role="dialog" aria-modal="true"></div>
    </div>

    <script src="js/fast-crafting-data.js"></script>
    <script src="js/fast-crafting.js"></script>
</body>
</html>
