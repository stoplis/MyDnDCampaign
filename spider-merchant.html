<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Merchant</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e5e7eb;
            min-height: 100vh;
            padding: 1.5rem 1rem 2rem;
        }

        .header {
            max-width: 800px;
            margin: 0 auto 1.5rem;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f3f4f6;
            letter-spacing: 0.05em;
        }
        .header p {
            margin-top: 0.3rem;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .filters {
            max-width: 800px;
            margin: 0 auto 1.25rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .filter-btn {
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            border: 1px solid #2a2d3a;
            background: #1a1d27;
            color: #9ca3af;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .filter-btn:hover { color: #e5e7eb; border-color: #6366f1; }
        .filter-btn.active {
            background: #6366f1;
            border-color: #6366f1;
            color: #fff;
        }

        .grid {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.65rem;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 0.625rem;
            padding: 0.85rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .card:hover, .card:active {
            background: #22253a;
            border-color: #6366f1;
        }

        .card-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f3f4f6;
            line-height: 1.3;
        }
        .card-type {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #818cf8;
        }
        .card-rarity {
            font-size: 0.75rem;
            font-weight: 500;
        }
        .card-attunement {
            font-size: 0.72rem;
            color: #6b7280;
        }
        .card-for {
            display: inline-block;
            margin-top: 0.15rem;
            padding: 0.15rem 0.5rem;
            background: rgba(251,191,36,0.12);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 600;
            color: #fbbf24;
            width: fit-content;
        }

        /* Detail overlay */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            align-items: flex-end;
            justify-content: center;
            padding: 0;
            z-index: 100;
        }
        .overlay.active { display: flex; }

        @media (min-width: 600px) {
            .overlay { align-items: center; padding: 1.5rem; }
        }

        .detail {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 0.875rem 0.875rem 0 0;
            padding: 1.5rem 1.25rem 2rem;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            animation: slideUp 0.2s ease;
        }
        @media (min-width: 600px) {
            .detail {
                border-radius: 0.875rem;
                max-width: 520px;
                max-height: 85vh;
                animation: none;
            }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .detail-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f3f4f6;
            line-height: 1.3;
        }
        .close-btn {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            flex-shrink: 0;
            transition: color 0.15s;
        }
        .close-btn:hover { color: #e5e7eb; }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .chip {
            padding: 0.25rem 0.65rem;
            background: #22253a;
            border-radius: 0.375rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: #c4c9d4;
        }
        .chip-type { color: #818cf8; }
        .chip-attunement { color: #9ca3af; }

        .detail-for {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.75rem;
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 0.375rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fbbf24;
            width: fit-content;
        }
        .detail-for-label {
            font-weight: 400;
            color: #9ca3af;
        }

        .detail-flavour {
            font-size: 0.875rem;
            font-style: italic;
            color: #6b7280;
            line-height: 1.6;
        }

        .detail-divider {
            border: none;
            border-top: 1px solid #2a2d3a;
            margin: 0;
        }

        .detail-mechanics {
            font-size: 0.875rem;
            color: #d1d5db;
            line-height: 1.65;
            white-space: pre-wrap;
        }

        .rarity-common   { color: #9ca3af; }
        .rarity-uncommon { color: #4ade80; }
        .rarity-rare     { color: #60a5fa; }
        .rarity-very-rare { color: #c084fc; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Spider Merchant</h1>
        <p>Choose any 1 item — free of charge</p>
    </div>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="Common">Common</button>
        <button class="filter-btn" data-filter="Uncommon">Uncommon</button>
        <button class="filter-btn" data-filter="Rare">Rare</button>
        <button class="filter-btn" data-filter="Very Rare">Very Rare</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="overlay" id="overlay">
        <div class="detail" id="detail">
            <div class="detail-header">
                <div class="detail-name" id="d-name"></div>
                <button class="close-btn" id="close-btn" aria-label="Close">×</button>
            </div>
            <div class="detail-meta" id="d-meta"></div>
            <div id="d-for"></div>
            <div id="d-body"></div>
        </div>
    </div>

    <script>
        const ITEMS = [
            {
                name: "Alchemist Ring",
                type: "Ring",
                rarity: "Uncommon",
                attunement: true,
                intendedFor: null,
                flavour: "",
                mechanics: "While attuned to this ring, whenever you drink a healing potion, you regain an additional 1d6 Hit Points. The bonus 1d6 applies to any potion that restores Hit Points on drinking — standard Potions of Healing and their greater variants alike. It does not apply to healing received from spells or other sources, only potions imbibed by the attuned wearer."

            {
                name: "All or Nothing Coin",
                type: "Wondrous Item",
                rarity: "Uncommon",
                attunement: false,
                intendedFor: null,
                flavour: "",
                mechanics: "Before making a roll that would use a d20, you may declare you are using this coin instead of rolling. Flip the coin: Heads — the roll is treated as a Natural 20 (critical success). Tails — the roll is treated as a Natural 1 (critical failure). The coin can be used twice per Short Rest. This coin does not modify your roll — it replaces it entirely. Bonuses, proficiency, and advantage/disadvantage do not apply."

            {
                name: "Arrow of Displacement",
                type: "Weapon (Arrow)",
                rarity: "Rare",
                attunement: false,
                intendedFor: "Rogue",
                flavour: "An arrow tipped with a shard of clear quartz crystal that hums faintly when nocked.",
                mechanics: "When fired and the arrow strikes, the archer is instantly teleported to the arrow's landing point. The arrow is not consumed on use — it resets at dawn.\n\nWhen the arrow embeds in a surface — a wall, the ground, a door — the archer teleports to the arrow's location.\n\nWhen the arrow hits a creature, the creature must make a DC 14 Wisdom saving throw. On a failed save, the archer and the creature swap positions instantly. On a successful save, the swap does not occur — the creature is still struck by the arrow and takes normal damage. The attack roll to hit is still required against the creature's AC."
            },
            {
                name: "Arrow of Yondu",
                type: "Weapon (Arrow)",
                rarity: "Rare",
                attunement: false,
                intendedFor: "Bard",
                flavour: "A gleaming red arrow that floats upright when held aloft, as if eager. It does not require a bow.",
                mechanics: "Hold the arrow aloft and whistle. No attack roll is made and no bow is required. The arrow launches and passes through a target enemy of your choice within range, automatically dealing 1d6 piercing damage — ignoring Armor Class.\n\nAfter each strike, roll d20 + your Wisdom modifier. On a 15 or higher, the arrow wheels and drives through another target of your choice, dealing 1d6 piercing damage again. Repeat this roll after each consecutive hit. Each new target must be a different creature.\n\nOn a roll of 14 or lower, the arrow returns to your hand and cannot be used again until after a Long Rest."
            },
            {
                name: "Boots of Striding and Springing",
                type: "Wondrous Item",
                rarity: "Uncommon",
                attunement: true,

                flavour: "",

            {

                rarity: "Uncommon",
                attunement: true,
                intendedFor: null,
                flavour: "Worn leather bracers stitched with a pattern of leaves and animal tracks, darkened by long use in the field. While attuned, they hum with a quiet readiness.",
                mechanics: "Hunter's Mark (1/Long Rest). Once per Long Rest, you may cast Hunter's Mark as a 1st-level spell without expending a spell slot. You do not need to be a spellcaster. The spell uses your Wisdom modifier as your spellcasting ability.\n\nSure Footing. Non-magical difficult terrain does not slow your movement — mud, undergrowth, shallow water, loose rock, tangled roots. Magically created difficult terrain still affects you normally."
            },
            {
                name: "Clark's Glasses of Kent",
                type: "Wondrous Item",
                rarity: "Rare",
                attunement: true,
                intendedFor: null,
                flavour: "An unremarkable pair of thick-framed spectacles that seem impossibly ordinary. No enchantment is visible on them. Nothing about them stands out at all. That's rather the point.",

            },
            {
                name: "Cloak of Displacement",
                type: "Wondrous Item",
                rarity: "Rare",
                attunement: true,
                intendedFor: null,
                flavour: "A shimmering cloak that makes you appear to be somewhere slightly different from where you actually stand — like a desert mirage in motion.",
                mechanics: "While you wear this cloak, it projects an illusion that makes you appear to be standing in a place near your actual location, causing any creature to have Disadvantage on attack rolls against you.\n\nThe displacement effect is suppressed whenever you take any damage (until the start of your next turn) or your Speed is 0."
            },
            {
                name: "Decanter of Endless Water",
                type: "Wondrous Item",
                rarity: "Uncommon",

            {

                type: "Wondrous Item",
                rarity: "Uncommon",

            },
            {
                name: "Feather Fall Duster",
                type: "Wand",
                rarity: "Uncommon",
                attunement: false,
                intendedFor: null,

            {
                name: "Glutton's Fork",

            {

                mechanics: "Throw as a ranged weapon attack using Strength or Dexterity. On a hit (or when thrown at a point on the ground), the bottle shatters and the contents spread across a 10-foot square centred on the target point:\n\n• The area becomes Difficult Terrain for 1 minute.\n• Each creature standing in the area when the grease appears must succeed on a DC 13 Dexterity saving throw or fall Prone.\n• A creature that enters the area or ends its turn there must also succeed on that save or fall Prone.\n\nThis alchemical variety is highly flammable. If set alight, it burns for 1 minute. A creature that enters the burning grease or starts its turn in the area takes 2d6 fire damage."

            {

                rarity: "Uncommon",
                attunement: false,
                intendedFor: null,
                flavour: "A 60-foot length of rope that can hold up to 3,000 pounds.",
                mechanics: "While holding one end, take a Magic action to command the other end to animate and move toward a destination up to the rope's length away (10 feet per turn).\n\nYou can command the rope to:\n• Fasten itself securely to an object\n• Unfasten from an object\n• Knot itself — knots appear every 1 ft., rope shortens to 50 ft., grants Advantage on Athletics checks to climb\n• Unknot itself\n• Coil itself for carrying\n\nRope stats: AC 20, HP 20, Immunity to Poison and Psychic damage, Regeneration 1 HP every 5 minutes."
            },
            {
                name: "Slippers of Spider Climbing",
                type: "Wondrous Item",
                rarity: "Uncommon",
                attunement: true,
                intendedFor: null,
                flavour: "",
                mechanics: "While you wear these light shoes, you can move up, down, and across vertical surfaces and along ceilings, while leaving your hands free. You have a Climb Speed equal to your Speed.\n\nThe slippers do not allow movement on slippery surfaces, such as those covered by ice or oil."
            },
            {
                name: "Stone of Farspeech",
                type: "Wondrous Item",
                rarity: "Uncommon",
                attunement: false,
                intendedFor: null,
                flavour: "A smooth, palm-sized stone warm to the touch, faintly iridescent. It pulses gently when its paired stone is nearby. When held and spoken to, the voice carries — to wherever it needs to go.",
                mechanics: "Stones of Farspeech are made in matched pairs. While holding a stone, you can speak into it to send your voice in real time to the holder of the paired stone, anywhere on the same plane of existence. The paired stone holder hears you clearly and can respond in kind.\n\nCommunication is two-way and instantaneous. There is no daily limit on use. Both holders must be actively holding their stone for communication to work.\n\nThe stones do not muffle sound — anyone near a holder can hear the voice coming out of the stone. Communication does not work across planar boundaries. If either stone is destroyed, the other becomes nonmagical."
            },
            {
                name: "Tankard of Potent Drink",
                type: "Wondrous Item",
                rarity: "Common",
                attunement: false,
                intendedFor: null,
                flavour: "A sturdy, well-worn tankard etched with images of revellers and overflowing cups. It has seen better days, but it never leaks.",
                mechanics: "When an alcoholic beverage is consumed from this tankard, it is twice as potent as normal — intoxication onset faster and effects hit harder.\n\nWhen plain water is consumed from this tankard, the drinker immediately becomes sober, removing all effects of intoxication regardless of how much they have drunk."
            },
            {
                name: "Wand of Switcheroo",
                type: "Wand",
                rarity: "Rare",
                attunement: true,
                intendedFor: null,
                flavour: "A crooked little wand carved from pale driftwood, with two small copper rings near the tip that seem to trade places whenever you blink.",
                mechanics: "The wand has 3 charges and regains 1d3 expended charges daily at dawn.\n\nWhile holding this wand, take an action to target a creature your size or smaller within 100 feet and expend 1 charge:\n\nWilling creature — You and the creature immediately swap positions. No save required.\nUnwilling creature — The creature must make a DC 16 Charisma saving throw. On a failed save, you swap positions. On a success, nothing happens and the charge is wasted.\n\nThe swap is instantaneous — neither creature provokes opportunity attacks.\n\nIf you expend the last charge, roll a d20. On a 1, the wand switches places with a random ordinary stick nearby and is lost forever."
            },
            {
                name: "Wand of the War Mage",
                type: "Wand",
                rarity: "Uncommon",
                attunement: true,
                intendedFor: "Sorcerer",
                flavour: "A simple but elegant wand of dark metal, typically forged for battlemages. It channels offensive magic with greater precision.",
                mechanics: "While holding this wand, you gain a +1 bonus to spell attack rolls. In addition, you ignore Cover when making a spell attack roll.\n\nThe bonus applies to every spell attack roll — Fire Bolt, Eldritch Blast, Scorching Ray, Guiding Bolt, etc."
            },
            {
                name: "Winged Boots",
                type: "Wondrous Item",
                rarity: "Uncommon",
                attunement: true,
                intendedFor: null,
                flavour: "",
                mechanics: "These boots have 4 charges and regain 1d4 expended charges daily at dawn.\n\nWhile wearing the boots, take a Magic action to expend 1 charge, gaining a Fly Speed of 30 feet for 1 hour.\n\nIf you are flying when the duration expires, you descend at a rate of 30 feet per round until you land."
            }
        ];

        const RARITY_ORDER = ["Common", "Uncommon", "Rare", "Very Rare"];
        const RARITY_CLASS = {
            "Common": "rarity-common",
            "Uncommon": "rarity-uncommon",
            "Rare": "rarity-rare",
            "Very Rare": "rarity-very-rare"
        };

        let activeFilter = "All";

        function rarityClass(r) {
            return RARITY_CLASS[r] || "";
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const filtered = activeFilter === "All"
                ? ITEMS
                : ITEMS.filter(i => i.rarity === activeFilter);

            filtered.sort((a, b) =>
                RARITY_ORDER.indexOf(a.rarity) - RARITY_ORDER.indexOf(b.rarity) ||
                a.name.localeCompare(b.name)
            );

            grid.innerHTML = filtered.map(item => {
                const origIdx = ITEMS.indexOf(item);
                return `<div class="card" data-idx="${origIdx}" tabindex="0" role="button" aria-label="${item.name}">
                    <div class="card-name">${item.name}</div>
                    <div class="card-type">${item.type}</div>
                    <div class="card-rarity ${rarityClass(item.rarity)}">${item.rarity}</div>
                    ${item.attunement ? '<div class="card-attunement">Requires attunement</div>' : ''}
                    ${item.intendedFor ? `<div class="card-for">For: ${item.intendedFor}</div>` : ''}
                </div>`;
            }).join('');

            grid.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => openDetail(parseInt(card.dataset.idx)));
                card.addEventListener('keydown', e => {
                    if (e.key === 'Enter' || e.key === ' ') openDetail(parseInt(card.dataset.idx));
                });
            });
        }

        function openDetail(idx) {
            const item = ITEMS[idx];
            document.getElementById('d-name').textContent = item.name;

            document.getElementById('d-meta').innerHTML = `
                <span class="chip chip-type">${item.type}</span>
                <span class="chip ${rarityClass(item.rarity)}">${item.rarity}</span>
                ${item.attunement ? '<span class="chip chip-attunement">Requires attunement</span>' : ''}
            `;

            const forEl = document.getElementById('d-for');
            forEl.innerHTML = item.intendedFor
                ? `<div class="detail-for"><span class="detail-for-label">Recommended for</span> ${item.intendedFor}</div>`
                : '';

            const bodyEl = document.getElementById('d-body');
            if (item.flavour) {
                bodyEl.innerHTML = `
                    <div class="detail-flavour">${item.flavour}</div>
                    <hr class="detail-divider">
                    <div class="detail-mechanics">${item.mechanics}</div>
                `;
            } else {
                bodyEl.innerHTML = `<div class="detail-mechanics">${item.mechanics}</div>`;
            }

            document.getElementById('overlay').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('overlay').classList.remove('active');
        }

        document.getElementById('close-btn').addEventListener('click', closeDetail);
        document.getElementById('overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('overlay')) closeDetail();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeDetail();
        });

        document.getElementById('filters').addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            activeFilter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        });

        renderGrid();
    </script>
</body>
</html>
