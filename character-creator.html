    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e5e7eb; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }

        .card-glow { transition: all 0.2s ease; }
        .card-glow:hover, .card-glow:active { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        .card-selected { box-shadow: 0 0 0 2px #8b5cf6, 0 0 20px rgba(139, 92, 246, 0.4); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .not-recommended-badge {
            background: linear-gradient(135deg, #92400e, #78350f);
            color: #fbbf24;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: rgba(75, 85, 99, 0.4);
            border: 1px solid #4b5563;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover { background: rgba(75, 85, 99, 0.6); }

        .step-dot { transition: all 0.3s ease; }
        .step-dot.active { background: #8b5cf6; transform: scale(1.3); }
        .step-dot.completed { background: #10b981; }
        .step-dot.pending { background: #4b5563; }

        .summary-section { background: rgba(31, 36, 55, 0.8); border: 1px solid #374151; border-radius: 12px; padding: 16px; margin-bottom: 12px; }

        .class-icon { width: 48px; height: 48px; object-fit: contain; filter: brightness(0) invert(0.85); }
        .class-icon-sm { width: 36px; height: 36px; object-fit: contain; filter: brightness(0) invert(0.85); }
        .class-art { width: 100%; max-height: 280px; object-fit: contain; border-radius: 12px; }

        .prose-story p { margin-bottom: 0.75rem; line-height: 1.7; }
        .prose-story p:last-child { margin-bottom: 0; }

        @media (max-width: 640px) {
            .class-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            .class-grid { grid-template-columns: repeat(3, 1fr) !important; }
        }
        @media (min-width: 1025px) {
            .class-grid { grid-template-columns: repeat(4, 1fr) !important; }
        }
    </style>
</head>

function ProgressBar({ currentStep, steps }) {
    // Don't show progress on intro or story pages
    if (currentStep === 'intro') return null;
    const innerSteps = steps.filter(s => s !== 'intro');
    return (
        <div className="flex items-center justify-center gap-2 py-3 px-4">
            {innerSteps.map((step, i) => (
                <React.Fragment key={step}>
                    <div
                        className={`step-dot w-2.5 h-2.5 rounded-full ${
                            i < innerSteps.indexOf(currentStep) ? 'completed' :
                            i === innerSteps.indexOf(currentStep) ? 'active' : 'pending'
                        }`}
                    />
                    {i < innerSteps.length - 1 && (
                        <div className={`h-0.5 w-6 sm:w-8 rounded ${
                            i < innerSteps.indexOf(currentStep) ? 'bg-green-500' : 'bg-gray-700'
                        }`} />

    );

// ─── INTRO / LANDING PAGE ────────────────────────────────────────────────────

function StepIntro({ onNext }) {
    const scrollRef = useRef(null);
    return (
        <div className="fade-in flex flex-col h-full">
            <div ref={scrollRef} className="flex-1 overflow-y-auto px-5 sm:px-8 pb-6 pt-4" style={{ WebkitOverflowScrolling: 'touch' }}>
                <div className="text-center mb-6">
                    <h1 className="text-3xl sm:text-4xl font-bold text-white mb-2">The Lands of Albion</h1>
                    <p className="text-purple-400 text-sm">A Dungeons & Dragons Adventure</p>
                </div>

                <div className="prose-story text-gray-300 text-sm">
                    <p>The Lands of Albion is a place of fables and half-remembered stories, where magic is real and the line between fantastical and factual is often very thin. You will not find the creatures of more familiar tales here — no orcs, no goblins, no elves, no dwarves. In their place are two peoples: Man, and the Animals.</p>

                    <p>Man is the common folk of Albion — farmers, merchants, soldiers, scholars. Most people live in small towns and villages scattered across a land of forests, river valleys, and old roads worn down by centuries of cart wheels. Life is modest for most; there are no great empires here, only a patchwork of settlements, each governed by whoever is clever or wealthy or respected enough to take the role. Travel between towns takes time and is not always safe. A day's ride might separate one village from the next; a week's walk might separate it from anything you might call a city.</p>

                    <p>The major cities are another world entirely. They have universities, academies, and schools for those with magical gifts — provided those gifts are accompanied by enough gold to pay the tuition. Magic is not rare in Albion, but <em>trained</em> magic is expensive. A wizard who studied at one of the great academies commands far more respect, and far higher fees, than a village hedge-mage who learned from a grandmother's handwritten notes. The gap between those with access to formal magical education and those without is one of the quiet injustices of Albion: not often discussed, but felt clearly by anyone on the wrong side of it.</p>

                    <p>Science is rarer still, and treated with something between indifference and mild suspicion. Word reaches the villages occasionally — usually through a traveller with a habit of embellishment — of buildings in distant places lit by neither candle nor spell, running on some mechanism no one can quite explain. In a world where magic already fills the role that machinery might otherwise claim, there has been little pressure to develop the alternative. The academies train wizards, not engineers; the universities debate metaphysics, not mechanics. Science is something that happens elsewhere, if it happens at all.</p>

                    <p>The Animal folk are another matter. They walk upright, speak common, and live their lives much as Man does — trading, farming, keeping homes, raising families. But they are few. Most people have met no more than a handful in their lifetimes, and in smaller towns, one passing through is cause for stares and whispered comment. Animals tend to keep to themselves: a cottage on the edge of the wood, a farm a few miles from the nearest village, a trading post at a remote crossroads. They come and go on their own business and prefer not to linger where they are not welcome. In the cities, some have built reputations that earn them something closer to respect. In the countryside, suspicion is more common than courtesy.</p>

                    <p>There is no single reason for this distrust — it is old and diffuse, passed down in the way most unreasonable things are passed down: through habit, through folk stories, through the simple human tendency to be wary of whatever is not ordinary. The Animals have long since stopped expecting better, and mostly learned to work around it.</p>

                    <p>There is a third kind, if the old stories are to be believed — though most sensible people would tell you they are not. Fairy folk. Not seen in living memory, nor in any memory that can be traced with confidence. The legends say they once moved freely through the world, luminous and apt to meddle in mortal affairs — granting wishes to the deserving, or occasionally the undeserving, according to their own inscrutable judgment. The stories say they left. Wherever they went, they did not announce their departure, and they have not returned. Every generation or so, someone claims a sighting — a shimmer at the edge of the forest, a voice with no body, a wish that somehow, against all likelihood, came true. The claims are never verifiable. Most people treat fairies the way they treat old family curses or lucky charms: something to mention in passing, nothing to actually plan around.</p>
                </div>

                <div className="mt-6 mb-2 border-t border-gray-700 pt-6">
                    <h2 className="text-xl font-bold text-amber-300 mb-3">Something Has Changed</h2>
                    <div className="prose-story text-gray-300 text-sm">
                        <p>In the last year or two, there have been more missing persons reports than usual — more than the normal churn of runaways, debtors gone to ground, and travellers who misjudged the road after dark. Children, specifically. A boy from one village. A girl from another. The reports are spread enough across the land that no single town feels the pattern; each only feels its own grief. The rumours travel along trade routes, passed between merchants and carters and innkeepers in the same breath as the weather and the price of grain. A tension is building in the villages not felt in the big cities.</p>
                    </div>
                </div>
            </div>

            <div className="px-5 sm:px-8 py-4 border-t border-gray-800 bg-gray-900 bg-opacity-80">
                <button onClick={onNext} className="btn-primary w-full py-4 rounded-xl text-white font-bold text-base">
                    Create Your Character
                </button>
            </div>
        </div>
    );
}

// ─── CLASS FEATURE CHOICES ───────────────────────────────────────────────────

function StepFeatures({ selectedClass, featureChoices, onSetFeatureChoices, onNext, onBack }) {
    const cls = CLASSES.find(c => c.id === selectedClass);
    const scrollRef = useRef(null);
    useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, []);

    const hasChoices = cls.choices.length > 0;

    const [localChoices, setLocalChoices] = useState(() => {
        const init = {};
        cls.choices.forEach(c => { init[c.id] = featureChoices[c.id] || null; });
        return init;
    });

    const allChosen = cls.choices.every(c => localChoices[c.id] !== null);

    const handleSelect = (choiceId, optionId) => {
        setLocalChoices(prev => ({ ...prev, [choiceId]: optionId }));
    };

    const handleNext = () => {
        onSetFeatureChoices(localChoices);
        onNext();
    };

    if (!hasChoices) {
        return (
            <div className="fade-in flex flex-col h-full">
                <div className="px-4 sm:px-6 pt-2 pb-2">
                    <h1 className="text-xl sm:text-2xl font-bold text-white">Class Details</h1>
                </div>
                <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 sm:px-6 pb-4" style={{ WebkitOverflowScrolling: 'touch' }}>
                    <div className="bg-green-900 bg-opacity-20 border border-green-800 rounded-lg p-4 mb-4">
                        <h3 className="text-green-300 font-semibold text-sm mb-1">You're all set!</h3>
                        <p className="text-gray-300 text-sm">
                            The <strong className="text-white">{cls.name}</strong> doesn't require any additional choices right now.
                            Your DM will help you with equipment and spells when you sit down to play.
                        </p>
                    </div>
                    <h3 className="text-white font-semibold text-sm mb-2">Your Level 1 Abilities:</h3>
                    <div className="space-y-2">
                        {cls.features.map(f => (
                            <div key={f.name} className="bg-gray-800 bg-opacity-60 rounded-lg p-3 border border-gray-700">
                                <span className="text-purple-300 font-semibold text-sm">{f.name}</span>
                                <p className="text-gray-400 text-xs mt-1">{f.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="flex gap-3 px-4 sm:px-6 py-3 border-t border-gray-800 bg-gray-900 bg-opacity-80">
                    <button onClick={onBack} className="btn-secondary flex-1 py-3 rounded-xl text-gray-300 font-medium text-sm">Back</button>
                    <button onClick={handleNext} className="btn-primary flex-1 py-3 rounded-xl text-white font-bold text-sm">Continue</button>
                </div>
            </div>
        );
    }

    return (
        <div className="fade-in flex flex-col h-full">
            <div className="px-4 sm:px-6 pt-2 pb-2">
                <h1 className="text-xl sm:text-2xl font-bold text-white">Class Details</h1>
                <p className="text-gray-400 text-sm mt-1">Your <strong className="text-purple-300">{cls.name}</strong> has some choices to make.</p>
            </div>
            <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 sm:px-6 pb-4" style={{ WebkitOverflowScrolling: 'touch' }}>
                {cls.choices.map(choice => (
                    <div key={choice.id} className="mb-6">
                        <h3 className="text-white font-semibold mb-1">{choice.name}</h3>
                        <p className="text-gray-400 text-sm mb-3">{choice.description}</p>
                        <div className="space-y-2">
                            {choice.options.map(opt => {
                                const isSelected = localChoices[choice.id] === opt.id;
                                return (
                                    <button
                                        key={opt.id}
                                        onClick={() => handleSelect(choice.id, opt.id)}
                                        className={`w-full text-left rounded-xl p-3 sm:p-4 border transition-all ${
                                            isSelected ? 'border-purple-500 bg-purple-900 bg-opacity-20 card-selected' :
                                            'border-gray-700 bg-gray-800 bg-opacity-60'
                                        }`}
                                    >
                                        <div className="flex items-start justify-between">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <span className="text-white font-semibold text-sm">{opt.name}</span>
                                                    {opt.guidance && (
                                                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
                                                            isSelected ? 'bg-purple-600 text-white' : 'bg-gray-700 text-gray-300'
                                                        }`}>{opt.guidance}</span>
                                                    )}
                                                </div>
                                                <p className="text-gray-400 text-xs mt-1 leading-snug">{opt.desc}</p>
                                            </div>
                                            <div className={`ml-3 w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 mt-0.5 ${
                                                isSelected ? 'border-purple-500 bg-purple-600' : 'border-gray-600'
                                            }`}>
                                                {isSelected && <span className="text-white text-xs font-bold">\u2713</span>}
                                            </div>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                ))}
            </div>
            <div className="flex gap-3 px-4 sm:px-6 py-3 border-t border-gray-800 bg-gray-900 bg-opacity-80">
                <button onClick={onBack} className="btn-secondary flex-1 py-3 rounded-xl text-gray-300 font-medium text-sm">Back</button>
                <button onClick={handleNext} disabled={!allChosen} className="btn-primary flex-1 py-3 rounded-xl text-white font-bold text-sm">Continue</button>
            </div>
        </div>
    );
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────

function StepSummary({ selectedClass, selectedBackground, featureChoices, onBack, onRestart }) {
    const cls = CLASSES.find(c => c.id === selectedClass);
    const bg = BACKGROUNDS.find(b => b.id === selectedBackground);
    const scrollRef = useRef(null);
    const [copied, setCopied] = useState(false);
    useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, []);

    const buildSummaryText = () => {
        let text = `D&D CHARACTER CHOICES\n`;
        text += `=====================\n\n`;
        text += `Class: ${cls.name}\n`;
        text += `Background: ${bg.name} (${bg.featName})\n`;

        if (cls.choices.length > 0) {
            text += `\nClass Choices:\n`;
            cls.choices.forEach(choice => {
                const selected = choice.options.find(o => o.id === featureChoices[choice.id]);
                if (selected) text += `  ${choice.name}: ${selected.name}\n`;
            });
        }

        text += `\n-----\n`;
        text += `Still needed: Character name, appearance, personality, and backstory.\n`;
        text += `Your DM will handle equipment, spells, and the full character sheet.`;
        return text;
    };

    const summaryText = buildSummaryText();

    const handleCopy = async () => {
        try {
            await navigator.clipboard.writeText(summaryText);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        } catch {
            const el = document.createElement('textarea');
            el.value = summaryText;
            el.style.position = 'fixed';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            el.setSelectionRange(0, 99999);
            document.execCommand('copy');
            document.body.removeChild(el);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
        }
    };

    const handleShare = async () => {
        if (navigator.share) {
            try { await navigator.share({ title: 'My D&D Character', text: summaryText }); } catch (e) {}
        } else {
            handleCopy();
        }
    };

    return (
        <div className="fade-in flex flex-col h-full">
            <div className="px-4 sm:px-6 pt-2 pb-2">
                <h1 className="text-xl sm:text-2xl font-bold text-white">Your Character Summary</h1>
                <p className="text-gray-400 text-sm mt-1">Here are all the choices you've made. Send this to your DM!</p>
            </div>
            <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 sm:px-6 pb-4" style={{ WebkitOverflowScrolling: 'touch' }}>
                <div className="summary-section">
                    <div className="flex items-center gap-3 mb-2">
                        <img src={cls.icon} alt="" className="class-icon" loading="lazy" />
                        <div>
                            <p className="text-gray-400 text-xs uppercase tracking-wide">Class</p>
                            <h2 className="text-white text-xl font-bold">{cls.name}</h2>
                        </div>
                    </div>
                    <p className="text-gray-400 text-sm">{cls.playstyle}</p>
                </div>

                <div className="summary-section">
                    <div className="flex items-center gap-3 mb-2">
                        <span className="text-3xl">{bg.emoji}</span>
                        <div>
                            <p className="text-gray-400 text-xs uppercase tracking-wide">Background</p>
                            <h2 className="text-white text-xl font-bold">{bg.name}</h2>
                        </div>
                    </div>
                    <p className="text-gray-400 text-sm">{bg.tagline}</p>
                </div>

                {cls.choices.length > 0 && (
                    <div className="summary-section">
                        <p className="text-gray-400 text-xs uppercase tracking-wide mb-2">Class Choices</p>
                        {cls.choices.map(choice => {
                            const selected = choice.options.find(o => o.id === featureChoices[choice.id]);
                            return selected ? (
                                <div key={choice.id} className="mb-1">
                                    <span className="text-gray-400 text-sm">{choice.name}: </span>
                                    <span className="text-white text-sm font-medium">{selected.name}</span>
                                </div>
                            ) : null;
                        })}
                    </div>
                )}

                {/* Share / Copy buttons */}
                <div className="flex gap-3 my-4">
                    <button onClick={handleShare} className="btn-primary flex-1 py-3 rounded-xl text-white font-bold text-sm">
                        {navigator.share ? '📤 Share with DM' : (copied ? '\u2713 Copied!' : '📋 Copy for DM')}
                    </button>
                </div>

                {/* Story Setup */}
                <div className="mt-2 mb-2 border-t border-gray-700 pt-6">
                    <h2 className="text-xl font-bold text-amber-300 mb-4">Your Story Begins...</h2>
                    <div className="prose-story text-gray-300 text-sm">
                        <p>Your party works out of a small bounty hunter agency — the kind of place that deals in the unglamorous end of law and order. Most of your work involves tracking down debtors who have missed their repayment dates, and serving summons to people who have gone to some effort to avoid being found. The work is steady, if not exciting, and the agency takes their cut.</p>

                        <p>Lately it has been slow. Slow enough that the agency has been taking jobs that stretch the definition of "bounty hunting" — a stolen cart horse or goods, a merchant who needed someone with a serious expression to stand behind him during a difficult conversation, a run away bride. Any legitimate job, in other words.</p>

                        <p>The latest job is a request from the village of Krat, two days south. A shopkeeper there is looking for his missing boy.</p>

                        <p className="text-amber-200 italic">The man is offering everything he has.</p>

                        <p>That is the detail that stays with you. Not the amount — the amount is modest — but the way it is written: plainly, without flourish, in the handwriting of someone who does not write often. <em className="text-gray-200">"This is my life savings. Please find my boy."</em> No negotiation. No conditions. Just a father who has run out of other options and is hoping someone will take the job seriously.</p>

                        <p className="text-white font-medium text-base mt-6">You leave in the morning.</p>
                    </div>
                </div>

                <div className="mt-4 bg-purple-900 bg-opacity-20 border border-purple-800 rounded-xl p-4">
                    <h3 className="text-purple-300 font-semibold text-sm mb-2">Before we play, think about...</h3>
                    <div className="text-gray-300 text-sm space-y-1">
                        <p>What is your character's <strong className="text-white">name</strong>?</p>
                        <p>What do they <strong className="text-white">look like</strong>?</p>
                        <p>What is their <strong className="text-white">personality</strong> — are they brave, cautious, funny, brooding?</p>
                        <p>Why are they working as a <strong className="text-white">bounty hunter</strong>?</p>
                    </div>
                </div>
            </div>

            <div className="px-4 sm:px-6 py-3 border-t border-gray-800 bg-gray-900 bg-opacity-80">
                <div className="flex gap-3">
                    <button onClick={onBack} className="btn-secondary flex-1 py-3 rounded-xl text-gray-300 font-medium text-sm">Back</button>
                    <button onClick={onRestart} className="btn-secondary flex-1 py-3 rounded-xl text-gray-300 font-medium text-sm">Start Over</button>
                </div>
            </div>
        </div>
    );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────

function App() {
    const [step, setStep] = useState('intro');
    const [selectedClass, setSelectedClass] = useState(null);
    const [selectedBackground, setSelectedBackground] = useState(null);
    const [featureChoices, setFeatureChoices] = useState({});

    const goNext = () => {
        const idx = STEPS.indexOf(step);
        if (idx < STEPS.length - 1) setStep(STEPS[idx + 1]);
    };

    const goBack = () => {
        const idx = STEPS.indexOf(step);
        if (idx > 0) setStep(STEPS[idx - 1]);
    };

    const restart = () => {
        setStep('intro');
        setSelectedClass(null);
        setSelectedBackground(null);
        setFeatureChoices({});
    };

    const showHeader = step !== 'intro';

    return (
        <div className="h-full flex flex-col bg-gray-900">
            {/* Header */}
            {showHeader && (
                <div className="flex-shrink-0 border-b border-gray-800 bg-gray-900 bg-opacity-95" style={{ paddingTop: 'env(safe-area-inset-top, 0px)' }}>
                    <div className="flex items-center justify-between px-4 py-2">
                        <div className="flex items-center gap-2">
                            <span className="text-lg">🐉</span>
                            <h1 className="text-sm font-bold text-white">Character Creator</h1>
                        </div>
                        <span className="text-xs text-gray-500">{STEP_LABELS[step]}</span>
                    </div>
                    <ProgressBar currentStep={step} steps={STEPS} />
                </div>
            )}

            {/* Safe area top for intro page */}
            {step === 'intro' && (
                <div className="flex-shrink-0" style={{ paddingTop: 'env(safe-area-inset-top, 0px)' }} />
            )}

            {/* Content */}
            <div className="flex-1 overflow-hidden">
                {step === 'intro' && (
                    <StepIntro onNext={goNext} />
                )}
                {step === 'class' && (
                    <StepClass selectedClass={selectedClass} onSelectClass={setSelectedClass} onNext={goNext} onBack={goBack} />
                )}
                {step === 'background' && (
                    <StepBackground
                        selectedBackground={selectedBackground}
                        onSelectBackground={setSelectedBackground}
                        onNext={goNext}
                        onBack={goBack}
                    />
                )}
                {step === 'features' && (
                    <StepFeatures
                        selectedClass={selectedClass}
                        featureChoices={featureChoices}
                        onSetFeatureChoices={setFeatureChoices}
                        onNext={goNext}
                        onBack={goBack}
                    />
                )}
                {step === 'summary' && (
                    <StepSummary
                        selectedClass={selectedClass}
                        selectedBackground={selectedBackground}
                        featureChoices={featureChoices}
                        onBack={goBack}
                        onRestart={restart}
                    />
                )}
            </div>

            {/* Safe area bottom padding */}
            <div style={{ paddingBottom: 'env(safe-area-inset-bottom, 0px)' }} className="bg-gray-900" />
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
